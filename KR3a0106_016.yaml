body:
  text: 欽定四庫全書御定內則衍義卷十六大學士傅以漸恭纂學之道好學列女傳曰古者婦人妊子夜則令瞽誦詩道正事謹按乾坤以二氣成男女而命之性修之教學安可得已哉是以女子之生必有傅姆自能食能言約其德於寬裕慈惠先嫁三月祖廟未毁者教于公宫祖廟既毁者教于宗室以成婦順而後親禮成焉雖其既嫁而敬不弛于師傅凡有所行必保姆詔之出入咨詢其王宫邦室又有彤史紀言動以昭勸戒聖王之化始于閨門逹于邦國盡天下男女夫婦曲成不遺如此其深且厚也至于妊子猶必令瞽者誦二南之詩言事之合于禮者蓋無時不好學為兢兢云東漢明德馬皇后能誦易好讀春秋楚辭尤善周官董仲舒書章帝旦夕朝輒與論政理教授諸小王論議經書雍和終日謹按天下事有益有損有所宜必有所不宜惟學則隨所好而皆有益無損尊卑上下無人而不可學也朝夕老幼無時而不可學也女子從人小之則為匹庶中之則為卿二上之則為皇后貴嬪所奉愈大其學之所關益屬有用明德馬后事事皆可為皇后之法程其得力尤在好學誦易則明盈虛消息之理是節儉所從出讀春秋則明賞罰是非之權是政治所由昭研楚詞憂讒抱忠之志而仁民愛物沛然四達考周官設官分職之詳而崇賢好禮油然不倦是以仰對章帝朝綱賴其助宣教授諸王懿戚資其和洽不特為漢代皇后稱首即宋之髙曹向孟尚遜其美善者學之不可已也如是乎漢和熹鄧皇后六歲能史書十二通詩論語諸兄每讀經傳輒下意問難志在典籍不問居家之事母嘗責其不習女工后乃晝修婦業暮誦經典家人號曰諸生父訓異之事無大小輒與詳議及入宫掖從曹大家受經兼天文算數晝省王政夜則誦讀而患其謬誤懼乖典章博選諸儒劉珍等及博士議郎四府掾吏五十餘人詣東觀讐校傳記事畢奏御賜葛布各有差又詔中書近臣于東觀受讀經傳以教授宫人左右習誦朝夕濟濟永平六年詔徴和帝弟濟北河間王子男女年五歲以上四十餘人鄧氏近親子孫三十餘人為開邸第教學經書躬自監試四姓小侯皆令入學所以矯俗厲薄反之忠孝謹按學不可以無師我無師則所入之理必不深學不可不為人師不為人師則所獲之美必不暢鄧皇后讀書夲諸天性少即問難諸兄為師入宫則受經于曹大家且博選諸儒等則大家與諸儒等皆師復廣其教于宫人而王子外戚躬自監試四姓小侯皆令入學何其殷殷不憚煩也然而非尋章摘句所可幾上遵母命則晝修婦業而暮誦經典也內助帝幾則晝省王政而夜則誦讀也廣敷教澤則矯俗厲薄反為忠孝也能為學復能為實際之學鄧皇后所以美而傳歟順烈梁皇后為恭懷后近屬女孫通韓氏詩嘗圖古烈女置左右自鑑謹按讀書之道必曰左圖右史蓋事理精奧非史不能悉其全時勢更遷非圖不能昭其象况女子好學寧有幾人則觀書不若觀圖之尤為易易也獨是古來賢妃列女不盡著梁皇后篤嗜古訓命畫工圖列女以自警其氣志有足嘉者至于漢代經學各有専門韓嬰詩傳卓然自成一家言女子而能通之亦可謂深于經學者矣宋髙祖吳皇后博習書史又善翰墨繪古烈女圖置座右為鑒謹按人之性情未有不因觀感而興起者髙山仰止景行行止必以前人之成躅為後人之楷模始能觸於目而警於心則圖鑑之益良大吳后既淹博羣書往史又能染翰成書濡墨為畫因繪畫古之女子其行事足為法則者置之座右為朝夕曯對警省身心之具如懸鑑之妍􅑦畢照即古聖賢盤有銘几有針之意也人人能以古昔賢哲為鑑則宫幃之教式於海內何難之有哉劉聰妻劉氏名娥字麗華太保殷女也幼而聰慧晝營女工夜誦書籍傅母恆止之娥敦習彌厲每與諸兄論經義理趣超逺諸兄深為歎伏其姊英字麗芳亦聰敏涉學而文詞機辨曉逹政事過於娥初與娥同召拜左貴嬪尋卒追諡武德皇后謹按家學莫重於父子同學莫親於兄弟至於女子則獨能學者已幾幾乎難之矣何劉氏之姊與妹皆賦性敏達而勤修學業同膺帝召一則為后一則為嬪甚則諸兄且服其精晰政事亦仗其博綜豈非女子所最不可及者乎劉聰得此宜其雄踞一方傳威名於不朽也唐髙祖太穆順聖皇后竇氏京兆平陵人生而髮垂過頸三歲與身等讀女誡列女等傳一過輒不忘工為篇章規誡文有雅體又善書與髙祖書相雜人不能辨太宗文德長孫皇后仁孝節儉喜圖傳恆觀古善惡自考鑒矜尚禮法及正位中宫好讀書雖容櫛不廢商略古事裨益𢎞深謹按開闢之帝王莫不有賢內助焉若能以學問興事業則唐朝尤為大著竇皇后不惟能學而又能書其聰明有過乎人者長孫皇后幼喜圖傳正位中宫益加精勤是以文章揚其規誡政事賴其匡勷發迹太原數年而成大業二后之好學有不容泯沒者存也唐太宗賢妃徐惠湖州長城人生五月能言四歲通論語詩八歲自曉屬文太宗聞之召為才人手未嘗廢卷而辭致贍蔚文無淹思尚宫宋若昭貝州人父廷芬能辭章生五女皆警慧善文長若莘次若昭若倫若憲若荀莘昭文尤高皆性好素潔鄙薰澤靚妝不願歸人欲以學名家家亦不欲與寒鄉凡裔為婚對聼其學若莘誨諸妹如嚴師著論語十篇以韋宣文君為孔子曹大家等為顔冉推明婦道所宜若昭又為傳申釋之貞元中昭義節度使李抱真表其才德宗召入禁中試文章并問經史大義甚加褒美悉留宫中呼為學士元和末若莘卒贈河南郡君自貞元七年祕禁圖籍詔若莘所總領者盡付若昭管理厯憲昭敬三朝皆呼先生后妃與諸王公主率以師禮見之寶厯初卒贈梁國夫人若憲代司祕書文宗尚學以若憲善屬辭粹於論義尤加禮焉宋周貴妃開封人生四歲從其姑入宫張貴妃育為女稍長遂得侍仁宗帝崩妃日一疏食屏處一室誦書困則假寐覺則復誦晝夜不解衣者四十年諡昭淑金元妃李氏名師兒父湘母王盻兒皆微賤大定末入宫是時張建主教宫中事師兒與諸宫女皆從之學舊例用青紗隔障蔽內外宫教居障外諸宫女居障內毋得靣見若字有不識及問文義皆映紗指請宫教自障外口説諸女子中惟師兒易為領戒建不知其為誰但識其音聲清亮章宗一日問建曰女子誰可教者建對曰就中聲音清亮者最可教章宗得之即師兒宦者梁道譽其才美遂納之章宗好文辭師兒賦性慧黠能作字知文義尤善伺顔色遂大愛幸明昌四年封為昭容明年進封淑妃謹按此皆妃嬪而好學者天子之妃嬪與大夫士庶之媵妾不同故天子理陽道其設官也有三公九卿二十七大夫八十一元士后治陰德其備職也有三夫人九嬪二十七世婦八十一御妻然而得其人則難得能好學之人則更難徐賢妃八歲即曉屬文而終身未嘗廢卷宋若昭等姊妹同心願以學名不作庸人婦悉留宫中號曰學士豈不休哉周貴妃蔬食獨處嗜學若飴四十年如一日李元妃於羣學之中獨聰頴易為領解字義兼洽遂承帝眷妃嬪之不可不學蓋若此宋魏國公主太宗女善筆扎喜圖史能為歌詩尤精女工嘗誡諸子以忠精自敕無恃吾以速禍謹按此公主而好學者公主生長富貴其性易動其情易流不有監古何以知所自制魏國公主既善筆扎復嗜圖史而織紝精能詩詞清麗可謂靈秀天成者矣至於戒子以忠精自敕則尤得學問之大者漢崔篆母師氏通九經百家之言王莽寵以殊禮賜號義成夫人苻秦宣文君宋氏太常韋逞母也幼喪母明慧父授以周官謂之曰吾家世以周官傳業此經周公所制者也今無男可傳以授汝汝必敬受無令此學遂絶宋日諷誦屬世亂研精不輟石虎徙民實山東宋在徙中與夫推鹿車就徙而背負父所授經與之俱至冀州依膠東富人程安壽以居晝則樵採夜歸授子經以紡績佐績逞遂成學秦王堅憫禮樂廢闕博求通周官有師法者問諸博士博士盧壼前對曰學殖久廢禮師法盡矣太常韋逞母宋氏世學家女傳其父業精周官今年八十視聽無闕非此母無足以授此經者於是詔就宋氏立講堂復置徒百二十人設絳紗幔坐其中講業賜號宣文君周官學復行于世宣文君之力也謹按為學莫大于通經崔篆之母九經百家之言無所不通潛心研考不知幾經歲月苻秦之世干戈滿路聖道淪胥無餘老宿名儒捲堂而星散無復能留心經學者宣文君不忍惰棄父書日日諷誦研精不輟復經流徙葡蔔數千里而負經採薪可不謂婦女之尤難者乎處難學之時而學不廢傳易泯之經而經愈彰斯之謂得好學之大者東漢曹大家者班彪女也名昭歸曹世叔敦節行惟法又博問勤學時漢書初出多古文竒字讀者莫能通詔昭正之謹按通天下之理者莫如經載天下之事者莫如史故窮經以立其體稽史以達其用而學遂無所不貫焉史雖始于司馬遷而分代敘事必以班固為博雅之宗昭為其弟不特能淹道其文義且能辨析竒字以廣其書於天下八表天文志皆史家所難而毅然補成完書豈尋常學問所能及哉程皓母侯氏太原人幼聰慧諸女事不學而能七歲時女師教以古詩曰女子不夜出夜出秉明燭自是日暮遂不復出房閣長明經術常教家人曰見他人善當如己善必共成之視他人物當如己物必愛護之性好學然不為詞章之學詩不過二三篇皆婉雅得性情之正云謹按為學之道必身體而力行之始可謂之有獲若幼學方始即能自間其動靜非卓然大有識力者其孰能之侯氏天性惇篤女事既爾精工經學又復昭明其教人也務存萬物一體之心成人之善則誘掖奬勸之不遑愛人之物又樽節護持之必至即偶著之詩皆依乎性情之正而不為詞章是真能躬行實踐者宜乎能以實學倡其子也可不謂賢哉北魏元務光母盧氏范陽人好讀書造次必于禮十年寡居諸子幼家貧不能就學盧親執經史手授之唐桞太君盧氏涿郡人宗元母也七歲通毛詩列女傳宗元生四歲家無書盧親授古賦十四首皆諷誦之以詩禮圖史及女工授諸女後皆為賢婦滎陽縣太君鄭氏比部郎元寬妻寬早世子稹積方髫齔家貧無從授業鄭手詩書親授之皆以通經舉髙第謹按女子之好學古史所載寥寥無幾稍涉古典即足稱名而博洽經史淹通詞賦時當家計蕭條孤弱之子無力從師乃口誦以手教之使子成其為賢子女成其為賢女可謂以母道兼師道矣明賈氏幼讀書通大義家貧而寡設教女館授書自給閨門肅然事聞旌之謹按學以成已教以成物兩者並重而不廢然教子教女不出閨門猶為可行之道以女子而設館教人古今以來所不多有賈氏家貧孀居不得已而授書自給其學問之博可以概見閨門肅然其有得于學并可以類推矣夫以孑然貧窮有學而竟可以治生學可廢乎哉處豐裕之境讀書有資者又奈何不觀賈氏而興起之也遼耶律中妻蕭氏小字挼蘭韓國王惠之四世孫聰慧謹願年二十歸于中事夫敬順親戚咸譽其德中嘗謂曰汝可粗知書以前貞淑為鑑遂發心誦習多涉古今謹按劉向新序有曰晉平公曰吾年已七十欲學但恐已暮矣師曠曰何不秉燭乎平公曰安有為人臣而戲其君師曠曰盲臣安敢戲君臣聞之少而好學如日出之陽壯而好學如日中之光老而好學如焫燭之明焫燭之明孰與昧行乎乃知學之所關者大即老耄且不可廢况中年乎哉蕭氏聰慧謹願聰慧則有可以悟道之資謹願則紛華靡麗又不足以亂其心夫勸之以知書而即發心誦習考古事以備典則通今事以達世務由粗可以入精講學正以修德傳諸史册輝映彤管男子之不學者觀此生愧女子之未學者覽此知興是又佐好學之窮者矣學之道著書詩大序曰在心為志發言為詩先王以是經夫婦成孝敬厚人倫美教化移風俗謹按德之所發為言立言以明德傳記疏序之類是也志之所形為詩作詩以見志賦頌歌詠之類是也六經所載女子之文不多見惟詩自周太姒以至列國夫人卿大夫士庶之婦女所作篇章莫不發乎情止乎禮義逮漢而下后妃及婦女之賢者大則續史小則屬文莫不有禆治化而女則女誡諸書尤其親切有益者故采其純以正者表之唐太宗文德長孫皇后嘗采古婦人事著女則十篇又為論斥漢之馬后不能檢抑外家使與政事乃戒其車馬之侈此謂開夲源恤末事常誡守者吾以自檢故書無條理勿令至尊見之及崩宫司以聞帝為之慟示近臣曰后此書可用垂後謹按著作莫大於教令莫切於訓誡唐長孫后作女則所以飭宫闈者切矣夫厯代諸后以詞章著者不少然必有禆於國政壼教乃可法今傳後故首采之為椒房著作之法云明文皇后內訓序曰吾幼承父母閨訓誦詩讀書之暇職謹女事蒙先人積善餘慶夙被妃庭之選事我孝慈髙皇后朝兢夕惕恆恐怠緩以誤朝廷更懼黜辱以纍父母此鄙人之劬勞恭奉夙夜匪懈者念何切也髙皇后教諸子婦立法垂訓昭然耳目今皇上三十餘年一遵先志以行政教吾思備位中宫愧德弗似歉於率下無以佐皇上內治之美即以違髙后諄嚴之訓實非鄙人之初意也竊觀史傳賢父貞母雖稱夙性亦由教成然古者教必有方男子八歲而入小學女子十歲而聽姆教昔小學無傳朱子慮焉由是多方博採編輯成書為小學之教者始有所入獨女教未有全書此何異欲渡罔津成舟失斧也乎蓋後漢有曹大家女誡為訓恆病其略雖有所謂女憲女則亦徒有其名耳俯觀今世女教盛行大要撮曲禮內則之言與周召二南詩之小序傳記而為之者孰如我髙皇后教訓立言卓越往昔昭垂萬世吾耳熟而心藏之乃於永樂二年冬備述內庭著為女訓上以廣髙皇后立法之深心下以成宫壼肅清之令範有如所謂飬德性者而必以修身也夫身非修其何以能克聖何以能成人故莫切於謹言慎行推而至於勤勵警戒而又次之以節儉其曰遷善曰改過皆人之所以獲福而深慶久長者也之數者乃身之切要而所以取法者則必守我髙皇后之教也故繼之以崇聖訓逺而取法於古故次之以景賢範上而至於事父母事君事舅姑奉祭祀又推而至於母儀睦親慈幼逮下而終之於待外戚顧以言辭淺陋不足以發揚深旨而其條目亦粗備矣觀者於此不必泥於言而但取於意其於治內之道或有禆於萬一云又採古賢聖勸善懲惡之言類編二十篇名曰勸善書嘗曰仁者善之所由生也善者慶之所由基也是故積慶莫大於為善省已莫嚴於知戒又曰善惡之報理所必然如晝之所為者善則夜之所夢者亦善晝之所為者惡則夜之所夢者亦惡謹按明之徐后為中山王徐達之女秉德仁厚樂於為善所作內訓頗稱詳備而尊姑以立言尤得孝道之大者既著內訓以式化於宫闈又欲廣此心於天下使人皆從善去惡遂編勸善書其間勸懲皆有而獨名勸善見善之所該者大茍知樂善則惡自消也蓋善言所發其行固逺然亦有臣子得聞而小民未得聞一時得聞而後世不得聞者惟梓刻成書則窮鄉下邑愚夫愚婦皆可家喻户曉孫子流傳中間所載其大者君臣父子之倫言忠孝必有忠孝之報而不忠不孝者可知其細者鳥獸蟲魚之微言放生傷生必有放生傷生之報而大于鳥獸蟲魚者更可知誠慮百姓無知不言報應則不知所畏不知所畏則為善之心不堅為善之心不堅則去惡之力必不勇是以禍福極其昭彰鬼神如在左右且其身垂示天下曰父達不妄殺人女身得配帝王即此一事已見善之不可不好其勸懲可不謂深切著明哉漢扶風曹世叔妻名昭兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀藏書閣踵而成之帝數召入宫命皇后諸貴人師事焉號曰大家每有貢獻異物輒召大家作賦頌及鄧太后臨朝以出入之勤特封子成關內侯時漢書初出多未能通者同郡馬融伏於閣下從昭受讀作女誡七篇有助內訓馬融善之令妻女習焉昭年七十餘卒皇太后素服舉哀使監護喪事所著賦頌銘誄問注哀辭書論上疏遺命凡十六篇子婦丁氏為撰集之又作大家讃焉其女誡序曰鄙人愚暗受性不敏蒙先君之餘寵賴母師之典訓年十有四執箕帚於曹氏於今四十餘載戰戰兢兢常懼黜辱以增父母之羞以益中外之纍夙夜劬心勤不告勞而今而後乃知免耳吾性疏頑教導無素恆恐子榖負辱清朝聖恩橫加猥叨金紫實非鄙人所望也男能自謀吾不復以為憂但傷諸女方當適人而不漸訓誨不聞婦禮懼失容他門取耻宗族吾今疾在沉滯性命無常念汝曹如此每用惆悵間作女誡七篇願諸女各寫一通庶有補益其朂勉之又女論語序曰妾乃賢人之妻名家之女四德兼習亦通書史因輟女工間觀文字九烈可嘉三貞可慕深惜後人不能追步乃撰一書名為論語敬戒相承教訓女子若依斯言是為賢婦罔俾前人専美千古唐尚宫宋若莘誨諸妹如嚴師著女論語十篇大抵凖論語以韋宣文君代孔子曹大家等為顔冉推明婦道所宜若昭又為傳申釋之鄭氏朝散郎陳邈妻也博學宏才作女孝經十八章獻於朝朝廷納其書頒行于世其表曰聞天地之性貴剛柔焉夫婦之道重禮義焉仁義禮智信者是為五常五常之教其來逺矣總而為主實在孝乎夫孝者感鬼神動天地精神至貫無所不達蓋以夫婦之道人倫之始考其得失非細務也易著乾坤則陰陽之制有别禮標羔鴈則伉儷之事實陳妾每覽先世垂言觀前賢行事未嘗不撫躬三復嘆息久之欲緬相餘芳遺蹤可躅妾侄女特蒙天恩䇿為永王妃以少長閨闈未聞詩禮至於經誥觸事靣墻夙夜憂惶戰懼交集今戒以為婦之道申以執巾之禮並述經史正義無復載乎浮詞總一十八章各為編目名曰女孝經上及皇后下及庶人不成孝而成名者未之聞也妾不敢自専因以曹大家為主雖不足藏諸巖石亦可以少補閨庭輒不揆量敢兹聞逹輕觸屏帳伏待罪戾王琳妻韋氏者士族也琳為眉州司功參軍俗僭多盛飾韋不知有簪珥訓二子堅氷有法後皆名聞琳卒時韋年二十五家欲強嫁之韋固拒至不聼音樂處一室或終日不食著女訓行于世謹按女子之著作足以佐壼範明婦道者則尤重焉曹大家文章甚多宋若莘鄭氏韋氏亦以才學聞考其所著女誡女訓女孝經女論語皆上發聖賢旁采經傳所以教女子者可謂親切著明矣其書或傳或不傳而有功於人倫則一也漢唐帝后妃主或隆以師禮或寵以名位其亦知陰教之要乎漢成帝班媫妤左曹越騎况之女也賢才通辨為媫妤誦詩及窈窕德象女師之篇必三復之每進見上疏依古禮求供飬皇太后于長信宫上許焉媫妤作賦曰承祖考之遺德兮荷性命之淑靈登薄軀于宫闕兮充下陳于後庭蒙聖主之渥惠兮當日月之盛明揚光烈之翕赫兮奉隆寵于增成既過幸于非位兮竊庶幾乎嘉時每寤寐而纍息兮申佩離以自思陳女圖而鏡鑑兮顧女史而問詩悲晨婦之作戒兮哀褒豔之為郵美皇英之女舜兮榮妊姒之母周雖愚陋其靡及兮敢舍心而忘兹白日忽以移光兮遂奄莫而昧幽猶彼覆載之厚德兮不廢捐于罪郵奉供飬于東宫兮託長信之末流供灑掃于帷幄兮永終死以為期願歸骨于山足兮依松柏之餘休晉武帝左貴嬪名芬記室左思之妹也少好學善綴文名亞於思帝聞而納之泰始八年拜修儀後為貴嬪以才德見禮言及文義辭對清華左右侍聽無不稱美帝每有方物異寶必詔芬為賦頌以是屢獲恩賜焉答兄思詩書及雜賦頌數十篇並行于世謹按古今文章之彥其以賦著者代不數人人不數篇蓋才學兼至詞理並優固未易言耳漢班媫妤晉左貴嬪其人皆端淑謙和所為文亦如之觀其所作之賦班則溫柔忠厚有愛君之心左則懇至悽惻多思親之意而雅辭古藻足以發其情志洵宫闈翰墨之冠也二妃著作甚富故並著之晉劉臻女陳氏聰辨能屬文嘗正旦獻椒花頌其詞曰旋穹周回三朝肇建青陽散輝澄景載煥標美靈葩爰採爰獻聖容映之永壽千萬又撰元日及冬至進見之儀行于世王凝之妻謝氏字道韞聰識有才辨叔父安嘗問毛詩何句最佳道韞稱吉甫作頌穆如清風仲山甫永懷以慰其心安謂有雅人深致又嘗內集俄而雪驟下安曰何所似也安兄子朗曰散鹽空中差可擬道韞曰未若桞絮因風起安大悅嫠居會稽家中莫不嚴肅所著詩賦誄頌並傳于世秦苻堅時秦州刺史竇滔妻蘇氏陳留令道質第三女也名蕙字若蘭識知精明儀容秀麗謙默自守不求顯揚行年十六歸于竇氏滔甚敬之滔為秦州刺史以忤旨謫戍燉煌會堅冦晉藉滔才略拜安南將軍留鎮襄陽不與偕行斷其音問蘇氏因織錦回文五采相宣瑩心耀目其錦縱橫八寸題詩三十餘首計八百餘言縱橫反覆皆成文章其文點畫無缺才情之妙超古及今名曰璇璣圖然讀者不能盡通蘇氏笑而謂人曰徘徊宛轉自成文章非我佳人莫能解之遂發蒼頭齎至襄陽滔省錦字感其妙絶因具車徒如禮邀迎蘇氏歸于漢南恩好愈重遼耶律氏太師逹魯之妹小字常格幼爽秀有成人之風及長操行修潔自誓不嫁能詩文不茍作讀通鑑見前人得失厯能品藻咸雍間作文以述時政其略曰君以民為體民以君為心人主當任忠賢人臣當去比周則政化平陰陽順欲懷逺則崇恩尚德欲強固則輕徭薄賦四端五典為治教之本六府三事實生民之命淫侈可以為戒勤儉可以為師錯枉則人不敢詐顯忠則人不敢欺勿泥空門崇室土木勿事邉鄙妄費金帛滿當思溢安必慮危刑罰當罪則勸善不寶逺物則賢者至建萬世磐石之業制諸強橫之心欲率下則先正身欲治逺則始朝廷上稱善卒年七十六謹按古聖賢作書立言以教人為要陳氏謝氏皆有詩文行世其詞多雅正而可觀至竇氏之織錦回文其精思有超人意想之表者耶律氏述時政治平之道備焉此豈専一時稱美者哉其書不朽其人亦當不朽矣御定內則衍義卷十六
