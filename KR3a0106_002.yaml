body:
  text: 欽定四庫全書御定內則衍義卷二大學士傅以漸恭纂孝之道事父母內則曰父母將坐奉席請何鄉將袵長者奉席請何趾少者執牀與坐御者舉几斂席與簟懸衾篋枕斂簟而襡之又曰父母唾洟不見冠帶垢和灰請潄衣裳垢和灰請浣衣裳綻裂紉針請補綴謹按女子在家從父故當以父母之教遵而守之為先當雞初鳴而盥潄櫛縰笄總衣紳與夫所佩之無所不備問父母之寒燠痛癢與子之事父母者無以異其抑搔之必敬也扶持之必敬也問所欲而進之必敬也載於事舅姑者甚詳未嫁之際莫之敢忽即一奉席亦必請所鄉將更卧處又必請趾之何從韜衾枕之必以親身其詳而不自專如此唾洟所關甚微必令之不見於人洗灈補綴其工甚下且在在加䖍其勤而不自逸又如此事親之道豈不備哉又曰是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎又曰將為善思貽父母令名必果將為不善思貽父母羞辱必不果詩小雅曰無非無儀唯酒食是議無父母貽罹謹按女子之道愛敬本諸父母不特非不當有即善之可儀而象者亦不可自以為有惟於中饋之酒食詳悉周至如內則所著者慎而修之以無遺父母羞縱至父母既殁仍持此無父母詒罹之心為善則父母有令名為不善則父母有羞辱終其身惓惓翼翼不敢稍忘乎父母者即女子事父母之極則也詩周南葛覃三章曰言告師氏言告言歸薄汙我私薄浣我衣害浣害否歸寧父母春秋莊公二十有七年冬杞伯姬來謹按凡諸侯之女父母在則有歸寧之禮所以展孝也文王之妃已嫁而孝不衰於父母婉轉以致其詞朴素以將其意尤德之厚而人所難者周家八百年雍穆之化始於閨門故關雎以美其始又葛覃以賦其事修身齊家豈無所本而致此哉降及春秋杞之伯姬獨以賢德為聖人所豫特書曰來所以問父母之安是禮得其正而心全乎孝者詩邶風曰毖彼泉水亦流於淇有懷于衛靡日不思孌彼諸姬聊與之謀謹按衛女嫁於諸侯父母終思歸寧而不得故作是詩夫禮緣人情而為之者也緣人情而為之則父母其本根兄弟其同氣何以有歸寧父母之禮而無歸寧兄弟之禮乎蓋人情有出於天理之公者有出於人欲之私者聖人制禮將以全天理之正而節其人欲之私故凡女子已嫁而返兄弟不與同席而坐不與同器而食所以厚别也閨門之內所可與同坐而共食者惟母姑姊妹耳使父母殁而歸寧則誰與同坐誰與共食而誰為之王寧以義斷恩不以恩掩義此衛女之思歸而究不能歸所謂發乎情止乎禮義者也東漢和熹鄧皇后太傅禹女孫年五嵗太傅夫人愛之為剪髮年高目冥誤傷額血出后忍痛不言侍者怪之問何得無痛后曰非不痛言之傷大人心故忍之諸兄每讀經傳輒下意問難母常非之曰汝寧當應博士舉耶后重違母言晝修婦業暮誦經典父卒哀毁三年不食鹽菜宋陳國大長公主仁宗長女也幼警慧性純孝帝嘗不豫主侍左右徒跣籲天乞以身代帝隆愛之魏國大長公主英宗第二女宣仁聖烈皇后所生神宗時雖下嫁左衛將軍王詵每以不得日侍宣仁於宫居常悒然間遇旱暵帝降損以禱主亦如之曰我奉賜俱出公上固應同其休戚帝居慈聖光獻皇后喪毁甚主曰吾與上同體視此亦復何聊立散遣歌舞三十輩徐國長公主神宗幼女也欽成皇后所生始封慶國公主及笄猶處聖瑞宫侍母疾晝夜不暫去藥餌非經手弗以進逮疾革號痛屢絶左右不忍視崇寧三年下嫁潘美之曽孫意事姑修婦道潘故大族夫黨數千百人賔接皆盡禮後追封賢靜長帝姬謹按人之所不學而能者其良能也所不慮而知者其良知也我身生自父母昊天罔極男女奚辨而所重在從夫家庭之事遂有不得自由者然竟借此弛其孝順豈不愚哉鄧皇后美行多端而自幼所志便卓然超人意表祖母剪髮傷痛而不言母非其問難即勤勤婦業而不忍再拂其訓是真以父母之心為心者至於仁宗長女乞以身代英宗二女戀親尤切神宗幼女侍奉獨周抑豈有所矯强而然乎處豐厚而不移惇養之心當下嫁而愈厪膝前之戀豈非千古所可奉行者哉齊女者傷槐衍之女也景公愛槐懸木其下曰傷者死衍醉而傷槐女造晏子之門請曰妾聞之明君之蒞國也不損祿而加刑不以私恚害公法不為六畜傷人民不為野草傷禾苖今妾父以社膰故不勝麯蘖之味而傷槐君以槐故欲殺之妾恐傷執政之法害明君之義敢自投代死晏子惕然言於公而赦之罷守槐之令謹按一女子之微能救父命且言詞溫柔有體可禆風化晏子言於其君而赦之亦可謂能體下民之隱者矣西漢緹縈臨淄人太倉令淳于意之少女父有罪當刑怒罵其五女曰生女不生男緩急無可恃於是縈隨父至長安上書言妾父為吏齊中稱亷平今坐法當刑妾傷死者不可復生斷者不可復續雖欲改過自新其道無繇願沒身為官婢以贖父刑文帝憐之為免父死因除肉刑謹按上書雖非女子所當為然感於其父當刑之痛心隨至京師能以奏疏感動文帝是百姓之所難而女子更難文帝不特免其父之死而并除肉刑下以誠訴上以誠求刑措之風比於成康其仁愛又有出人意想之表者若後世叩閽上訴而託言訟寃豈得援此例哉隋劉昶女河南人適長孫氏之子昶與文帝有舊以其子居士恣橫破其家産昶奉養甚薄女時寡居哀昶如此每歸寧躬耕紡績以致其肥鮮後居士坐告不遜誅昶亦下獄女每親調飲食詣大理餉父見獄卒跪而進之歔欷嗚咽見者酸鼻及昶賜死於家詔百寮臨視時女絶而復蘇者數矣公卿慰諭之女言父無罪坐子以及禍情詞哀切人皆不忍聞見遂布衣蔬食以終其身帝聞嘆曰吾聞衰宗之女興門之男固不虛也唐趙氏女山陽人父盜鹽當論死女詣官訴曰迫饑而盜救死耳情有可原能原之耶否則請與俱死有司義之許減父死女曰身今為官所賜願毁服依浮圖以報即截耳自誓侍父病卒不肯嫁謹按劉昶之女能以孝動文帝之歎息趙氏之女能以孝免罪父之性命總之情極其至則法有不可以常例拘者甚矣孝不可不重也吳荀嵩小女名灌幼有奇節嵩任襄城太守為杜曽所圍力弱食盡欲求救於故吏平南將軍石覽計無從出灌時年十三乃率勇士數千人踰城突圍夜出賊追甚急灌督厲將士且戰且前自詣覽乞師又為嵩書與南中郎將周訪請援仍結為兄弟訪即遣子撫率兵三千㑹石覽俱救嵩賊聞兵至散走灌之力也北魏王廣女廣仕劉聰為西揚州刺史蠻帥梅芳攻陷揚州而廣被害女時年十五芳納之俄於暗室擊芳不中芳驚起曰何故反耶女罵曰蠻畜我欲誅反賊何謂反乎汝反逆無狀害人父母而復以無禮陵人吾所不即死者欲誅汝耳今死自吾分但恨不得梟汝首於通逵以塞大耻乃自殺謹按武勇本丈夫之事而婦女從柔故不出閨門者女子之行也然義憤所激則往往捨生而不顧至於越城求兵且戰且走欲誅反賊以塞大耻雖志之得遂與否不同其英烈有不可磨滅者矣唐夏侯孝女者滑州胙城人父為鹽城丞歸喪明貧無以自存女歸邑人劉寂者數年生二女矣念父甚請大歸侍其父疾寂聽之既歸事父母劬甚事後母以孝聞居五年父沒毁不勝喪被髮徒跣身負土作塜廬其左寒不綿纊日一食者三年詔賜粟帛表門後孝女卒其女居母喪如母蓋其感也詔表世孝門宋李女者建寧蒲城人父無子母病慟欲絶不茹葷三年治女工供祭祀奉父母甘㫖畢具父嘗以許邑人鄭全未嫁邵武豪陳良委禽焉女斷髮數求死良不能奪卒歸全事舅姑有道謹按女子之於父母本屬天性雖終其身以事夫為正而念及家貧親老奉養無資則情有不能不徘徊者劉寂之妻以既嫁而辭歸鄭全之妻以未嫁而盡孝一則拮据墳墓而女同其孝一則斷髮求死强者不能奪豈不凛凜乎百世之憲哉明康孝女濟源人父友賢年老無子贅王珏為壻康勸母納妾生子而乏乳康亦生女遂舍之乳其弟曰吾父老矣女可得弟不可再得也母嘗病康嘗糞夫早沒誓不再適時人稱之謹按女道事夫而此獨事父母女性多依母而多忌此獨勸母納妾人未有不愛己之女者乃舍其女以乳弟亦人情之所難也東漢梁夫人嬺梁竦女樊調之妻孝和帝之姨恭懷后之同産姊也恭懷生和帝梁氏相慶竇后怒乃誣梁氏殺竦家屬移九真及和帝立竇后崩諸竇以罪誅放嬺從民間上書自訟天子感悟引見稱梁夫人擢樊調為郎中改葬恭懷於西陵追封竦為侯徴還家屬酒泉龎淯母趙氏之女也字娥父為同縣人所殺而娥兄弟三人俱物故讐喜而自賀以為莫已報也娥乃潜備刀兵常帷車以候讐家十餘年不能得後遇於都亭刺殺之因詣縣自首福祿長尹嘉義之解印綬欲與俱亡娥不肯去後遇赦得免州郡表其閭太常張奐嘉歎以束帛禮之謹按女子從夫固天下之通義而終身不忘父母則其本懷也梁夫人之鳴寃趙氏女之復讐皆烈烈足嘉者唐謝小娥者洪州人為歷陽假居貞妻居嵗餘居貞與謝父同行賈江東並為盜所賊死小娥痛欲赴江自沉救而免乃行丐食至上元夢父及夫告以殺己者名離析為十二字曰車中猴門東草禾中走一日夫持問內外姻莫能曉隴西李公佐善占得其意曰殺若父者申蘭殺若夫者申春遍訪莫得也至江州得焉則有名盜亡命者也於是小娥詭服為男子與傭保雜作因託傭蘭家日謹信自效鄰保咸愛之雖蘭亦倚信諸蓋藏委焉小娥見夫與父服用物具在乃益信所夢出入者二期伺便發一日蘭出剽還盡集羣偷來分贓共釃酒為樂醉卧不知人小娥閉户拔佩刀斬首因大呼鄰保來捕賊遂禽春言之官得贓千萬得其黨數十皆抵死刺史張錫嘉其烈欲以聞觀察使不為請還豫章豫章人高其義爭聘之不許祝髮事浮屠垢衣糲飯終其身謹按以女子而報父與夫之讐已為古今所少謝小娥乃能苦心訪問卑已代傭能使申蘭倚信而不疑呼鄰里而同擒衆盜有才有智豈復當以女子目之乎刺史嘉其烈而觀察使不為之請於朝非推諉不任其心必有可疑夫柔貞之道持之久則武略出焉孟子曰志一則動氣獨奈何為丈夫反出女子下也宋張女者羅江人也母楊寡居有操親黨有婚㑹母赴之與女偕典庫雍乙從乙先歸罷㑹楊氏還則乙死庫中莫知殺者主名言之官提刑張文饒忍人也億楊與乙亂懼人知殺之以滅口下吏苛劾之楊言與女同榻實無他逮女訊詞不更乃掘地為坎縛母子其內旁列熾火間以水沃之垂絶者屢矣終不承一日女謂獄吏曰我不勝痛將死矣願一見母而死既見謂母曰母清潔表天日奈何受此汙辱必母自汚吾今死將訴寃於天言訖絶於是石泉地大震者三日聲如雷天雨雪屋瓦皆震勘官李志寧乃震恐夕具衣冠禱於天俄假寐若有猿墜其前驚寤呼吏卒索之無有也默自念豈有殺人者袁姓乎忽門卒報張氏饋食人袁大進執之曰殺人者汝也袁色動曰吾憐之久矣願就死問之云適盜庫金㑹雍歸殺之楊乃免時女死才數日郡榜所居曰孝感坊謹按嚴刑之下何求而不得以如此清白之母與女而遭此酷吏深為可痛然推其所以酷暴之故必羡心典庫之資是以大貪大酷原相終始逮至地震雨雪勘官始知猛省而罪人斯獲天道昭昭可不畏哉而在張女貞烈之性則止知有母而罔恤其他也隋王孝女名舜趙人父子春被從兄長欣夫妻所害無子時女甫七嵗與二妹寄食親戚家及笄不肯適人與二妹中夜持刀入長欣家殺其夫婦以告父墓門詣縣請罪姊妹爭為謀首州縣不能决文帝聞之特原其罪唐衛孝女字無忌絳州夏人父為鄉人衛長則所殺無忌甫六嵗無兄弟母改嫁逮長志復仇㑹從父大延客長則在坐無忌抵以甓殺之詣吏稱父寃已報請就刑巡察使禇遂良以聞太宗免其罪給驛徙雍州賜田宅州縣以禮嫁之賈孝女濮州鄄城人年十五父為族人元基所殺弟疆仁尚幼孝女不肯嫁撫之能自立教伺元基殺之取其心告父墓疆仁詣有司言狀論死女請代弟髙宗憫歎并免之徙洛陽程氏女德興人肅宗時女之父兄為盜所殺因掠女去隱忍十餘年後以計脫告於刺史顔真卿捕磔於市女刳其肝心以祭其父兄宋程迥取春秋復仇之義表之曰程英孝烈女謹按貞義所激能復其仇而且求為先死卒至明君賢士感歎而赦之表之如王孝女殺長欣夫婦以告父墓姊妹爭為謀首衛孝女抵甓而殺衛長則唐太宗免其罪賈孝女教其弟伺元基而殺之而請代弟死髙宗徙之洛陽至程氏則隱忍於盜者十餘年卒以計脫程迥取其合春秋復仇之義若此等者名雖與日月爭光可也西漢郝聖姑字女君其父年四十無子惟生女君及笄欲嫁之女君曰無昆季偹養一旦適人反貽其憂堅辭不許事父母多有孝行東漢張雨夀張人張明之女早喪父年五十不嫁有弟二人雨教之讀書為之娶婦縣令謝夷吾請于上復其家吳浣紗女永嘉人居蜃川莫知姓名家貧踰笄不嫁事母孝常紡續為養人每見其夜浣紗而旦成布易以供母及母卒遂抱石自沉里人為立祠并建浣紗坊以表之齊陳氏三女㑹稽人也陳無男祖父母年八十九父篤癃病母不安其室遇嵗饑三女相率於西湖採菱蓴更日至市貨賣未嘗虧怠鄉里稱為義門多欲娶為婦長女自傷㷀獨誓不肯行祖父母尋相繼卒三女自營殯葬為庵舍居墓側唐李氏女汴人年八嵗父亡殯於堂十年朝夕哀臨及笄母欲嫁之斷髮丐終養居母喪哀號過人自營葬具州里送葬千餘人廬於墓蓬頭跣足而負土以完園塋蒔松數百武后時旌其門閭鄭孝女兖州瑕邱人早喪母父神祚為官兵死於慶州終鮮兄弟女年二十四即剪髮毁服護喪還鄉與母合葬廬墓下初許嫁李元慶至是謝不嫁大中時詔旌其門蕭氏女父歷為撫州長史父母俱卒蕭年十六與女弟毁貌載二喪歸貧不能給舟傭次宣州戰馬山舟人委柩去蕭結廬水濵與婢穿壙而葬朝夕哀臨人高其行或請婚女曰有能為我致柩葬故里請事之高安尉楊含為載二喪歸蕭乃釋服而嫁楊氏元馬英河內人父與二兄繼沒英獨事母及二寡嫂甚謹母沒負土為四墳手植松柏廬墓終身葛妙真宣城民家女年九嵗聞術者言母年五十當死即啼泣請禱誓不復嫁終身茹素祈延母壽母後年八十一卒詔褒異之金良女鄞縣人名汝安父母多疾汝安侍養惟謹及笄大家爭求聘汝安自謂父母老且病雖有兄弟馳驅門户朝夕之養奈何自是絶葷茹素夜焚香籲天祈親壽後父母俱八十餘而沒汝安居喪六年遂不復嫁鄉人以孝稱前太史危素為之贊謹按此皆以不嫁而養其親者蕭氏因揚載其父母之喪而歸始釋服而嫁之猶然不嫁之心也齊屠氏女諸暨東汙里人也父失明母痼疾親戚相棄鄰里不容女移父母逺住紵舍晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可為人療病必得大富女謂是􅀈魅弗敢從遂得病積時鄰舍人有溪蜮毒者女試療之自覺病便差遂以巫道為人療疾無不愈家産日益鄉里多欲娶之女以無兄弟誓死守墳不嫁梁羊氏名淑禕蘭陵人蕭矯妻性至孝父喪哭輒吐血母嘗有病淑禕終夜祈禱忽見一人在樹下自稱枯桑君曰若母無患今泄氣在亥南求白石鎮之言訖不見明日如言而疾愈宋焦花女定陶人母病思食鮮麥時隆冬女哭於郊其麥即穗取以奉母而疾愈謹按屠女為人療疾淑禕得方療母焦花哭於郊而麥以冬穗誠孝所召神為之通蓋如此齊永興概中里有王女年五嵗失明而孝年三十父死伏尸哭涕盡以血其少妹娥䑛其血而左目遂明人以為孝感元張氏女廬州人嫁為高垕妻母目喪明女歸省抱母泣以舌䑛之目忽能視州縣以狀聞褒異之謹按此皆親目久盲忽焉以孝女而愈者梁宛陵有女夜與母共寢母為虎所攫女啼號執虎尾行數里不舍虎毛盡落乃置其母而去詔旌表其門唐張氏二女歙人與母程氏登山採桑母為虎所攫二女號呼搏虎虎舍去母獲免刺史劉瓚為復其家表其鄉曰孝女南唐聶氏當塗貧家也年十三隨母採薪母為虎攫去女持刃跳登虎背抱虎頸極力剸之虎奮擲咆哮而斃女走報家收母尸葬之宋彭氏女年十九從父入山採樵父為虎所攫女挺身亂斫虎父得不死事聞詔賜粟帛仍命有司嵗時存問盧氏女永嘉人一日與母同行遇虎將噬母女即以身當之虎得女母乃免後有人見其跨虎而行里人為建祠於永寧鄉至理宗朝封曰孝祐元王氏女建德人至大間其父出藝舍傍遇豹為所噬曵之升山父大呼女識父聲驚趨救以父所棄鋤擊豹腦殺之父乃得生姚氏餘杭人居山谷間父出刈麥姚居家執㸑母何氏往汲澗水久而不返俄聞覆水聲亟出視之則虎􅋦其母姚倉卒往逐即以手毆虎脅鄰人因執器械以從虎乃置之去姚負母歸求藥療之得不死謹按此皆親為虎豹所噬而能捨身以救之者東漢叔先雄者犍為人也父泥和永建初為縣功曹乘船墮湍水物故尸喪不歸雄感念悲痛號哭晝夜常有自沉之計所生男女二人並數嵗雄乃各作囊盛珠環以繫兒數為訣别之辭家人每防間之經百餘日稍懈雄因乘小船於父墮處慟哭遂自投水死其夕弟賢夢雄告之曰後六日當共父同出至期伺之果與父相持浮於水上郡縣表上為立碑圖像其形焉曹娥上虞曹盱女也盱以五月五日㺯潮而死娥年十四哭於江邉即投江死越數日負父尸同浮水面上虞令度尚上其事於朝為立廟祀之唐饒娥樂平人字瓊真生小家父績漁於江溺死娥年十四哭水上不食三日死俄雷電父尸浮出鄉人具禮葬之縣令魏仲光碣其墓建中初黜陟使鄭叔則表旌其閭河東桞宗元為立碑謹按此四事皆痛父之水溺而舍生者數日之間共父尸而同浮水面其孝感鬼神之靈驗如此則生前之孝養可知矣北魏盧元禮妻李氏趙郡太守李叔允之女性至孝父卒號慟幾絶逮母卒號踊而卒有司以狀聞詔曰孔子稱毁不滅性蓋為其廢養絶類也李非嫡子而孝不勝哀雖乖俯就而志厲義逺若不加旌異則無以勸勵澆浮可追號曰貞孝女易其里為孝德里標李盧二門以惇風俗齊佩任羊緝女也烏程人隨母還舅氏母亡晝夜號哭不飲食三日而亡鄉里號曰女表唐楊紹宗妻王氏在褓而母亡繼母鞠愛之父征遼沒繼母又卒王年十二乃舉二母柩而立父象招魂以葬廬墓左永徽中詔楊氏婦在隋時父沒遼西能招魂克葬至祖父母塋隧親服版築哀感行路因賜物百假并粟以旌表門謹按正天下以敦風俗為本敦風俗以謹門內為先親死而至滅性豈不過甚然婦姑勃溪箕帚且有德色索奩治裝比比皆是固女則之不嫺實父母訓迪之未當故取此為養女者知所鑒云宋朱娥上虞人朱回女也母早亡養於祖媼里中惡少朱顔與媪競持刀欲殺媪娥年十嵗號呼突前曰寧殺我母殺媪也媪得脫女被數十刃以死事聞賜其家粟帛㑹稽令董楷為娥立像於曹娥廟嵗時配享焉唐盧甫妻李氏秦州成紀人父瀾永泰初為蘄令諭降劇賊數千人刺史曹升襲賊敗之賊疑瀾賣已執瀾及弟渤兄弟爭相代死李見父被執亦請代父遂皆遇害贈李孝昌縣君瀾渤皆贈官高愍女名姝姝父彥昭事李正己及納拒命質其妻子使守濮陽建中二年挈城歸河南都統劉元佐納屠其家時女七嵗母李憐其幼請免死為婢許之女不肯曰母兄皆不免何賴而生母兄將被刑遍拜四方女問故答曰神可祈也女曰我家以忠義誅神尚何知而拜之問父所在西嚮哭再拜就死德宗駭嘆詔諡曰愍宋詹氏紹興初淮冦破蕪湖女年十七嵗賊至欲殺父兄女趨前曰妾雖寠陋願事將軍以贖父兄命賊從之釋父兄縛女隨行數里過市東橋躍水死之謹按此皆其親遇賊而能捨身全節者夫女子生而願為之有家固父母必至之情然自能食能言即約其德於寬裕慈惠溫良恭敬先嫁三月教於公宫教於宗室雖既嫁而敬不弛於師傅其蒸諸理義者深父母之恩何可忘哉今詳録事父母之道或上書於其君或請見於其相辨寃抑救危城延宗枝廬邱隴復仇讐於數年之後矢貞亮於羣難之中甚至不嫁終身且棄其身於水於虎於賊可不謂天衷之獨摯歟凡以見聖人之教天下始閨門而逹邦國曲成若是其不遺也若夫刳股刲肝其行過甚豈可訓哉先賢有言曰貞烈自具正理孝養亦其本懷今後有毁肢體而求全親者匹婦無知不在旌表之例嗚呼此言盡之矣御定內則衍義卷二
