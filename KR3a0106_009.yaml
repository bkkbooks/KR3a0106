body:
  text: 欽定四庫全書御定内則衍義卷九大學士傅以漸恭纂禮之道殉節一曲禮曰臨難毋茍免孔子曰見危授命孟子曰生亦我所欲所欲有甚於生者故不為茍得也死亦我所惡所惡有甚於死者故患有所不避也謹按道莫大於五倫三代上臣為君死子為父死兄弟朋友相為死多見經𫝊而婦為夫死紀載寥寥豈風化淳厚有節而不著歟觀之齊王蠋曰忠臣不事二君烈女不更二夫遂自殺信乎婦為夫死古之大經故舉之以自況也然惟柏舟詩有之死之誓他經訓婦女以死者絶少竊惟忠烈道一而已臨危難而不能死者必内懐茍且之心外受威侮之奪於是欲生甚於欲義惡死甚於惡不義男安能死忠女安能死節乎故采禮經之文聖賢之論以為闈房訓悖乎是者男子而妾婦也合乎是者女子而丈夫也宋伯姬者魯宣公之女也宋恭公卒伯姬寡至景公時伯姬嘗遇夜失火左右曰夫人少避火伯姬曰婦人之義保傅不具夜不下堂待保傅來也保母至傅母未至左右又曰夫人少避火伯姬曰婦人之義傅母不至夜不可以下堂越義而生不如守義而死遂逮於火死諸侯聞之莫不悼痛以為死者不可復生財物猶可復故相與聚㑹於澶淵償宋之所喪楚貞姜者齊侯之女楚昭王之夫人也王出逰留夫人漸臺之上王聞江水大至使使者迎夫人忘持其符使者至請夫人出夫人曰王與宫人約召宫人必以符今使者不持符妾不敢從行使者曰水方大至還而取符則恐後矣夫人曰妾聞之貞女之義不犯約勇者不畏死守一節而已妾知從使者必生留必死然棄約越義而求生不若留而死使者再往取符則水大至臺崩夫人流而死王曰嗟夫守義死節不為茍生處約持信以成其貞乃號之曰貞姜謹按水火之變非强暴之汚也避水與火非蕩佚之行也伯姬貞姜似可以死可以無死乃皆謂越義不如守義有果決之志無遲囘之心何也古人之於義視之甚重而蹈之甚嚴猶懼其失焉若曰保母至矣雖不待傅可也使命來矣雖不待符可也從權以免誰或議之嗟夫若假從權之名將蹈反經之實屈於强暴流於蕩佚何所不至乎故著之殉節之首觀乎古人可死可不死之事堅決如此後之人奈何值當死之事而萌偷生之心耶息夫人者息君之夫人也楚伐息破之俘其君使守門將妻其夫人而納之於宫楚王出逰夫人遂出見息君謂之曰人生要一死而已妾無湏㬰而忘君也終不以身更二醮生離於地上豈如死歸於地下哉乃作詩曰穀則異室死則同穴有如不信死如皦日息君止之夫人不聴遂自殺息君亦自殺同日俱死楚王賢其夫人守節有義乃以諸侯之禮合而塟之代夫人者趙簡子之女襄子之姊代王之夫人也簡子既塟襄子未除服馳登夏屋誘殺代王及從者因舉兵平代地而迎其姊趙夫人夫人曰吾受先君之命事代王今十有餘年矣代無大故而主君殘之今代已亡吾將奚歸且吾聞之婦人執義無二夫吾豈有二夫哉欲迎我何之以弟慢夫非義也以夫怨弟非仁也吾不敢怨然亦不歸遂泣而呼天自殺於磨笄之地代人皆懐之謹按息代兩夫人處富貴之日既久中心有所係戀則死節為難况納於楚宫仍為王侯嘉耦歸於趙室猶稱宗國貴人乃決志自裁何其勇也楚王賢之代人懐之兩夫人豈計及此然使并兼暴主知亡國有不屈之人殘破遺民知故主有死節之配息代雖亡其流光餘烈豈與國祚俱滅哉呉南陽王和妃張氏太傅恪甥也和以太子廢為南陽王孫峻既殺諸葛恪賜和死妃自殺以從妾何氏曰如皆從死誰當字孤遂撫育其子皓及諸姬子全焉蜀李昭儀後主禪宫人也魏滅蜀以蜀宫人賜諸將之無妻者李昭儀曰我不能二三屈辱乃自殺晉愍懐太子妃王氏太尉衍女也字惠風貞婉有志節太子既廢居於金墉衍請絶婚惠風號哭而歸行路為之流涕及劉曜䧟洛陽以惠風賜其將喬屬屬將妻之惠風㧞劍拒屬曰吾太尉公女太子妃義不為逆冦所辱屬遂害之隋襄城王恪妃者循州刺史栁旦女也􅐾貌端麗年十餘以良家子合相見聘為妃未幾而恪被廢妃修婦道事之愈敬煬帝嗣位復徙邉旋命使者殺之於道恪與辭決妃曰若王死妾不獨生於是相對痛哭恪死棺歛訖妃謂使者曰妾誓與王同穴若身死得不别埋君之惠也遂撫棺號慟自經而卒見者莫不流涕隋華陽王楷妃者黄門侍郎龍涸縣公河南元巖女也巖明敏有器幹煬帝嗣位坐與栁述連事除名徙南海後㑹赦還長安妃有姿色性婉順初以選為妃未幾而楷被幽廢妃事楷愈謹毎見楷有憂懼色輒陳義理以慰諭之楷甚敬焉及江都之亂楷遇害宇文化及以妃賜其黨元武達初以宗族禮之置之别舍後因醉而逼之妃自誓不屈武達怒撻之百餘詞色彌厲元自毁其面血淚俱下武達釋之妃謂其徒曰我不能早死將見侵辱我之罪也因不食而卒唐廣徳公主宣宗女也為高陵于琮妻琮為保衡貶韶州公主偕之韶州行則肩輿相隨坐則執琮之帶琮由是獲全及琮為黄巢所殺欲脅公主公主曰我唐氏之女誓與僕射俱死賊宜殺我巢不許乃縊室中主治家有禮法從琮韶州侍者纔數人郤州縣餽遺凡内外冠婚喪祭主皆身自答勞疏戚咸得其心為世聞婦謹按爵秩彌髙則名義彌重妃嬪公主遭遇危難死其分也然稽之史册以殉節著者不多見豈非貪生怖死貴賤同情蹈白刃甘鼎鑊固未易言耶呉南陽王妃死於奸臣隋襄城公主死於暴主蜀李昭儀死於敵國晉愍懐太子妃隋華陽王妃唐廣徳公主死於亂賊或慷慨引決或從容就義其大節則一也秦苻登妻毛氏美而勇善騎射登為姚萇所襲營壘既䧟毛氏猶彎弓跨馬率壯士數百人與萇交戰殺傷甚衆衆寡不敵為萇所執萇欲納之毛氏罵曰吾天子后豈為賊冦所辱何不速殺我因仰天大哭曰姚萇無道前害天子今辱皇后皇天后土寧不鑒照萇怒殺之燕段豐妻慕容氏燕主徳之女也有才慧善書史能鼔瑟封為平原公主年十四適豐豐為人所譖被殺慕容氏寡歸將改適夀光公餘熾慕容氏謂侍婢曰我聞忠臣不事二君貞女不更二夫段氏既遭無辜已不能同死豈復有心於重行哉今主上不顧禮義嫁我若不從則違嚴君之命矣於是剋曰禮成慕容氏偽辭以疾熾亦不逼之三日還第沐浴置酒言笑自若至夕宻書其裙帶云死後當埋於段氏墓側魂魄有知當歸彼處遂於浴室自縊而死及塟男女觀者數萬人莫不嘆息曰貞哉公主涼吕纂妻楊氏宏農人也美艶有義烈纂被吕超所殺楊氏與侍婢十數人殯纂於城西將出宫超慮齎珍物出外使人捜之楊氏厲聲責超曰爾弟兄不能和睦手刃相屠我旦夕死人何用金寶超慚而退又問楊氏玉璽所在楊氏怒曰盡毁之矣超將妻之謂其父桓曰后若自殺禍及鄉宗桓以告楊氏楊氏曰大人本賣女以圖富貴一之已甚其可再乎乃自殺時吕紹妻張氏亦有操行年十四紹死便請為尼吕隆見而悅之欲改其行張氏曰欽樂至道誓不受辱遂升樓自投於地二脛俱折口誦佛經俄然而死謹按兩晉間割據諸國如苻登慕容徳皆繼父兄餘業非亂晉之戎首也吕氏隔絶上國竊號遐􅑍視劉淵軰亦有間焉但君臣大義毫無所知或故臣操戈或同宗推刃綱常幾乎熄矣乃毛氏楊氏張氏以名節自任以悖逆責人慕容氏既盡夫婦之倫又善處父子之際豈非間氣所鍾不與濁世同汚耶使當時三國之臣皆如諸婦之執節安見前秦燕涼俄傾覆滅也宋謝枋得妻李氏饒州安仁人也美而慧通女訓諸書嫁枋得事舅姑奉祭待賔皆有禮枋得起兵守安仁兵敗逃入閩中武萬户以枋得豪傑恐其扇變購捕之根及其家人李氏擕二子匿貴溪山荆棘中採草木而食至元十四年冬元兵蹤跡至山中令曰茍不獲李氏屠而墟李聞之曰豈可以我故累人吾出事塞矣遂就俘明年徙囚建康或指李言曰明當没入矣李聞之撫二子悽然而泣左右曰雖没入將不失為官人妻何泣也李曰吾豈可嫁二夫耶顧謂二子曰若幸生還善事吾姑吾不得終養矣是夕解裙帶自經獄中死枋得母桂氏尤賢達自枋得捕播婦與孫幽逺方處之㤗然無一怨語人問之曰義所當然也人稱為賢母云遼耶律中妻蕭氏小字綏蘭聰慧謹愿年二十歸中事夫敬順天慶中為賊所執潛置刃於履誓曰人欲汚我者即死之至賊夜遁而免久之帝召中為五院都監中謂妻曰吾本無宦情今不能免吾當以死報國汝能從我乎綏蘭對曰謹奉教金兵狥地嶺西盡徙其民中守節死綏蘭悲戚不形於外人怪之俄躍馬突出至中死所自殺韓慶民妻慶民仕遼為宜州節度使天㑹中攻破宜州慶民不屈而死以其妻配將士其妻誓死不從遂自殺世宗讀太宗實録見慶民夫婦事嘆曰如此節操可謂難矣金金源郡夫人尹氏完顔珠爾之妻也珠爾系出蕭王天興二年正月從哀宗為元帥戰死黄陵岡尹氏聞珠爾死聚家資焚之遂自縊年三十一珠爾贈官弟長住即日詔補侍衛元余忠宣公闕天人蔣氏廬州人公守安慶時城䧟夫人率其女福童赴水死閔本妻程氏河内人本為集賢學士有子一女二明兵至本謂程曰吾當死於忠程曰君能死忠妾敢愛其生乎夫婦自縊二女見父母死悲號哭泣亦縊本旁少男歸河内明花夫人郜氏懷逺人東邱侯花雲妻也陳友諒䧟太平雲死郜氏以子煒囑付侍兒孫氏即以死殉翁氏池州貴池人建文朝禮部侍中掌尚寶司事黄觀之妻文帝師入京索𫝊國寶不得或言黄尚寶已赴上游起兵文帝命執其妻翁氏并二女配象奴翁叱奴取釵釧出市酒餚遂携二女率家屬十人赴淮清橋下溺焉先是觀募兵至安慶聞京師已定哭語人曰吾妻素有志節必不受辱因招䰟塟之江上明日家僮逃至果如其言觀亦自投羅刹磯而死謹按此皆文武尊貴侍從之臣盡忠執節而其妻能以死殉者謝枋得黄觀舉義而死耶律中閔本不屈而死韓慶民完顔珠爾余闕花雲力戰固守而死皆烈丈夫之錚錚者使其妻或茍免或失身豈非九京遺憾哉乃李氏將死囑子以事姑翁氏被收率女而溺水蕭氏諾夫以報國程氏隨夫以死忠韓氏之婦及尹氏蔣氏郜氏決志自裁從夫黄壤是皆足以吐本國之氣增忠臣之光誠賢媛之不朽者若謝氏之母子婦孫罹禍而處之泰然以為義當如是尤為人情所難也晉賈渾妻宗氏渾為介休令為劉元海將喬晞攻破死之宗氏有姿色晞欲納之宗氏罵曰屠販奴害人之夫而欲加無禮於爾安乎何不促殺我因仰天大哭晞遂害之時年二十餘隋裴倫妻栁氏河東人少有風訓大業末倫為渭源令為賊薛舉所䧟倫遇害栁氏時年四十有二女及兒婦三人皆有美色栁氏謂曰我軰遭逢禍亂汝父已死我自念不能安汝我門風有素義不受辱於羣賊我將與汝等同死如何女等垂泣曰唯母所命栁氏遂自投於井其女及婦相繼而下皆死井中唐韋雍妻蕭氏張宏靖鎮幽州表雍在幕府朱克融亂雍被刼蕭氏聞難與雍皆出左右格之不退雍臨刄蕭呼曰我茍生無益願今日死君前刑者斷其臂乃殺雍蕭意象㤗然觀者哀嘆是夕死太和中楊志誠表其烈詔贈為蘭陵縣君元富珠哩逺妻雷氏順陽人逺為襄陽尹拒賊被害雷氏為賊所執欲妻之乃詆賊曰我魯叅政冡婦縣令嫡妻肯從汝狗彘生遂見殺闞文興妻王氏名醜醜建康人文興從軍漳州為其萬户府知事王氏與俱行至元十七年陳吊眼作亂攻漳州文興率兵與戰死之王氏被掠義不受辱乃紿賊曰吾塟夫即從汝也賊許之遂得脱負屍還積薪焚之火既熾自投火中死至順三年事聞贈文興侯爵諡曰英烈王氏曰貞烈夫人有司為立廟祭祀號雙節云張正䝉妻韓氏紹興人正䝉嘗為湖州徳清稅務提領至正十九年紹興兵變正䝉謂韓氏曰吾為元朝臣子於義當死爾能從我死乎韓氏曰君果能死於忠吾必能死於節遂俱縊死其女池奴年十七泣曰父母既亡吾何以獨生亦投崖而死謹按此皆令長從事小臣盡忠執節而其妻能以死殉者賈渾裴倫孛术魯逺官不過銅符墨綬韋雍闞文興張正䝉則幕府屬吏税務㣲員而已其妻亦豈膺崇封享厚䘵哉乃夫婦俱死何其烈也誦諸婦罵賊之言告夫之語訓婦之詞皆發自至性闗乎人紀寧徒遇窮而畢命耶若裴氏女婦以及正䝉女張池奴投井投崖是亦不愧其父母者矣漢安定皇甫規妻禮宗規初喪室家後更娶之善屬文時為規答書記衆人怪其工及規卒時年猶盛而容色美董卓為相國聞其名聘以軿輜百乘馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳情辭甚酸愴卓使傅奴侍者㧞刀圍之而謂之曰孤之威教欲令四海風靡有何不行於一婦人乎妻知不免乃立罵賊曰君毒害天下猶未足耶妾之先人清徳奕世皇甫氏文武上才為漢忠臣君親非其趨使走吏乎敢欲行非禮於爾君夫人耶卓乃引車庭中以其頭懸軶鞭箠交下妻謂持杖者曰何不重乎速盡為惠遂死車下後人圖畫號曰禮宗云遼耶律珠展妻蕭氏小字鄂爾本國舅貝勒之女性端慤有容色自㓜與他女異年十八歸珠展謹裕貞婉娣姒推尊之及居珠展喪極哀毁既塟謂所親曰夫婦之道如隂陽表裏無陽則隂不能立無表則裏無所附妾今不幸失所天且生必有死理之自然吾夫早嵗登朝有才不夀天禍妾身罹此酷罰復何依恃倘使者可見則從不可見則當與俱侍婢慰勉竟無囘意自刃而卒金參政完顔蘇蘭妻當崔立之變謂所親曰吾夫有天下重名吾豈肯隨衆䧟身以辱吾夫乎今日一死固當但不可無名而死亦不可離吾家而死即日縊於室元張棟妻王氏大都人大都被兵語家人曰吾狀元妻義不可辱赴井死其姑哭之慟亦赴井死謹按念祖徳愛家聲即男子猶或難之乃皇甫規之妻稱其家清徳奕世其夫文武上才為漢忠臣甘死杖下耶律氏完顔氏之妻則以其夫有才名張氏之妻則以其夫為狀元皆有死無二夫女子歸名家而配賢耦猶男子仕上國而遇明主也一旦遘非常之變得死為幸然而明此義者少矣故表諸婦以風世焉唐李廷節妻崔氏乾符中廷節為郟城尉王仙芝攻汝州廷節被執賊見崔姝美將妻之詬曰我士人妻死亡有命奈何受賊汚賊怒刳其心而食之金李寶信妻王氏寶信為義豐縣令張㲄以平州叛王氏䧟賊中賊欲汚之王氏罵賊賊怒遂支解之大定十二年贈貞烈縣君元安志道妻劉氏順州人志道及劉氏之弟明理並登進士第劉氏避兵巖穴中軍至欲汚之劉氏曰我之弟與夫皆進士也我豈受汝辱乎軍士以兵磨其體劉大罵不輟聲軍怒乃鈎其舌殺之鄭琪妻羅氏名妙安信州弋陽人㓜聰慧能諳誦烈女𫝊年二十歸琪琪家世宦族同居百餘人羅氏執婦道無間言琪以軍功擢鉛山州判官羅氏封宜人至正二十年信州䧟羅氏度弋陽去州不逺必不免於難取素所佩刀淬礪令銛甚琪問何為對曰時事如此萬一遇難為自全計耳已而兵至羅氏自刎死時年二十九金氏詳定使四明程徐妻也京城既破謂其女曰汝父出捍城我三品命婦汝儒家女又進士妻不可受辱抱二嵗子及女赴水死謹按此皆仕宦之婦遭兵亂而死者其夫之遇害與否史無明文然以事理推之似亦非偷生之流也女子歸於宦室名節亷恥較重於人乃諸婦之刳心支解斷舌其死亦較烈於人至淬礪佩刀早為引決之計尤非徒倉卒捐生者皆可謂不辱其家矣雖然使仕宦之家耽佚樂而忽禮義平日無貞烈之教臨難安得有果決之節哉唐郭待徴妻薄氏從待徴官江隂袁晁亂薄為賊所掠將汚之不從語家媪使報待徴曰我義不辱即死於水賊去得其屍義聲動江南李湍妻湍籍呉元濟軍元和中自㧞歸烏重𦙍妻為賊縛而孌食之將死猶號湍曰善事烏僕射觀者嘆泣重𦙍請以其事屬史官詔可金馮妙真刑部尚書延登之女也生十有八年適進士張慥興定五年慥為洛川主簿元兵破葭州綏徳遂入鄜延鄜人震恐具守備守臣以西路輸芻粟不時至檄慥詣平涼督之時延登為平涼行省員外郎慥欲偕妙真以往妙真辭曰舅姑老矣雖有叔姒妾能安乎子行妾留奉養十一月洛川破妙真從舅姑匿窟室兵索得之妙真泣與舅姑訣曰婦生不辰不得終執箕箒義不受辱即擕三子赴井死縣人從而死者數十人明年春慥發井得屍殯於縣之東廓外死時年二十四李英妻張氏英初為監察御史在中都張居濰州貞祐元年冬元兵取濰州入其家張氏盡以所有財物與之既而令張氏上馬張曰我盡以物與汝猶不見贖邪答曰汝品官妻當復為夫人張曰我死則為李鬼堅坐不起遂見殺追封隴西郡夫人諡莊潔英仕至御史中丞王氏安陽人進士郭丙妻也海陵王南遷丙避亂居杞及元兵渡河夫婦相失王氏及少女俱被掠泣謂女曰今夕不死必被辱矣吾勢不能顧汝守者少緩遂投河死富察氏字明秀鄜州人訥申之女完顔長樂之妻也哀宗遷歸徳以長樂為總領將兵扈從將行囑富察氏曰無他言夫人慎毋辱此身明秀曰君苐致身事上無以妾為念妾必不辱長樂一子尚㓜出妻柴氏所生也明秀撫育如己出崔立之變驅從官妻子於省中自閲之富察氏聞以㓜子付婢僕且與之金帛親具衣棺祭物與家人訣曰崔立不道强人妻女兵在城下吾何所逃惟一死不負吾夫耳汝等善養㓜子遂自縊而死時年二十七元王宗仁妻宋氏永平人進士宋家女從夫避兵俱為所掠行至玉田縣有窺其色美欲害宗仁者宋氏顧謂夫曰我必不以身累君擕一女投井死時年二十九額森呼圗克大寜路逹嚕噶齊特穆爾巴哈之妻以夫恩封雲中郡君夫坐事免官居大寧至正十八年紅巾賊至額森呼圗克與妾玉蓮走尼寺中為賊所得今與衆婦縫衣拒不肯為賊嚇以刃額森呼圗克罵曰我逹嚕噶齊妻也汝曹賊也我不能為針工以從賊賊怒殺之玉蓮因自縊者三賊乃併殺之先是其子旺扎勒特穆爾年十四與父出城見執於賊旺扎勒哭請以身代父死賊愛旺扎勒姿秀挈以從久之乃獲脱歸訪母屍並玉蓮塟焉謹按此文武官夫存而婦死者李湍之自㧞張慥之督糧完顔長樂之扈駕是皆忠於王事得節妻而益光其餘或服官或避兵或遇亂所遭不辰而其妻激烈以死不貽薦紳之辱亦夫之幸也旺扎勒以穉子請代父死訪塟母屍豈非節義有𫝊乎若李湍妻勉夫之言富察氏宋氏告夫之言薄氏馮妙真訣舅姑王氏訣女之言張氏額森呼圗克抗賊之言迄今誦之猶足愧懦夫之心振烈士之氣矣明潘氏睢州人曹文道妻文道領鄉薦不第而卒於途喪至潘出己所服衣盡焚之自縊而死又州學生皇甫迪妻潘氏迪卒潘亦自縊俱成化二十二年旌表陳貞婦新淦人㓜納庠生黄體堅聘堅謫吏金陵貽書娶陳父母欲易他女以往陳曰吾命也遂遣歸後體堅以罣誤棄市累訴不得白徒歩收其屍殮而瘞之乃自經於柩側范氏字蟾香歸徳人郡士王輔妻輔疾范籲天願以身代及卒從容自縊於柩側遂同塟提學楊維聰扁曰貞節許氏同安人生員洪伯大妻數年無子勸伯大娶妾陳氏生二子伯大遘疾許氏水漿不入口數泣誓曰君不起妾寧獨生及卒歛畢許氏收遣書付陳囑以善撫㓜穉陳初不覺許遂潛入卧内自縊而死謹按舉監生員以及儒士皆士之未仕者也古之喻士者以女言守身如處子而不妄從人也賛女者以士言行事如君子而動必以禮也國家之於士㧞之棘闈教之太學養之膠庠豈非望以名節顯哉其配有循理守義之死靡他者是亦教化所漸而女之有士行者矣故采數婦著之唐何氏於潛人莫氏之婦夫死年猶盛誓不嫁養姑至孝黄巢亂隣里皆奔徙何氏以姑羸卧疾不可與俱抱姑涕泣賊至號慟告賊請代姑死賊乃掠何氏去將汚之植刃使懼何氏跪請櫛沐更衣因解𥜗自縊賊義而瘞之宋張廷榮妻王氏夀光人宣和間賊邢貞執其翁王以金帛贖之又欲逼其從王怒罵不止遂見殺時年二十詔旌其門廷榮後歸金中進士王氏二女膠州人靖康中金人南下二女從姑避難俱為所獲二女紿賊曰釋我姑吾當從汝賊信之姑既去俱溺海死親族收其屍埋之題曰雙女塜葉氏長汀人石城頼仲元妻事舅姑無間言仲元遊嶺表未還建炎中盜起葉以舅姑年邁勢不能遁委命以待俄冦至悉驅閭里婦女葉極口罵賊以身觸刃冦怒斷其喉舌子女皆遇害謝天與妻鄧氏武進人夫卒其姑以哭子喪明鄧氏竭力侍養元兵猝至鄧氏抱姑避牛舍兵至火其廬急扶姑匿後圃鄧氏被擊驅之行遇漕渠潛脱所擊赴水死元俞士淵妻童氏嚴州人姑性嚴待之寡恩童氏柔順以事之無少拂其意至正十三年賊䧟威平官軍復之巳乃縱兵剽掠至士淵家童氏以身蔽姑衆欲汚之童氏大罵不屈一卒以刀擊其左臂愈不屈又一卒斷其右臂罵猶不絶衆乃皮其靣而去明日乃死陳氏名道囘古田蔣國琇妻至正十三年紅巾賊破縣國琇親族俱被殺道囘太姑蘇妙仁為賊所擒懇告願代其死賊殺其太姑執道囘義不受辱自刎而死邑上其事於朝旌表其門明何氏進賢胡煌妻正徳六年冦至姑老疾艱於行何負之踰墻避焉姑尋以警卒冬冦復至家人逃匿何泣守姑柩不去遂被執以行至若腸坡曰此死所也胡不殺我遂罵不絶口投入坡死次日夫往收其屍儼然若生謹按此皆烈婦之為舅姑父母死者夀光王氏贖舅於潛何氏代姑武進鄧氏匿姑膠州兩王氏紿賊釋姑而姑得免古田陳氏請代太姑而太姑不免是有幸不幸焉嚴氏童氏以身蔽姑姑生死不可知進賢何氏始而匿姑既而守姑柩不去石城葉氏以舅姑老不能避委命以待此諸婦者豈非執節而孝愈彰盡孝而節彌著者乎向使其視舅姑與父也輕而視身也重則忘親而擇便未必不可以偷生乃諸婦至性所發毅然就死無少濡滯彼親之獲全者固幸有賢婦即親之偕亡亦可無遺恨矣元鮑琪妻呉氏歙人事姑至孝至正十六年官軍復郡城遊卒哨掠人避之呉氏獨以姑疾侍不去姑忽思莧乃懐㓜兒出采莧遇遊卒欲汚之不屈復大罵卒怒斬之蹴屍入澗中猶抱其兒不置姚臨妻金氏宜興人聰慧知書事姑孝謹元末兵起臨挈老父入太湖遊兵迫之金度不免乃與夫訣曰汝有老父宜善保我誓不受辱即抱㓜女赴水死明徐氏鄭翰卿妻山隂儒家女嫁未逾月而翰卿遊山右十年不返徐奉舅姑極敬順姑疾劇籲天自代疾果愈後翰卿歸甫旬日病卒徐營塟畢遂絶食七日死虞氏弋陽人李元順妻事舅姑孝敬正徳壬申流賊剽掠順挈家以逃賊勢迫虞度難免㧞簮遺夫曰吾分死矣決不受辱子為父母計耳果被掠罵甚厲賊殺之謹按𫝊曰求忠臣於孝子之門良以忠孝同出至性未有不孝於親而能盡忠於君者也呉氏死於亂卒徐氏則以夫亡從金氏虞氏則囑夫以全舅姑而身自守死乃考其平日無不以孝著者豈非即此至性處常則篤於大倫遇變則發為大節乎治國者當求正直之臣治家宜擇端謹之婦茍不辨之於平日而欲望之於一朝豈可得哉元張納妻劉氏藍田人納為監察御史早卒劉守志不二河東受兵劉氏二子衡衍俱以事出外度不能自脫遂與二婦孫氏姚氏決死盡發貲囊分給家人婦姑同縊死華氏大同張思孝妻為摩該兵所執以不受辱見殺其婦劉氏僵壓姑屍大罵不已兵併殺之後家人殮其屍姑婦之手猶相持不捨沈景新母妻平江人至正中景新調上海吏苗軍大肆殺掠母與婦謀曰吾家素清白義不受辱尋為苗軍所擒曰爾能從我不殺汝婦姑大罵苗軍怒刃其姑縛婦髪馬尾曵殺之謹按訓婦職者姑道也奉姑教者婦道也平居無事之時各盡其道猶或難之況危難之際乎乃諸婦決死如是其堅罵賊如是其烈至既没之後婦姑之手猶相持不解豈非至性使然哉宋呉世静妻凃氏進賢人夫早卒止有一女勵志守節淳祐中北兵遊騎至章江凃氏撫其女曰世亂如此無辱身相擕赴水死金劉氏蒲城人許古妻貞祐初賊圍急劉恐見驅為所汚與二女相繼自盡貞祐四年追封劉氏為郡君諡貞潔長女諡曰定姜次曰諡曰肅姜以其事付史館元韓軏妻邢氏安陽人至正十七年盗䧟河朔時軏知林州守黄華砦攻之甚急邢語其女曰恐事不濟吾與汝必受辱遂俱投崖而死王世明妻李氏名賽兒房山人至正二十五年珠占軍至縣李氏與其女李家奴皆被執世明隨至軍軍怒逐之李氏謂其女曰汝父既為軍所逐吾與汝必不得脱與其受辱不若死女曰母先殺我李氏即以軍所遺鐶刀殺其女遂自殺珠占聞之為之塟祭仍書其門曰王世明妻李氏貞節之門有司上其事為樹碑焉明陳氏豐城人諶烓妻烓為江州巡司掾流冦掠其境烓被執陳氏同女夀華俱美色賊欲汚之遂殺烓陳指賊厲罵賊怒又殺之夀華哭抱二屍以血塗面籲天而呼復厲聲以罵賊又殺之有司竒其節聞之旌表謹按母女天性視姑婦尤為親暱是以母之愛女恒甚於婦女之戀母恒甚於姑然而死生之際人各有心捐生就死亦不易矣乃考宋金元明得母女同死者若而人嗟夫姑息非慈也率女以死是為賢母阿意非孝也從母而死是為肖女故並著之元焦士亷妻王氏博興人養姑至孝至正十七年毛貴作亂官軍競出刼掠王氏被執紿曰我家墓田有藏金可共取也信之隨王氏至墓所王氏哭曰我已得死所矣實無藏金汝可於此殺我與妾杜氏皆遇害王容妻陳氏溧水人與其妾汪氏俱年少容死子㓜至正間淮兵䧟城力脅二氏不從俱餓死後贈貞烈余同祖妻曹氏茶陵人父徳夫教授湖湘間同祖在諸生中因以女妻焉至正二十年茶陵䧟曹氏聞婦女多被驅逐謂其夫及子曰是尚可全生乎我義不辱身以累汝也顧舅年老汝等善事之遂自剄死妾李氏驚抱持之不得亦引刀自剄絶而復蘇曰得從小君地下足矣是夕死都哩巴哈妻妾䝉古人巴哈拜江西行省參政土寇金榮作亂巴哈死其妻布延氏妾高麗氏在側不去皆大罵曰我平章遇爾父子至厚何暴逆至此皆遇害明高氏武城人王俊妻天順三年夫卒與其妾蔣氏同縊死柩側三人同穴而塟旌曰雙烈謹按易稱二女同居其志不相得況妻妾之際乎時當承平境處安樂妻惠其妾妾敬其妻未易多得乃諸婦遘變相率就死何其志之同也或潔身而不辱於寇或從死而不忘其夫節則成雙徳則合一誠足光史𫝊而勵風俗矣世多有妻妾誶語於室以相妬遺誚者既不知處常又何能處變耶晉緑珠石崇妾也姓梁氏孫秀得寵於趙王倫使人求之崇出諸妾美麗者使任所取使者曰奉命求緑珠他人無與也崇曰緑珠吾所愛不敢承命使者乃返後秀族滅崇家崇謂緑珠曰吾為汝受禍汝將如何緑珠曰妾終不負君乃自墜樓而死張天錫妻閻氏薛氏咸有寵於天錫天錫寢疾謂之曰汝二人將何以報我吾死後豈可為人妻乎皆曰尊若不諱妾效死供灑埽地下誓無他志及其疾篤則二姬皆自刎天錫疾瘳追悼之以夫人禮塟焉宋趙淮妾長沙人也徳祐中從淮戍銀樹壩淮兵敗俱執至𤓰州元帥烏珠使淮招李廷芝淮陽諾至揚城下乃大呼曰李廷芝男子死耳毋降也元帥怒殺之棄其尸江濵妾俘一軍將帳中乃解衣中金遺其左右告之曰妾夙事趙運使今其死不塟妾誠不能忘情願掩埋之當終身事公無憾矣軍將憐其言使數兵輿如江上妾聚薪焚淮骨置瓦缶中自抱持操小舟至急流仰天慟哭躍水而死明楊氏大同左衛指揮使范安妾居常克敦婦道宣徳中夫陣亡楊即自縊以殉家人止之不從詔贈淑人竇烈婦餘姚姜榮妾京師人榮判瑞縣䕶郡印時華林賊攻䧟其城突入郡堂竇匿其印而榮未之知也賊竟擄竇以行去數里賊中有一郡民求歸賊許焉竇乃宻語以印之所在俾歸以告榮再行見道旁有井紿賊求飲遂投井而死謹按此皆妾之以死殉夫者緑珠之墜樓不屈於兇暴趙妾之赴水不屈於仇讎楊氏之死不愧盡忠之夫至閻薛兩夫人死而夫之疾幸瘳竇烈婦死而夫之印不失其事尤異焉抑又論之張天錫忠於晉趙淮忠於宋范安忠於明其妾殆亦忠義所感若石崇之侈毋乃有愧於妾婦乎御定内則衍義卷九
