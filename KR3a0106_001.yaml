body:
  text: 欽定四庫全書御定内則衍義卷一大學士傅以漸恭纂孝之道事舅姑内則曰婦事舅姑如事父母雞初鳴咸盥潄櫛縰笄總衣紳左佩紛帨刀礪小觿金燧右佩箴管線纊施縏􅐆大觽木燧衿纓綦屨以適舅姑之所及所下氣怡聲問衣燠寒疾痛疴癢而敬抑搔之出入則或先或後而敬扶持之進盥少者奉槃長者奉水請沃盥盥卒受巾問所欲而敬進之柔色以温之謹按此言事舅姑之道也女子在室所受者父母之恩所奉者父母之教既嫁所受者舅姑之恩所奉者舅姑之教故盡孝之道無異鷄鳴而起滌手濯口梳髪韜以黑帛而加簮又用帛束髪之根而垂其餘被衣加帶凡施於己之身者無不肅矣左佩拭器拭手之二巾小刀及礪刀之石解小結之觽向日取火之金燧右佩針與藏針之管并絲線絨線而藏於縏袠二囊以及鑽火之木燧凡適於舅姑之用者無不備矣然後結香囊繫履而徃葢未至舅姑之所而其敬已如此及至舅姑之所問衣之寒燠而加減之體之痛癢而按摩之出入則先後扶持沃盥則少長侍奉且必請所欲而進焉其敬又如此夫婦事舅姑而無所不敬可謂孝矣然其要則在下氣怡聲柔色此皆發乎中形乎外而不自知者茍非孝舅姑之心素篤於平日豈能矯飾於一時哉内則曰子婦孝者敬者舅姑之命勿逆勿怠又曰在舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖逰不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔又曰舅姑之衣衾簟席枕几不𫝊杖屨祇敬之勿敢近敦牟巵匜非餕莫敢用與恒食飲非餕莫之敢飲食謹按凡婦之事舅姑也莫不欲孝而或至於逆莫不欲敬而或至於怠皆起於適己之便而遂弛其孝敬之心今觀聖人所訓如應對進退周旋出入升降皆人所謂小節也而必不敢忽口之噦噫咳唾身之欠伸跛倚目之睇視鼻之垂洟寒而襲癢而搔人所謂常情也而必不敢恣以至舅姑所服之衣履所用之几杖所臥之衾枕簟席盛黍稷之敦牟盛酒之巵盛水漿之匜皆不敢慢即尋常之飲食茍非舅姑所餘亦不敢飲食豈復有適己之便而弛其孝敬之心者乎乃知婦道莫不善於敢莫善於不敢充其敢之心則凡犯上亂家之事無所不為矣充其不敢之心則凡敬上冝家之事亦無所不盡矣是故婦道貴柔而惡剛也禮記昏義曰成婦禮明婦順又申之以著代所以重責婦順焉也婦順備而後内和理内和理而後家可長久也故聖王重之謹按古禮娶婦之明日婦沐浴執贄以見舅姑所以成為婦之禮盛豚肉於爼以饋舅姑所以明婦之當順又明日舅姑共行饗婦之禮所以著𫝊代内治之意其重之者至正其責之者深葢内治之道順則和不順則悖順則理不順則亂自上及下未有和理而不昌悖亂而不敗者且深思傳代之意今日為人婦者異日即為人姑我以和理創而後之為婦者皆師其和理焉其家雖百世不替可也我以悖亂創而後之為婦者皆師其悖亂焉其家雖一𫝊而覆可也奈何狃目前而不訃長久乎詩思齊之首章曰思齊太任文王之母思媚周姜京室之婦謹按周太王之妃曰太姜生子王季娶摯國任姓仲女生文王是為太任太任能盡婦道以事其姑太姜故詩人美之既稱其敬又稱其愛凡婦之事姑不本之於敬則雖愛其姑而易至於狎不將之以愛則雖敬其姑而易至於疎惟太任敬而且愛則必能深得乎太姜之心矣事太姜如此事王季可知夫以諸侯之女嫁為諸侯之妃處富貴而克盡婦道其育聖子開丕基不亦宜乎漢曺大家女誡曲從章曰舅姑之心豈當可失哉物有以恩自離者亦有以義自破者也夫雖云愛舅姑云非此所謂以義自破者也然則欲得舅姑之心奈何固莫尚於曲從矣姑云爾而是固宜從令姑云爾而非猶冝順命勿得違戾是非争分曲直此則所謂曲從矣故女憲曰婦如影響焉則可賞謹按漢班彪女名昭嫁曺壽賢而有學和帝嘗召入宫后妃皆以師禮事之宫中尊稱為曺大家作女誡七章此章則訓以曲從舅姑也大家謂為婦者固當得夫之心尤當得舅姑之心凡物有恩深而不得不離者亦有義重而不得不破者夫雖愛其妻而舅姑惡之則必至於恩離義破矣故必曲從舅姑以得其心無論姑言是非有順從而無爭抗若女憲之書所云婦之順姑如影之随形響之應聲則受其賞愛必矣此葢曺大家恐婦人任己見而抗舅姑故以曲從為誡其所謂姑言之非者不過偏執任性之類非誠大悖於理也若果大悖於理則禮有諌親之法豈可順從非道以誤舅姑哉漢明帝為太子時伏波將軍馬援女年十四選入太子宫承光烈隂太后禮敬飭備明帝即位有司請立后帝未有所言皇太后曰馬貴人徳冠後宫其人也遂立為后謹按后妃自周而後惟漢明徳馬皇后為備美乃史所首稱則在承事隂后禮敬飭備豈非為婦之道以孝姑為重哉孝之發乎外者為禮孝之存乎中者為敬禮與敬咸飭備焉則儀文之間既無一節之或缺心志之内又無一念之不誠葢得諸學問者深而不獨生質之美矣隂后之擇婦以徳馬后之承姑以孝誠皆宫闈盛事可為後世法者也唐髙祖太穆竇皇后父周上柱國毅母周武帝姊襄陽長公主后為女子時隋受周禪后哭自投牀下曰恨我生不為男不能救舅家禍毅遽掩其口曰毋妄言然甚竒之畫二孔雀屏間曰射中者許婚中者以十數而毅私念必中目乃許髙祖最後入請抽兩矢射兩目皆中乃歸髙祖時元貞太后老矣素羸有疾而性嚴諸娣姒皆畏憚莫敢前侍后怡謹盡孝養至淹月不釋衣履太后安之謹按一代之興必有賢后佐之觀唐髙祖射中畫雀兩目而婚竇后豈非天與后為女子時深痛隋之取周葢英毅有大志者乃事元貞太后又何其婉順也志不大不足以贊開國之謨心不小不足以盡承親之道唐髙宗而下後宫頗有才慧而反以致亂益信婦道以孝謹為本寜徳勝於才可也唐太宗文徳皇后長孫氏隋左衛將軍晟女也太宗初為秦王時太子建成齊王元吉内結髙祖諸妃日夜譖愬后事高祖盡孝謹承諸妃嬪深自遜抑以消釋嫌猜謹按唐太宗為建成元吉搆害長孫后不贊剪除而圗消釋上則孝謹以事高祖下則謙抑以承諸妃處人父子兄弟之間可謂曲盡其道矣宋英宗宣仁高皇后亳州蒙城人太尉瓊曽孫女也后仁明有至徳動循禮法事光獻曺太后忠敬竭婦道帝疾病兩官有違言后益祗敬諧合卒以調和神宗憲肅向皇后河内人宰相文簡公敏中曽孫女也哲宗即位尊為皇太后太皇太后命葺故慶壽宫以居辭謝曰安有姑居西内而婦處宫東者乃即慶壽後殿為隆祐宫居之哲宗孟皇后太尉都虞候元孫女也年十六選入宫婉順敦慤太皇太后及向太后皆愛之教之女儀太后手詔言孟氏女能執婦道冝正位中宫既册立為皇后太后謂哲宗曰天子得賢内助於國家慶非細也髙宗時尊為隆祐太后誕辰帝張宴宫中前上壽歡甚太后忽泣數行下帝請故后慨然曰宣仁太后之賢古今母后未有其比為姦臣所詆誣雖詔下明辯而國史未有定後世何知焉吾意在天之靈不無望於上帝聞之悚然明日命范冲更修神宗哲宗實録諸姦詆誣狀畢露本太后發之也謹按宋世賢后曺高向孟皆以母儀著然考其婦道率孝謹恭淑曺后之立不及事真宗三后高后祗敬諧合調和英宗母子之間向后以太后處西内為婦者不敢處宫東孟后以婉順敦慤得高向兩太后心又為高太后辯詆誣定信史皆孝姑之大者由是觀之安有不能盡婦道而能隆母儀者哉宫壼之内得賢甚難宋獨四世繼美姑作之婦述之内治如此宜其國運之昇平而風俗之醇茂也隋蘭陵公主高祖女也性婉順好讀書高祖愛之年十八適河東栁述謙順修婦道事舅姑甚謹有疾奉湯藥必親唐襄城公主太宗女也適蕭瑀子鋭性孝睦動遵禮法帝勅諸公主師焉有司請為營别第樹闕如制主辭曰父事舅姑如事父母異宫則定省闕焉敢即安乎帝悦命即瑀第門列雙㦸表焉和政公主肅宗女也適栁潭安禄山䧟京師姑寜國公主方嫠居出走主棄三子以馬載姑與潭徒走從行日百里潭躬薪水主躬爨以養岐陽公主憲宗女也有美質為帝所鍾愛謂宰相曰我嫡女及笄矣賢願得佳壻必不與豪貴人宰相李吉甫進曰先司徒杜佑有嫡孫名悰始冠端而文臣嘗為司徒吏習服其家法可配也帝立召見悰與語悦之授殿中少監以主適悰杜氏故禮法名家主婉順奉上屏息拜起同家人子禮二十餘年後姑寢疾主旦夕侍奉衣不解帶湯藥非親嘗不進比䘮塟哀毁特至東光縣主名楚媛紀王慎女也適太子司議裴仲將事姑如母楚王靈龜妃上官氏下邽人靈龜出為哀王後而所生父母在妃朝夕奉養甚謹凡珍美非獻不先嘗謹按隋唐家法皆不足稱乃蘭陵襄成和政岐陽諸公主及東光縣主楚王妃並以孝謹著於史册夫世俗仕宦之女或自恃門第不能致敬舅姑乃生自帝室而修禮惟謹誠賢矣哉若憲宗愛女不欲與豪貴人而與禮法之家此亦帝王擇壻之法也宋荆國大長公主太宗女也真宗時下嫁附馬都尉李遵朂舊制選尚者降其父為兄弟行遵朂父繼昌生日主以舅姑禮修謁帝聞宻以兼衣寳帶器幣助其為壽信國長公主神宗女也崇寜三年下嫁鄭王潘美之曽孫意事姑修婦道潘故大族夫黨數十百人賓接皆盡禮謹按凡婦之於舅姑尊卑一定惟公主下嫁往往待婦之禮失於崇事舅姑之禮失於降相沿成習久矣乃荆國公主之事舅信國公主之事姑修婦道惟謹葢其時中宫淑順相接所以化誨之者有素而二主則率教之尤著者也周女宗者宋國鮑蘇妻也蘇仕衛三年而娶外妻女宗養姑甚謹因徃來者請問其夫賂遺外妻甚厚姒謂之曰夫子有外好矣何以不去女宗曰吾聞婦以專一為貞以善從為順禮有七去妬為之首吾姒不匡我以禮而使吾為見棄之行非所聞也養姑愈敬宋公聞之表其閭曰女宗漢陳孝婦者淮陽人年十六而嫁未有子其夫當行戍屬孝婦曰我生死未可知幸有老母無他兄弟備養吾不還汝肯養吾母乎婦應曰諾夫果死不還婦敬愛愈固紡績織絍以養姑父母哀其少將嫁之孝婦曰妾聞之信者人之榦也義者行之節也妾受嚴命而事夫夫行時屬妾以其老母既諾之矣養人老母而不能卒許人以諾而不能信將何以立於世且夫不幸先死不得盡為人子之禮今又使妾去之莫養老母是明夫之不肖而著妾之不孝不孝不信且無義何以生哉因欲自殺其父母懼而止養其姑二十八年姑年八十餘終盡賣其田宅而塟之終奉祭祀淮陽太守以聞文帝賜黄金四十斤復之終身號曰孝婦謹按子養其母婦養其姑同心合力以致孝猶懼其缺焉今女宗之夫為官守所覊孝婦之夫因戍役而出以婦人而獨任孝養斯已難矣乃女宗不以夫之他娶而改其心孝婦不以夫之既殁而負其諾不尤難乎觀其所言一則曰貞曰順是坤道也一則曰信曰義是常徳也皆聖賢大道而二婦有合焉宋君漢帝表揚而優異之其知風化之要哉漢姜詩妻龎氏廣漢人詩事母孝妻事姑尤謹姑好飲江水江去舍六七里妻常泝流汲以共值風不時還母渇甚而恚詩責妻遣之妻止旁隣舍晝夜紡績市珍羞使隣母自以其意遺姑如是者久之姑怪問隣母具以告姑慙感聴還恩養愈謹生一子因逺汲溺江死妻恐姑哀傷不敢言托以行學寛之姑嗜魚鱠又不能獨食呼隣母共食夫婦常力作供鱠後舎側忽湧甘泉味如江水每旦輙出雙鯉以供鄉族稱孝赤眉經詩里弛兵而過之曰驚大孝必觸鬼神時嵗饑盗遺詩米肉受而埋之後察孝亷拜郎中除江陽令卒官人祠祀之唐唐氏山南節度使崔琯之祖母也姑長孫夫人年髙無齒唐事之孝謹每旦盥櫛拜階下畢即登堂乳姑以為常姑不粒食者數年康寜如一日後屬疾宣言無以報新婦恩願新婦有子有孫皆得如新婦孝敬聞者感動後琯昆弟子孫果殷盛人頌以為唐夫人之遺云宋徐氏静海人天章閣待制施昌言妻也七嵗喪母哀甚欲自投水火為父兄抱持而止事繼母以孝聞歸施氏事姑謹紉縫烹餁必飭早暮寒暑飲食必時姑亾哀毁得疾踰年而後能起宋周氏進士戚如圭母也婺州金華人生七嵗喪父屬睦㓂亂母提匿林藪間以全亂定喪其母時祖母老家人懼傷其意撤几筵而周與伯娣食必祭見者為涕下已而歸於戚姑高夫人臨諸婦甚嚴無當意者周始盥饋則説之行止召與俱時不樂小大側足傍睨不敢前周羞甘鮮伺顔色時共之高夫人輙為之舉箸已高患風痺周與俱臥起扶侍終其身明李大妻甄氏奉姑甚孝夫與其弟異居一日姑徃視其次子家甄氏随行不忍去姑側姑力遣之還甫三日甄氏心驚舉身流汗意姑疾也亟徃省之果有以疾来告者甄氏沿道拜禱至姑側侍湯藥數日而愈後姑年九十一終既塟甄氏廬墓三年旦暮悲號不已里人稱為孝婦詔旌表其門謹按百行莫大於孝然考之史𫝊婦之殉節者不勝書而致孝養者述甚少豈非以為閨闈之常事與夫捐軀者一旦之激烈固為甚難奉養者終身之敬謹亦何容易即如此數婦者家之豐約遇之貴賤境之逆順未嘗齊而孝思之醇篤則一也𫝊之言孝曰視於無形聴於無聲又曰左右就養無方服勤至死承親之心如是其㣲盡孝之道如是其久非具至性其孰能之數婦洵可風已宋徐元妻許氏年二十而寡子甄甫三嵗父憐其少改嫁之載以適同縣張負婚之夕自經救而蘇送歸養舅姑盡孝年八十餘乃卒元嘉中表門隋覃孝婦上郡鍾氏婦也年十六而嫁無何夫死事姑以孝聞數年姑及伯叔相繼死貧無以塟覃紡績傭貿十年塟八喪詔表閭宋司馬公沂妻李氏陜夏縣人也年二十八而寡遺二男一女㓜一子及女尋夭父母欲奪其志誓不可惡衣蔬食勤苦自守姑李老病臥一榻扶然後起哺然後食李左右奉養無小失其志比歿終不懈宋進士朱甲妻郎氏湖州安吉人朱官浙東卒郎䕶送還至玉山世亂道梗留居之豪栁强委禽不許夜棄􅏻奉柩去栁邀之道中以死拒得免抵家養姑謹姑病禱天刲股肉進啖而愈姑卒以毁聞元大徳中表門元俞新之妻聞人氏夫沒斷髪誓不二事姑孝姑病風失明聞人手滌溷穢時時舐其目目為復明姑卒與子親負土塟之朝夕悲號聞者惨惻鄉人為之語曰欲學孝婦當問俞母元白孝婦太原人夫慕釋棄家去為僧白年二十留養姑不去服勤織絍以供姑九十餘卒竭力營塟畫姑舅像祀之終其身元趙孝婦早寡事姑孝家貧傭織於人得美食必持歸奉姑自啖麤糲嘗念姑老一旦有不諱無由得棺乃以次子鬻富家得錢百緍買杉木治之棺成置於家南鄰失火風烈甚火勢及孝婦家孝婦急扶姑出避而棺重不可移乃撫膺大哭曰吾為姑賣兒得棺無能為我救之者苦莫大焉言畢風轉孝婦家得不焚人以為孝感所致明韓太初妻劉氏事姑寗氏甚謹太初故元時為知印洪武七年例遷和州挈家以行姑在道遇疾劉氏刺臂血和湯以進姑疾愈至𤓰州復病亦如之此至和州太初卒劉氏種蔬以給食養姑尤謹又二年姑患風疾不能起時盛暑劉氏晝夜侍姑側驅蚊蠅姑體腐蛆生席又為齧蛆蛆不復生及姑病篤齧劉氏指與之訣劉氏號呼神明刲股肉和粥以進姑復蘓越月而卒劉氏殯舍側園中欲還合塟於舅墓哀號不能歸事聞太祖遣中使賜劉氏衣一襲鈔二十錠官為送其姑䘮歸塟旌其門復其家徭役謹按婦以夫為天失其所天形影相弔而矢氷霜之操秉金石之志斯已罹人生之極艱矣乃更上奉衰親下竭孝養豈易勝任哉今觀諸節婦皆處貧困遘險難而孝養未嘗少懈為之姑者或享髙壽或愈危疾或明瞽目孰非其孝心所致與夫壽算之修短在天疾病之安危有命乃婦人女子之精誠能感格而轉移之甚至反風却火然則天也命也一心而已矣唐鄭義宗妻盧氏范陽人畧渉書史事舅姑甚得婦道遭夜有盗數十人持伏鼔譟而入家人悉奔竄唯姑老獨在堂盧冐白刃擁抱姑不去為賊捶擊幾死姑以得全賊既去家人問曰羣賊兇横何獨不懼答曰人之所以異於鳥獸者以其有仁義也比隣有急尚相赴救况姑在而委棄若萬一危禍豈宜獨生宋譚婦趙氏吉州永新人元兵破永新趙抱嬰兒隨其舅姑逃匿文廟中為悍卒所獲殺其舅姑執趙欲汚之不可􅎔以刄趙罵曰吾舅死於汝吾姑又死於汝吾從吾舅吾姑死耳豈願生哉遂遇害血漬文廟兩楹間入甎為婦抱嬰兒狀久而宛然如新或訝之磨以砂石不滅鍜以熾炭其状益顯元湯煇妻張氏處州兵亂其家財先已移入山砦夫與姑共守之舅以疾未行張歸任藥膳且以輿自隨既而賊至即命以輿載其舅去而已遇賊賊以刃脅之曰從我則生否則死張掠髪整衣請受刃賊未忍殺張懼汙即奪其刄自刺死年二十七謹按此皆婦為舅姑死者也子於父母以天合婦於舅姑以人合居安䖏順盡孝致養亦足稱賢況乎遇患難罹兵刃而以舅姑之故舍生取義豈可多得哉盧氏趙氏張氏損身以救舅姑而舅姑獲全盧氏之不死天幸耳趙氏從舅姑俱死血留廟甎久而不滅為千古竒蹟其舅姑亦可無憾於地下矣宋麗水林侑妻周氏侑子江妻徐氏周知書奉道法夫卒奉姑謹主饋非手所治弗以進徐養周亦如之宋季亂徐生子定老甫六月元兵至江負之竄澤中㓂追射江棄兒走死周與徐避地東山聞變間行徃迹之又遇盗時周既老矣盗麾之去而廹徐東行姑婦相持哭曰願同歸九泉不相離苟生也周黙禱神㓂忽若見有負裝槖行者急持㦸趨奪之婦得脱行失道過澤畔則先所棄兒在焉兵退求江尸得之而家毁僦舍宇以居困甚或説徐再適徐指兒泣曰林氏數十世惟姑及兒何忍棄之兒幸成立異日持酒酹先塚姑之慶也吾之願也兒稍長好學娶潘氏故冨家女荆釵布裳提甕出汲奉祖及姑盡孝徐晩攖疾不能行潘晝夜扶掖後定老舉元延祐進士為秘書丞得贈父母如其官子孫多舉進士至大官徐壽六十三卒後一年周乃卒年八十一元尹氏楊氏皆霍婦也至元間尹氏夫耀卿沒姑命其更嫁尹氏曰婦之行一節而已再嫁而失節妾不忍為姑曰世之婦皆然人未嘗以為非汝何獨恥之有尹氏曰人之志不同妾知守妾志爾姑不能強楊氏夫顯卿繼殁慮姑欲其嫁即先白姑曰妾聞娣姒猶兄弟也冝相好焉今姒既留妾可獨去乎願與共修婦道以終事吾姑姑曰汝果能若是吾何言㢤於是同處養姑二十餘年以節孝聞謹按節孝之婦得一人焉已足為家之光世之法乃林氏則姑婦三世霍氏則姒娣兩人誠羙行聚於一門矣昔孟子稱人性皆善即婦人女子未有不禀貞淑之性者特無所觀感遂為習俗所移耳今觀兩姓孝養之道姑作于前而婦繼于後姒倡其美而娣踵其芳然則處閨房之中有表率之任者何可不盡孝以立訓哉御定内則衍義卷一
