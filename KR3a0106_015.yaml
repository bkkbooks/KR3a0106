body:
  text: 欽定四庫全書御定內則衍義卷十五大學士傅以漸恭纂慈之道敦仁內則曰子婦有勤勞之事雖甚愛之姑縱之而寧數休之謹按生人之道喜勤而惡逸父母之心均勞而施愛如兩子婦一勤一惰則使勤者之日多而惰者每棄為不足用然天下無獨成之事精神有限才智亦有時而窮故縱之使分其心於私事則拮據公事之精神益振且息其力於異日則感激今日之體恤益切此母待子姑待婦之禮也史記周太姒居內念臣下之勤勞風王於禮賢審官謹按天地之大德仁而已矣皇后體備坤貞道參乾始非仁莫與成慈非慈莫與使衆太姒之仁施於臣下是以天下之心為心其經任用而分理天下者官也其未經任用而具幹濟天下之才者賢也賢而加之以禮則賢為我用官而嚴之以審則官無幸人正朝廷即所以正百官正百官即所以正萬民太姒身不出宫庭而天下之精神命脈無所不貫真敦仁之道也劉聰妻劉氏名娥初為貴嬪俄拜為后將起凰儀殿以居之其廷尉陳元達切諫聰大怒將斬之娥時在後堂私敕左右停刑手疏啓曰伏聞將為妾營殿今昭德足居凰儀非急四海未一禍難猶繁動須人力資材尤宜慎之廷尉之言國家大政夫忠臣之諫豈為身哉帝王拒之亦非顧身也妾仰謂陛下上尋明君納諫之昌下忿暗主拒諫之禍宜賞廷尉以美爵酬廷尉以列土如何不惟不納而反欲誅之陛下之怒由妾而起廷尉之禍由妾而招人怨國疲咎歸於妾拒諌害忠亦妾之由自古敗國喪家未始不由婦人者也妾每覽古事忿之忘食何意今日妾自為之後人之觀妾亦猶妾之視前人也復何面目仰視巾櫛請歸死此堂以塞陛下誤惑之過聰覽之色變謂其羣下曰朕比得風疾喜怒過常元達忠臣也朕甚愧之以娥表示元達曰外輔如公內輔如此后朕無憂矣及娥死諡武宣皇后謹按諫臣者朝廷之耳目故納諫者號為聖主拒諫者稱為自用劉后以新起凰儀殿而救諌官之死其仁有深焉者矣宋英宗髙皇后當仁宗時知天下苦新法屢言未改及其聽政與天下順流更始立罷免數十事孳孳以保養帝德佑安天下為心每言曰茍有利於社稷吾無愛於髮膚故九年中百姓歡洽若更生宇內復康謹按詩大雅云不愆不忘率由舊章王安石鋭意而行新法天下皆知其苦民而神宗乃悉心傾聽君以求治太急成其偏好臣以博通經史行其剛愎至太后屢言而未改天下誰復有敢言者哉太后親政之始即散遣修京城役夫減皇城覘卒止禁廷工技罷導洛司出近侍尤無狀者十三人戒中外無苛斂寬民間保户馬一切有害於民者概行罷斥用司馬光吕公著同心輔政九年之內善政鱗鱗號稱女中堯舜誠敦仁之極軌也遼興宗仁懿皇后蕭氏小字撻里欽哀皇后弟孝穆之長女性寬容姿貌端麗帝即位入宫生道宗重熙四年立為皇后仁慈淑謹中外感德凡正旦生辰諸國貢幣悉賜貧瘠嘗夢重元曰臣骨在太子山北不勝寒栗寤即命屋之慈憫類此謹按施仁於有象者謂之陽德存仁於無形者謂之隂德節所貢之貨幣而賙恤貧瘠感偶夢之寒骨而曲加廕覆何此心之惻然獨甚也魯臧母者臧文仲之母也文仲將使齊母曰汝刻而寡恩好盡人力好窮人以威魯之寵臣多怨之其不免也夫必施德而求助焉於是文仲自給於大夫國人而後行謹按臧孫辰魯之名臣也孔子譏其不仁者三不智者三觀其母所料刻而寡恩則自負愈髙結怨愈隱操下愈亟取禍愈速不仁者人即以不仁報之可不懼哉可不懼哉噫此即其母敦仁之道歟唐滎陽縣太君鄭氏為拾遺元稹之母諸子雖入仕祿秩甚薄每月給食時給衣皆始自孤弱者次疏賤者由是衣無常主厨無異膳親者悅疏者來傭保乳母有凍餒垂白不忍去元氏之門者蓋其慈也持家二十五年專用訓誡去鞭撲正顔色以訓諸女婦諸女婦戰兢如履氷正辭氣以訓諸子孫諸子孫心愧耻若撻於市也婢僕終嵗不聞忿爭聲閨門之內熙如太古謹按家國一理故惠及僕婢其事似小而推之即博施濟衆之端正顔色以訓女婦正辭氣以訓子孫純用德化不忍鞭撲而家道自爾嚴肅可謂仁之周盡者章太傅妻練氏太傅出兵時有二將違令欲斬之練氏素知二將之勇乃設席以勸太傅太傅允從寬而二將已逃奔南唐得重用遣攻建州時太傅已故練氏與子皆在建州二將遣使遺金帛且密以白旗授曰吾將屠此城植旗於門士卒勿敢犯也練氏返白旗金帛謂使曰將軍果思舊恩願全此城必欲屠之老身與衆俱死不願獨生二將感其言遂止太傅子十三人練氏生者八子皆登第謹按兵戈擾攘之中誤遭屠戮者何限練氏以一身之有恩於二將返白旗金帛願保全城中百萬生靈仁心何其切仁術何其大要不過推區區不忍之心遂與上帝之好生相協昌大厥宗不亦快乎彼顧一己之私者安足語此宋海州富民楊允妻劉氏寡居二子皆幼時用兵燕雲享賦緍錢民皆稱苦劉氏語二子曰國家用兵斂及下户官司督責甚峻刑法慘酷吾不忍見家世私錢列屋積之何為遂請於官以錢百萬充下户之賦後子春為太僕卿謹按不仁之道多端莫重於貪財蓋財本天地間流通之物施之有用則財皆恩膏積之無用則財皆朽蠧劉氏不忍下户之鞭撲概然發所藏而獻諸官府其慈愛有足嘉者宜乎後人之興起也慈之道愛民內則曰后王命冡宰降德於衆兆民謹按天子為天下君故當行政令於天下天子為天下師故當廣教化於天下秦漢以來教化廢棄不講而專以政令求治平百姓家事置為細務豈知堯舜湯武之治天下本乎德以為教非但行之於宫闈施之於朝廷官府且制為禮法命冡宰以降下於天下使億兆之衆知所以法則而遵行之蓋天下不過一家之積積億萬人以成天下必家家齊然後天下之治成古人謂綜理天下譬如構廣厦萬間庀材既需嵗月經營又復周密茍一榱一桷之或闕則規制不全是以盛明之世婦人女子皆可入道其愛之者大也漢和熹鄧皇后宫中嘗亡大珠一篋念欲考訊必有不辜乃親閲宫人親察顔色即時首服及稱大后時有和帝幸人吉成御者共枉之以巫蠱事下掖庭審訊辭證明白太后以先帝左右待之有恩平日尚無惡言今反若此不合人情更自呼見實核果御者所為莫不歎服以為聖明永平二年夏京師旱親幸洛陽寺録寃獄有囚實不殺人而被考自誣羸困輿見畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵罪行未還宫澍雨大降每聞人飢或達旦不寐而躬自減撤以救災厄故天下復平嵗還豐穰謹按干天地之和氣者莫如刑欲愛民者何嘗不刑獄是兢兢哉但宫掖之間機密間靜固非誣枉所得作外而録囚敕法又非皇后之所能周也於此而有寃抑雖念切天矜無所施其旋轉之力鄧皇后乃事事詳悉察言觀色訊盜珠之宫人則親加閲試斷巫蠱之近侍則誣據平昔明覆盆之寃而澍雨大降聞人之飢中夜以興減膳撤樂賑救蒼黎是純乎以百姓之安危為念者矣易曰坤也者地也萬物皆致養焉故曰致役乎坤其鄧皇后之謂乎唐太宗賢妃徐惠當貞觀末太宗數調兵征討稍稍治宫室百姓勞怨上疏極諌且言東戍遼海西討崑邱士馬罷耗漕餉漂沒捐有盡之農趨無窮之壑圖未獲之衆喪已成之軍故地廣者非常安之術也人勞者為易亂之符也有道之君以逸逸人無道之君以樂樂身又言伎巧為喪國斧斤珠玉為蕩心鴆毒侈麗纎美不可以不遏志驕於業泰體逸於時安帝善其言優賜之謹按天下之財止有此數百姓之力亦止有此數故聖人之治天下不盡民之財不盡民之力况當開創之初以干戈平定四海而復沾沾於小邦興師靡餉轉輸不絶土木層新豐亨自侈徐惠一嬪妃耳能上疏諌諍太宗即位聽而優賜之非平日志切愛民安能至此後漢髙祖皇后李氏晉陽人也開運四年髙祖起兵太原賞軍士帑藏不足充欲斂於民后諌曰方今起事號為義兵民未知惠而先奪其財殆非新天子所以救民之意也今後宫所有請悉出之雖其不足士亦不以為怨也髙祖為改容謝之謹按帝王舉事必先加惠於百姓而後義聲丕振焉李氏起自艱難洞徹民隱悉後宫之所有雖不足而人不怨誠識時達務之言哉宋慈聖光獻曹皇后當王安石當國變亂舊章后乘間語神宗謂祖宗法度不宜輕改熙寧宗祀前帝至后所后曰吾昔聞民間疾苦必以告仁宗因赦行之今亦當爾帝曰今無他事后曰吾聞民間甚苦青苖助役宜罷之安石誠有才學然怨之者甚衆帝欲愛惜保全之不若暫出之於外帝悚聽垂欲止復為安石所持遂不果帝嘗有意於燕薊已與大臣定議乃詣慶夀宫白其事后曰儲蓄賜豫備乎鎧仗士卒精乎帝曰固已辦之矣后曰事體至大吉凶悔吝生乎動得之不過南面受賀而已萬一不諧則生靈所係未易以言茍可取之太祖太宗收復久矣何待今日帝曰敢不受教謹按帝王之仁天下其大端有四曰法祖曰擇相曰恤民曰節兵宋自太祖至英宗太平日久神宗即位誤用一王安石遂幾幾乎生亂則用人之不可不慎也王安石以強學執拗逢帝所欲慨然以大有為自命青苖助役百姓嗷嗷而不知所存恤且為之言曰祖宗之法不足遵也豈不痛哉曹太皇太后力勸帝之暫出安石而又復不果大臣以下且誰能言之至於開邊生釁所關尤大非太皇太后極力勸止吾知其禍不旋踵矣此所以為至仁之后歟趙威后時齊王遣使問書未發威后問使者曰嵗亦無恙耶民亦無恙耶王亦無恙耶使者不説曰臣奉使使威后今不問王而先問嵗與民豈先賤而後尊貴者乎威后曰不然茍無嵗何有民茍無民何有君舍本而問末者耶乃進而問之曰齊有處士鍾離子無恙耶是其為人也有糧者亦食無糧者亦食有衣者亦衣無衣者亦衣是助王養其民者也何以至今不業也葉陽子無恙乎是其為人哀鰥寡恤孤獨振困窮補不足是助王息其民者也何以至今不業也北宫之女嬰兒子無恙耶撤其環瑱至老不嫁以養父母是率民而出於孝情者胡為至今不朝也此二士不業一女不朝何以王齊國子萬民乎謹按戰國之君以智力相髙戰國之后亦以智力相髙而議論則必軌之於愛民加嵗與民於王之上而褒鍾離子等是閨閣中之有逺略者明太祖每前殿決事馬皇后必潛聽如聞帝震怒回宫必詢今日處何事怒何人因泣諌帝從之多所寬貨謹按武以不殺為威功以不伐為大孟子之論定天下也曰不嗜殺人者能一之而馬后之佐髙帝則以不嗜殺人為本仰合開創之心遂為明后稱首豈非仁厚生於天性哉慈之道宥過內則曰子婦未孝未敬勿庸疾怨姑教之若不可教而後怒之不可怒子放婦出而不表禮焉謹按罪不可宥而過可宥過者無心之失也有或勢處其兩難或力窮於難辦或家教之未夙􅈺或賦性之多愚魯故不必憎疾不必怨惡姑且教誨觀其自新再至不可教然後責怒責怒而不從命則子當放逐婦當出棄矣然猶為之隱而不明言其犯禮之過者父母愛子之心無所不至也東漢顯宗明德馬后朝廷政事有公卿駮議難平者帝以問后后分折理解歸得其情天大旱后聞楚獄多枉濫乘問為帝言帝惻然感夜起倣徨不能寐明日幸洛陽録囚徒理出千餘人乃大雨唐文德長孫皇后每帝譴責左右即怒不可嘗后陽助為怒請鞫訊俟意解徐為開理終不令有寃異母兄安業方微時素無禮於后后未嘗以為言擢將軍坐法當刑后頓首請曰安業罪當死然素遇妾無恩論如法外家將謂妾釋憾於兄也得減死及大漸與帝訣時相玄齡以小譴就第后曰玄齡侍陛下久為宗臣為國家腹心非大故願勿棄也謹案凡獄皆有寃抑况漢章帝法度明決廷臣爭嚴切以避責楚王英謀逆自殺獄多枉濫無敢以情恕求者馬后乘天旱為上言楚獄寃濫所致果大雨霑足凡事皆宜申救凡唐太宗之得天下善謀者莫如房玄齡乃以小譴就第長孫后將訣專以此為言其宥過之所全者大矣魏文成文明皇后馮氏顯祖時尊為皇太后常以體不安宰人昏而進粥有蝘蜓在焉后舉匕得之髙祖侍側大怒將加極罰太后笑而釋之遼天祚元妃蕭氏小字貴格燕國妃之妹年十七册為元妃性沉靜嘗晝寢近侍盜貂裀妃覺而不言宫掖稱其寬厚謹按宥過之道不過曲諒其無心若以疾病之時進粥不慎恐不得引詿誤以自解也况近侍而妄盜貂裀覺而執之繩以大法又何説之有乃馮皇后付之一笑蕭元妃默而不言其度量寬洪有迥異乎人者矣如此而宥何所不宥婦道尚柔寧過仁毋過刻也宋魏國公主太宗女也性仁慈嘗有盜入其第有司多所訊捕主恐其寃也請出所逮人而以私錢募告者伺緝之乃果得真盜情得復請貸非真盜者謹按小過或可用思而盜則應主用法况入貴戚之第刑官有迫欲得情之心即有失入亦曰法固然耳魏國公主何其天性之矜惻也出所逮之寃人而以私錢募告果得真盜有默合古人五聽之心焉於盜尚恐其寃於他人可知於盜能得其真於凡事皆能用智以行其寬宥又可知矣勤之道女工內則曰女子十年不出姆教婉娩聽從執麻枲治絲繭織絍組紃學女事以共衣服詩七月之二章曰七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸其三章曰七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載玄載黃我朱孔陽為公子裳女誡曰專心紡績不好戲笑是謂婦功謹按自國及家所需於女功者甚多上而后妃下而庶婦皆當􅈺習故內則女子十嵗姆即教以績麻治絲織絍組紃其為婦女終身之事明矣昔周公作詩稱述豳俗亦以蠶績為要務言七月流星西流則暑退將寒至九月當授衣以禦之然豈待秋而後備哉當春月陽和倉庚始鳴之時已蚤為之計矣維時女執深美之筐循微小之徑采柔桑及蘩葉以飼初生之蠶而去年八月已豫取蒹葭備治蠶曲薄之用至此蠶盛之月桑之大者連條落之髙者斧斨伐之小者取葉而存其條庶幾蠶之食足而絲之功成矣至七八月鵙嗚之後麻熟之時則又績以為布而凡蠶績之所成者皆染之或元或黃其朱者尤為鮮明皆以供上而為公子之裳蓋豳俗之力於蠶績如此若詩中采桑之女以將適公子逺父母為悲非惟孝思之篤可見貴族之人許婚公室者不憚勤勞凡為婦女者可以女工為緩哉故女誡以專心紡絲績麻為婦功并戲笑戒之誠恐開怠荒之端耳周禮曰內宰中春詔后率外內命婦始蠶於北郊以為祭服以婦職之法教九御使各有屬以作二事嵗終則會內人之稍食稽其功事佐后而受獻功者比其小大與其粗良而賞罰之又曰太宰以九職任萬民其七曰嬪婦化治絲枲又曰典婦功掌婦式之法以授嬪婦及內人女功之事齎凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而楬之以供王及后之用頒之於內府又曰典絲掌絲入而辨其物以其賈楬之掌其藏與其出以待興工之時頒絲於外內工皆以物授之及獻功則受良工而藏之辨其物而書其數以待有司之政令上之賜豫又曰典枲掌布緦縷紵之麻草之物以待時頒功而受齎及獻功受苦工以其賈揭而藏之以待時頒又曰縫人掌王宫之縫線之事以役女御以縫王及后之衣服女御八人女工八十人奚三十人謹按女工之法莫詳於周禮總於太宰內宰又設典婦功典絲典枲之官以專理之宫中則自后及九嬪世婦九御皆有其職焉首言內宰於仲春告后帥領外命婦諸臣之妻內命婦夫人以下始舉蠶事於北郊以供祭服之用又以婦職之法教九九之女御使九人為一屬以作絲枲之二事嵗終則總會女御之食月米者計其絲枲之功事助后受其所獻之功比其縷之大小粗美而行賞罰焉次言太宰以九項職業任使萬民其第七項則國中嬪婦變化治理絲枲凡婦有德行者亦稱為嬪可見無德之女不足以任女工則其重可知至於典婦功之官則掌婦女辨事之式用物之數凡九嬪世婦及內人因女工之事而來取絲枲之資者或多或少俱依舊數分授其國中嬪婦等所作之功則不時受之內嬪婦所作之功則及秋受之比其粗美小大而估其價著其物擇其精好者以供王及后之用而藏之於內府典絲之官則掌貢絲所入而辨其物之美惡亦估價而書之掌其藏即掌其出以待興工之時頒絲於外內女工辨其物色而授之及獻功則受其功之良者送典婦功官藏之其粗者則辨其物書其數以待有司政令之公用及上之賜與典枲之官則掌作布所用之麻作紵所用之草以待興工之時頒以應作之功授以來取之資此皆功之粗者及獻功亦估其價書而藏之以待頒衣賜豫之用蓋內宰分别之所以行賞罰此三官分别之所以辨上用頒賜之宜也若縫製則又有縫人之官掌王宫縫線之事授之女御以縫王及后之衣服其數則女御八人女工八十入奴婢三十人合而觀之女工之法繁重詳悉若此自后妃以及庶婦孰可怠忽哉魯公父文伯退朝朝母敬薑敬薑方績文伯曰以歜之家而主猶績懼干季孫之怒其以歜為不能事主乎敬薑歎曰魯其亡乎使僮子備官而未之聞耶居吾語女聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民嚮義勞也是故天子大采朝日與三公九卿祖識地德日中考政與百官之政事使師尹維旅牧相宣敬民事少采夕月與太史司載糾虔天刑日入監九御使潔奉禘郊之粢盛而後即安諸侯朝修天子之業令晝考其國職夕省其典刑夜警百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安士朝而受業晝而講貫夕而習復夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠王后親織元紞公侯之夫人加之以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事蒸而獻功男女效績否則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業况有怠惰其何以避辟吾冀而朝夕修我曰必無廢先人爾今曰何不自安以是承君之官余懼穆伯之絶嗣也仲尼聞之曰弟子記之季氏之婦不淫矣齊女徐吾者東海上貧婦人也與鄰婦李吾之屬會燭相從夜績徐吾最貧而燭數不屬李吾與其屬曰徐吾燭數不屬請無與夜也徐吾曰是何言與妾以貧燭不屬之故起常先息常後灑掃陳席以待來者自與蔽薄坐常處下凡為貧燭不屬故也夫一室之中益一人燭不為暗損一人燭不為明何愛東壁之餘光不使貧妾得蒙見哀之恩長為妾役之事使諸君常有惠施於妾不亦可乎李吾莫能應遂復與夜織終無後言鄭善果母崔氏恆自紡績每夜分而寢善果曰兒封侯開國位居三品秩俸幸足母何自勤如此崔曰吁汝年已長吾謂汝知天下之理今聞此言公事何由濟乎今秩俸乃天子報汝先人殉命也當散贍六姻為先君之惠妻子奈何獨擅其利乎又絲枲紡績婦人之務上自王后下及大夫士妻各有所製若墮業者是謂驕逸吾雖不知禮其可自敗名乎謹按女工勤惰之間所關甚大勤則敬惰則驕一人始之一家效之一家始之一國效之未有敬而不興驕而不亡者也觀魯敬薑因績事而誡其子上推聖王處民之道極論天子諸侯公卿大夫士庶人之勤業以及后妃夫人命婦士庶妻之效績而惰鄭母亦本其遺意以立訓豈非明於勤惰之大道乎至齊女徐吾先起後息甘自屈下分餘光以盡女事是亦勤而敬矣貧女且然饒裕者當何如耶漢明德馬皇后為貴人時后自為舞衣袿裁成手皆瘃裂及為太后於濯龍門內置織室蠶室親往來觀視於內以為娛樂順帝順烈梁皇后大將軍啇之女也少善女工晉悼武楊皇后名芷字季蘭小字南允大將軍駿之女也婉嬺有婦德太康九年后率內外夫人命婦躬桑於西郊賜帛各有差齊宣孝陳皇后名道止臨淮東陽人魏司徒矯之後也后家貧少勤績作家人矜其勞或止之后終不改梁髙祖德皇后郗氏名徽髙平金鄉人也祖紹國子祭酒領東海王師父煜太子舍人初后母尋陽公主方娠夢當生貴子及生后有赤光照於室內器物盡明后幼而明慧善書讀史傳女工之事無不嫻習元世祖鴻吉哩皇后自率宫人親執女工拘諸舊弓絃練之緝為綢以為衣其韌密比綾綺宣徽院羊臑皮置不用后取之合縫為地毯其勤儉有節而無棄物類如此胡帽舊無前簷帝因射日色炫目以語后后即蓋前簷帝大喜遂命為式又製一衣前有裳無袵後長倍於前亦無領袖名曰比甲以便弓馬時皆倣之宋衛國大長公主太宗女也善筆扎喜圖史能為歌詩尤善女工之事謹按后總內政女工之事似乎末矣乃馬后少而手自裁衣至老猶以蠶織為樂梁后陳后郗后衛國公主皆以善女工勤織作著於史册楊后親蠶於郊蓋猶行古之道焉至鴻吉哩后不特縫練棄物勤儉有則而帽式衣制騎射皆宜亦開國之一助矣夫宫闈之主非不尊也使令之輩非不衆也而諸后躬自勤勞如此誠有見於上倡下從之道耳勤之道飲食內則曰問所欲而敬進之饘􅓞酒醴芼羮菽麥蕡稻黍梁秫唯所欲棗栗飴蜜以甘之堇荁枌榆免薧滫瀡以滑之脂膏以膏之父母舅姑必嘗之而後退又曰男女未冠笄者雞初鳴咸盥潄櫛縰拂髦總角襟纓皆佩容臭昧爽而朝問何食飲矣若已食即退若未食則佐長者視具又曰由命士以上昧爽而朝慈以旨甘日入而夕慈以旨甘易家人之六二曰無攸遂在中饋詩斯干之卒章曰惟酒食是議女誡曰潔齊酒食以奉賔客是謂婦功謹按飲食者所以行禮而致孝也女子以是為職其大者在於薦祖宗養舅姑父母自后妃以至庶婦祭祀之飲食既有致敬之道矣至於舅姑父母之飲食內則稱問所欲而敬進之其物非一品其味非一端如厚粥薄粥清酒濃醴菜肉相雜之羮及五穀之菽麥蕡稻黍梁秫一惟父母舅姑所欲而調和之法則用棗栗飴蜜使之和甘用堇荁之菜及枌榆之新生或乾者溲和使之柔滑用肉之脂膏使之香美而又必待舅姑父母嘗之而後退蓋惟恐不當意也然此豈既為子婦而後學哉凡男女未冠未笄者雞鳴而起皆整束衣飾收髮結之佩飾容之香物昧爽而朝親已食則退未食則助長者視所進飲食之物至於既仕之後自一命而上朝夕以甘美養親凡此雖男女共之而婦職尤重故易稱婦道不可自由而專治在內之飲食詩祝女子勿蹈於非勿矜其善而惟議酒食之事女誡又廣及待賔客之酒食合而觀之飲食之道備矣周禮天官冡宰之屬酒人女酒三十人奚三百人漿人女漿十有五人奚百有五十人籩人女籩十人奚二十人醢人女醢二十人奚四十人醯人女醯二十人奚四十人鹽人女鹽二十人奚四十人幂人女幂十人奚二十人又地官司徒之屬舂人女舂抭二人奚五人饎人女饎八人奚四十人稿人女稿每奄二人奚五人謹按周禮未載王后治理飲食之事惟世婦所職有凡內羞之物至於酒人漿人籩人醢人醯人鹽人幂人舂人饎人稿人等官皆有女人各治其事夫酒漿醢者飲食之屬醯醴者調和之屬籩幂者盛覆之屬舂饎者治物執㸑之屬稿則凡內外朝雜人犒之以食也度當時女職飲食或不盡於此然已具其大概矣夫飲食似乎末節而統於天官地官豈非以百物生於天成於地而飲食之道亦必有合乎天地之理者與金景祖昭肅皇后唐古氏帥水隈鴉村唐古部人諱多保真后有識度在父母家好待賔客父母出則多置酒饌享鄰里逮於行旅景祖飲食過人時人名之和倫昭祖曰儉嗇之女若惜酒食不可以配烏古納聞后性度如是乃娶焉遼使同幹來伐五國蒲聶部景祖使后與效孫為質於巴延穆爾而與同幹襲取之遼主以景祖為節度使后雖喜賔客而自不飲酒景祖與客飲后專聽之翌日枚數其人所為無一不中其肯綮有醉而喧呶者輒自歌以釋其忿爭軍中有被笞罰者每以酒食慰諭之景祖行部輒與偕行政事訟獄皆與決焉謹按小雅伐木之詩君所以宴臣也其卒章曰民之失德乾餱以愆言凡失人心者即乾餱之微可以得過則豐飲饌以待賔客豈細故哉觀金昭肅皇后以能宴享為昭祖擇配景祖飲食之間有知人之鑒焉有息爭之道焉蓋其識度過人景祖政事訟獄皆與后參決計所以贊博施而收人心者亦猶待賔之優厚而已宜其助成大業而流譽史册也魯公父文伯飲南宫敬叔酒以露堵父為客羞鱉焉小堵父怒相延食鱉堵父辭曰將使鱉長而食之遂出敬薑聞之怒曰吾聞之先子曰祭養尸饗養上賔鱉於人何有而使夫人怒遂逐文伯五日魯大夫辭而復之君子謂敬薑為慎微晉周顗母李氏字絡秀汝南人也少時在室顗父浚為安東將軍嘗出臘遇雨過止絡秀之家會其父兄不在絡秀聞浚至與一婢於內宰豬羊具數十人之饌甚精辦而不聞人聲浚怪使覘之獨見一女子甚美浚因求為妾其父兄不許絡秀曰門户殄悴何惜一女若連姻貴族將來庶有大益父兄許之遂生顗及嵩謨顗等既長絡秀謂之曰我屈節為汝家作妾門户計耳汝不與我家為親親者吾亦何惜餘年顗等從命由此李氏遂得為方雅之族謹按古人燕享之禮最為隆重酒漿品物無一不致其精腆者魯敬薑之怒其子誠恐以微物而乖大禮則平日中饋之盡職可知矣晉李氏以一女一婢備數十人之饌不聞人聲豈非精敏之才出於貞靜之德乎後卒昌其門户尤信逺識焉飲食之道如敬薑而後可謂之賢如李氏而後可謂之能皆女子所當法也御定內則衍義卷十五
