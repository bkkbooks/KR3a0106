body:
  text: 欽定四庫全書御定內則衍義卷四大學士傅以漸恭纂教之道教子內則曰妻將生子及月辰居側室夫使人日再問之作而自問之妻不敢見使姆衣服而對至於子生夫復使人日再問之夫齊則不入側室之門三日始負子男射女否大夫之子有食母士之妻自養其子謹按古人教子之道甚豫當其將生妻則避夫之正寢而不敢居夫則日使人再問而無或慢及乎動作之際對夫者甚恭既生之時問妻者仍再且齊必致其嚴室必謹其入負見必定其期射否必辨其名以至大夫士妻食子又有辨無往非禮豈非教之始乎又曰國君世子生告於君接以太牢宰掌具三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑矢蓬矢六射天地四方保受乃負之宰禮負子賜之束帛卜士之妻大夫之妾使食子食子者三年而出見於公宫則劬凡接子擇日庶人特豚士特豕大夫少牢國君世子太牢其非冢子則皆降一等謹按此國君世子生之禮也夫人使人以生世子告君君用太牢以接之而宰則掌其具遂於三日之內擇日之良者以行禮復卜士之吉者使豫齊至日朝服於寢門之外承世子而抱之又以男子上事天下事地旁禦四方之難故射人以弧矢行射禮而用桑與蓬以取質素之意射畢保母受世子而抱之宰乃加禮於抱子之士而賜以束帛於是卜士之妻大夫妾之有乳者吉則使乳世子三年至公宫告辭而出君必勞賜之然禮莫重於辨嫡庶故又言非冡子則遞降一等自國君達乎大夫士庶無不然者凡牛羊豕全為太牢羊豕為少牢特則一牲觀古禮於舉子之初其繁重詳辨如此教誨之意已寓於其中矣又曰異為孺子室於宫中擇諸母與可者必求其寬裕慈惠溫良恭敬慎而寡言者使為子師謹按此教子之始也為别室以居孺子擇於衆妾及傅御之可用者為子師以教其德性寬裕慈惠溫良皆仁之德恭慎寡言皆敬之德仁且敬為天子諸侯之道備矣為卿大夫之道亦備矣故書曰若生子罔不在初乃世之愛幼子者徒撫以慈而不導以正始而忍於小既而忍於大始而肆於小既而肆於大卒至縱惡而莫救傷恩而無益乃悔其始之失教又何及乎又曰三月之末擇日剪髮為鬌男角女羈否則男左女右是日也妻以子見於父貴人則為衣服由命士以下皆潄浣男女夙興沐浴衣服具視朔食夫入門升自阼階立於阼西鄉妻抱子出自房當楣立東面姆先相曰母某敢用時日祗見孺子夫對曰欽有帥執子之右手咳而名之妻對曰記有成遂左還授師子師辨告諸婦諸母名遂適寢夫入食如養禮又曰夫告宰名宰辨告諸男名書曰某年某月某日某生而藏之宰告閭史閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯命藏諸州府又曰父在孫見于祖祖亦名之禮如子見父無辭謹按此卿大夫見子名子之禮也子生三月之末擇吉日翦髮所留不翦者謂之鬌男留於頂之兩角女於頂上留橫直各一道或男留於頂之左女留於頂之右是曰妻以子見父大夫以上則為衣服士以下則潄浣而服之凡家之男女皆夙興沐浴衣服具食如每朔日所用之食夫入側室之門升自東階西面而立妻抱子出房當楣東面而立姆助妻先言曰母某敢用是日敬以孺子見夫對曰當教之以敬使有所率乃以一手執子之右手以一手承子之頦而命之名妻對曰記所命之言使之有成對訖妻遂轉身西南向以子授師子師以子名遍告於分卑之諸婦分尊之諸母妻於是離側室而往夫之寢室夫入與共食如初婚饋養之禮夫乃以子名告於家之宰宰以子名遍告同族之男遂用竹䇿書曰某年某月某日某生而藏於家之書府宰又告二十五家之閭史閭史書二策一藏閭府一獻二千五百家之州史州史獻之州伯州伯命藏於州府若子生而祖在則家統於尊祖命以名其禮以子見父但無命之之辭此又以明尊卑之分也夫三月之子亦甚幼矣而見之名之其禮之多如此是亦寓教之意耳又曰世子生則君沐浴朝服夫人亦如之皆立於阼階西鄉世婦抱子升自西階君名之乃降適子見於外寢撫其首咳而名之禮帥初無辭公庶子生三月之末其母沐浴朝服見於君擯者以其子見於君所有賜君名之衆子則使有司名之又曰冢子未食而見必執其右手適子庶子已食而見必循其首又曰凡名子不以日月不以國不以隱疾大夫士之子不敢與世子同名謹按此國君見子名子之禮也三月翦髮留鬌皆同而夫人所生之世子則見於正寢是日君與夫人皆沐浴朝服立於東階西向世婦抱子升自西階君名之有命辭禮畢降階而退夫人所生之次子則見於外寢君名之其禮如前而無命辭若庶子生三月其母沐浴朝服見君贊禮者以子見於君之外寢君有賜母之貴者其子則君名之母之賤者其子則君使有司名之皆無命辭凡世子君與夫人未禮食而見次子庶子君與夫人禮食畢而見或執其右手或撫其首雖皆親愛之意而亦有别焉至於國君之名子則不用日月及國名之難諱者不用隱疾之不祥者大夫士之名子則不敢與君世子同要而論之世子與次子異夫人之子與妾之子異貴妾之子與賤妾之子異其辨名分者甚嚴而命名之法又如是其慎蓋不待他日齒讓於學而所以教之道已見其端矣又曰六年教之數與方名八年始教之讓九年教之數日十年出就外傅居宿於外學書計衣不帛𥜗袴禮帥初朝夕學幼儀請肄簡諒十有三年學樂誦詩舞勺成童舞象學射御二十而冠始學禮可以衣裘帛舞大夏惇行孝弟博學不教內而不出三十而有室始理男事博學無方孫友視志四十始仕方物出謀發慮道合則服從不可則去五十命為大夫服官政七十致仕謹按人之少時皆賴父母之力以成立即至壯而老必守父母之教以終身故禮著教子之道甚備為父者固當以是為訓而為母者亦必究心於此焉如數之一至十百方之南北東西皆日用之切而易曉者故六嵗以此教之至漸有知覺教之以男女之别長幼之序及朔望六甲之日至十嵗則有事於學矣故教之書字算數朝夕學幼事長之儀請於長者以習乎簡易信實若衣則不以帛為𥜗袴恐體幼而衣太溫傷隂氣也至十三嵗則學樂與詩及文舞之勺至十五嵗成童則學射與御及武舞之象至二十嵗則學文武俱備之大夏孝弟以敦其本廣博以充其學厚自勉於己而不敢為師蓄其德於內而不敢輕出至三十嵗娶妻始理男子當為之職業於學無所不博不拘於方然又當遜順於友而觀其所志以自考至四十嵗始仕行其常事出其謀計發其思慮以為國家而行止一準於道至五十嵗則君命之為大夫而統一官之政至七十嵗則致其事於君而告老要而論之父母之所以教子與子之所以自勉者莫非崇禮讓惇孝弟忠君交友之道而終始於學凡為母者父在則佐父以教其子父沒則躬自教其子子雖少教之勿過於慈子既壯教之必合於道古之聖帝明王賢公卿大夫士多有得諸母儀者詩曰教誨爾子式榖似之可不慎歟帝王世紀曰禹娶塗山氏名曰攸女生啓謹按堯舜皆官天下而禹則家天下非聖人之私其子也惟禹之子啓賢能敬承繼禹之道傳載禹治水三過其門而不入塗山氏獨明教訓及啓長化其德而從其教卒致令名嗣為天子持禹之功而不隕則啓之賢蓋成於聖母者居多向使禹既為國忘家不能時誨其子塗山氏又姑息而不教何以綿有夏四百年之統哉詩大明之二章曰大任有身生此文王詩思齊之首章曰大姒嗣徽音則百斯男謹按周文武二王道法治法雖皆父作子述然亦本母教焉太任之性誠一端莊維德是行及其有身目不視惡色耳不聽淫聲口不出傲言生文王而明聖大任教之以一而識百君子謂太任為能胎教太姒之性貞靜慈惠備盡婦道能嗣太任之美德生十男太姒教之自少及長未嘗見邪僻之事卒成武王周公之德夫子未生而教己行子克肖而教彌謹宜乎聖王相繼國祚獨長矣詩元鳥章曰天命元鳥降而生商宅殷土芒芒閟宫之首章曰赫赫薑嫄其德不回上帝是依無災無害彌月不遲是生后稷降之百福謹按古之大聖人多生於聖母而其生亦有異乎常人者如商之始祖契詩有元鳥降之文周之始祖后稷詩有履帝武之文考諸傳注言簡狄之性敦仁勵翼好人事之治上知天文樂於施惠及契長教之理順之序契率其教為司徒始封於殷薑嫄之性清靜専一好稼穡及棄長教之種植為后稷始封於邰夫二妃各有至德又皆能教其子商家六百年之祚周家八百年之厯蓋已兆於此矣眷德者天修德者人豈徒始生之禎祥而已乎漢文帝母薄太后吳人文帝孝事太后甚謹太后疾日夜侍不交睫不解衣帶寢上湯藥必親絳侯周勃以變告下吏急門后聞大怒文帝朝以冒絮提帝曰絳侯綰皇帝璽將北軍不以此時反今居一小縣顧反耶何憒憒也帝免冠跽謝曰吏事方驗而出之絳侯得赦復爵邑唐憲宗郭皇后汾陽王子儀孫女也後為皇太后至武宗頗喜畋遊角武力嘗入侍請於太后曰敢問如何而可以為盛天子矣太后曰諌臣章疏當審覽度可用用之即拂意召宰相平之毋拒直言毋納詖言以忠良為腹心則盛天子矣帝再拜受教還宫索諫書讀往往諫遊獵自是遊畋遂稀宋太祖母昭憲杜太后定州安喜人太祖即位尊為皇太后拜太后於堂下衆皆賀太后愀然不樂左右進曰臣聞母以子貴今子為天子胡為不樂太后曰吾聞為君難天子置身兆庶之上若治得其道則此位可尊茍為失馭求為匹夫不可得是吾所以憂也太祖再拜曰謹受教謹按漢唐之書載母儀頗略宋史則賢哲彬彬矣今觀薄太后之教保全功臣郭太后之教容諫諍親忠良杜太后之教不以居尊為樂而以失馭為憂皆治道之要者漢文帝率誨而致盛理宋太祖受教而開大業唐武宗因太后之訓讀諫書而省遊獵母教之嘉賴不亦大乎遼景宗睿知皇后蕭氏諱綽北府宰相遜之女也聖宗嗣位尊為皇太后明達治道聞善必從故羣臣咸竭其忠習知軍政澶淵之役親御戎車指麾三軍賞罰明信將士用命聖宗稱遼盛主太后教訓為多金睿宗貞懿皇后李氏世宗母遼陽人父雛烏格仕遼官至桂州觀察使天輔間選入睿宗邸七年世宗生天會十三年睿宗歿世宗時年十三后教之有義方金顯宗孝懿皇后圖克坦氏廣平郡王貞之女也初為太子妃生章宗世宗臨視宴甚歡又賜御服佩刀等物謂顯宗曰祖宗積慶且皇后隱德至厚而有今日社稷之洪福也又謂李石赫舍哩志寧曰朕諸子雖多皇后止有太子一人而已今幸得嫡孫觀其骨相不凡又生瑪達格山山勢衍氣清朕甚嘉之因以山名為章宗小字章宗即位尊為皇太后純淡清懿造次必於禮章宗時問安見事有未當者必加嚴誡元世祖昭睿順聖皇后名察伯鴻吉哩氏濟寧忠武王阿陳之女也生裕宗中統初立為皇后至元十三年平宋幼主朝於上都大宴衆皆歡甚唯后不樂帝曰我今平江南自此不用兵甲衆人皆喜爾獨不樂何耶后跪奏曰妾聞自古無千嵗之國毋使吾子孫及此則幸矣帝以宋府庫故物各聚置殿庭上召后視之后偏視即去帝遣宦者追問后欲何所取后曰宋人貯蓄以遺其子孫子孫不能守而歸於我我何忍取一物耶謹按遼之聖宗金之二宗並稱聖主然皆有母訓焉史稱蕭太后通達治道李后明敏剛正圖克坦后清懿好禮蓋其識有過人者若元始祖皇后鑒宋之亡而諄諄為子孫慮豈非曠古卓識耶推其意不以混一為喜不以蓄貯為念則所以遺子孫者必皆積功纍仁賤貨貴德之事雖不言教而教之道莫深於此矣漢棠邑侯陳嬰之母始嬰為東陽令素稱長者後去官秦二世皇帝時東陽少年殺縣令相聚數千人欲立長帥未有所用乃請陳嬰嬰謝不能遂強立之縣中從者二萬人欲立嬰為王母曰我為子家婦聞先故不甚貴今日暴得大名不祥不如以兵有所屬事成猶得封侯敗則易以亡可無為人所指名也嬰從其言以兵屬項梁梁以為上柱國後項氏敗嬰歸漢以功封棠邑侯晉涼武昭王李元盛后尹氏天水冀人也幼好學清辨有志節為元盛繼室撫前妻子踰於己生元盛之創業也謀略多所毗贊及元盛薨子士業嗣位尊為太后士業將攻沮渠蒙遜尹氏曰汝新造之國地狹人稀靜以守之猶懼其失云何輕舉窺覬非望蒙遜驍武善用兵汝非其敵吾觀其數年以來有兼并之志且天時人事似欲歸之今國雖小足以為政知足不辱道家明誡也且先王臨薨遺令殷勤令汝曹深慎兵戰俟時而動言猶在耳奈何忘之不如勉修德政蓄力以觀之彼若淫暴人將歸汝汝德業不建事之無日矣汝此行也非唯師敗國亦將亡士業不從果為蒙遜所滅尹氏至姑臧蒙遜見勞之對甚不遜或諫之曰母子命懸人手奈何倨傲且國敗子孫屠滅何獨無悲尹氏曰死生理之大一何為同凡人之事起兒女之悲吾一婦人不能遄死豈憚斧鉞之禍求為臣妾乎若殺我者吾之願矣蒙遜嘉之為子茂虔聘其女為妻及魏氏以武威公主妻茂虔尹氏及女遷居酒泉既而女卒撫之不哭曰汝死晚矣沮渠無諱時鎮酒泉每謂尹氏曰后諸孫在伊吾后能去否尹氏未測其言答曰子孫流漂託身異域老年餘命當死於此俄而潛奔伊吾無諱遣騎追及之尹氏謂使者曰沮渠許我歸北何故來追汝可斬吾首歸終不回矣使者不敢逼而還年七十五卒於伊吾謹按羣雄紛爭之際豫審成敗雖智士猶或難之乃陳嬰之母知其子之不可為王李士業之母知其子之不能敵鄰國何明哲也嬰從母訓卒享封侯之榮士業不從母訓竟取亡國之禍一成一敗可為鑒戒若士業之母不屈於強鄰堅意歸北其志節尤為卓特始而不敢殺終而不能追即強鄰亦為之屈矣使子孫能如其母何至覆滅流離乎魯臧孫母者魯大夫臧文仲之母也文仲將為魯使齊其母送之曰汝刻而無恩好盡人力窮人以為威魯國不容子矣而使子之齊凡姦將作必於變動害子者其於斯發事乎魯之寵臣多怨汝者又皆通於齊高子國子是必使齊圖魯而拘汝留之難乎其免也汝必施恩布惠而後出以求助焉於是文仲託於三家厚士大夫而後之齊齊果拘之而興兵欲襲魯文仲隂使人遺公書恐得其書乃謬其辭曰斂小器投諸台食獵犬組羊裘琴之合甚思之臧我羊羊有母食我以同魚冠纓不足帶有餘公及大夫相與議之莫能知之人有言臧孫母者世家子也君何不試召而問焉於是召而語之曰吾使爾子之齊今特書來云爾何也臧孫母泣下襟曰吾子拘有木治矣公曰何以知之對曰斂小器投諸台者言取郭外萌內之於城中也食獵犬組羊裘者言趣饗戰鬬之士而繕甲兵也琴之合甚思之者言思妻也臧我羊羊有母是善告妻善養母也食我以同魚同魚者其文錯錯者所以治鋸鋸者所以治木也是有木治保於獄矣冠纓不足帶有餘者頭亂不得梳飢不得食也故知吾子拘而有木治矣於是以臧孫母之言軍於境上齊方遣兵將以襲魯聞兵在境上乃還文仲而不伐魯晉范氏母者范獻子之妻也其三子逰於趙氏趙簡子乘馬園中園中多株問三子曰奈何長者曰明君不問不為亂君不問而為中者曰愛馬足則無愛民力愛民力則無愛馬足少者曰可以三德使民設令伐株於山將有馬為也已而開囿示之株夫山逺而囿近是民一悅矣失險阻之山而伐平地之株民二悅矣既畢而賤賣民三悅矣簡子從之民果三悅少子伐其謀歸以告母母喟然嘆曰終滅范氏者必是子也夫伐功施勞鮮能布仁乘偽行詐莫能久長其後智伯滅范氏楚子發母者楚將子發之母也子發攻秦絶糧使人請於王因歸問其母母問使者曰士卒得無恙乎對曰士卒并分菽粒而食之又問將軍得無恙乎對曰將軍朝夕芻豢黍梁子發破秦而歸其母閉門而不納使人數之曰子不聞越王勾踐之伐吳客有獻醇酒一器王使人注江之上流使人卒飲其下流味不及加美而士卒戰自五也異日有獻一囊糗糒者王又以賜軍士分而食之甘不踰嗌而戰自十也今子為將士卒并分菽粒而食之子獨朝夕芻豢黍梁何也詩不云乎好樂無荒良士休休言不失和也夫使人入於死地而自康樂於其上雖有以得勝非其術也子非吾子也無入吾門子發於是謝其母然後納之楚孫母者令尹孫叔敖之母也叔敖為嬰兒時出逰見兩頭蛇殺而埋之歸見其母泣母問其故對曰吾聞見兩頭蛇死今者出逰見之其母曰蛇今安在對曰吾恐他人復見之殺而埋之矣其母曰汝不死矣夫有陰德者陽報之德勝不祥仁除百禍天處高而聽卑書不云乎皇天無親惟德是輔爾然矣必興於楚及叔敖長為令尹謹按春秋列國蓋多賢母焉臧孫氏之母則以好盡人力寡恩窮威咎其子范氏之母則以伐功施勞乘偽行詐咎其子子發之母則以士卒飢困主將康樂咎其子咎之所以教之也至孫氏之母稱隂德陽報天高聽卑雖若寬其子之憂豈非教其子以德哉考臧文仲子發范氏三子皆當時貴臣及世族孫叔敖則起寒士致高位是知處貴者不可以不恤民處賤者不可不修行親之立教固當嚴子之奉教尤當謹賤而修德必貴且顯親揚名有不止於貴者貴而失德必賤且辱親禍身有不止於賤者可不慎哉漢京兆尹雋不疑之母仁而善教不疑為京兆尹每行縣録囚徒還其母輒問所平反活幾何人如多所平反母喜笑飲食言語異於他時或無所出母怒為之不食故不疑為吏嚴而不殘元魏清河太守房景伯母同郡崔元孫之女也景伯仕為太守每有疑獄常先請焉貝邱婦人列其子不孝吏欲案之景伯為之悲傷入白其母母曰吾聞聞名不如見面小人未見禮教何足責哉但呼其母來吾與之同居置汝左右令其見汝事吾或應自改景伯遂召其母崔氏處之於榻與之共食景伯為之溫凊其子侍立堂下未及旬日悔過求還崔氏曰此雖顔慙未知心愧且可置之凡經二十餘日其子叩頭流血其母涕泣乞還然後聽之終以孝聞隋鄭善果母崔氏清河人也年十三適榮陽鄭誠生善果周末誠討尉遲逈力戰死於陳母年二十而寡父彥睦欲奪其志母抱善果曰婦人無再男子之義且鄭君雖死幸有此兒棄兒為不慈背死夫為無禮寧當割耳剪髮以明素心違禮滅慈非敢聞命善果以父死王事年數嵗拜使持節大將軍襲爵開封縣公開皇初進封武德郡公年十四授沂州刺史轉景州刺史尋為魯郡太守母性賢明有節操博涉書史通曉政事每善果出視事母輒於障後察之聞其剖斷合理歸則大悅即賜之坐相對談笑若行事不允或妄嗔怒母乃還室蒙袂而泣終日不食善果伏於牀前不敢起母方起謂之曰吾非怒汝乃愧汝家耳吾為汝家婦獲奉灑掃知汝先君忠勤之士也守官清恪未嘗問私以身徇國繼之以死吾亦望汝副其此心汝既年小而孤吾寡婦耳有慈無威使汝不知禮訓何可負荷忠臣之業乎汝自童子襲茅土今位至方嶽豈汝身致之邪不思此事而妄加嗔怒心緣驕樂惰於公政內則墜爾家風或失亡官爵外則虧天下法以取罪戾吾死之日何面目見汝先人於地下乎善果厯任州郡內自出饌於衙中食之公廨所供皆不許受悉用修理公宇及分僚佐善果由此克己號為清吏煬帝遣御史大夫張衡勞之考為天下最徴授光祿卿謹按治民之道威之以刑不若御之以禮化之以德雋母之於子録囚有所平反則喜無所出則怒鄭母之於子視事剖斷合理則悅妄加嗔怒則泣房母之於子則召其所部不孝子使觀其子孝養以化之此豈晚世俗吏武健嚴酷之治哉夫民性本善非皆昧良心而抗上今也濫刑以迫之非理以虐之而德禮之教無聞焉雖欲改過其道無由然則為吏者豈可不佩三母之訓哉且夫愛民盛德也順親髙行也民戴之親悅之二善備焉亦在乎勉之而已魯母師者魯九子之寡母也臘日休作者嵗祀禮事畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家幼稚嵗時禮不理吾從汝謁往監之諸子皆頓首許諾又召諸婦曰婦人有三從之義而無専制之行少繫父母長繫於夫老繫於子今諸子許我歸視私家雖踰正理願與少子俱以備婦人出入之制諸婦其慎房户之守吾夕而反於是使少子朴歸辦家事天陰還失早至閭外而止夕而入魯大夫從臺上見而怪之使人間視其居處禮節甚修家事甚理使者還以狀對於是大夫名母而問之曰一日從北方來至閭而止良久夕乃入吾不知其故甚怪之是以問也母對曰妾不幸早失夫獨與九子居臘月禮畢事從諸子謁歸視私家與諸婦孺子期夕而反妾反太早故止閭外期盡而入大夫美之言於穆公賜母尊號曰母師使夫人諸姬皆師之晉杜有道妻嚴氏字憲京兆人也貞淑有識量年十三適杜氏十八而嫠居子植女韡並孤藐憲雖少誓不改節撫育子女教以禮度植遂顯名於時韡亦有淑德傅玄求為繼室使許之時玄與何晏鄧揚不睦晏等每欲害之時人莫肯共婚及憲許玄內外以為憂懼或曰何鄧執權必為玄害亦猶排山壓卵以湯沃雪耳奈何與之為親憲曰爾知其一不知其他晏等驕侈必當自敗司馬太傅獸睡耳吾恐卵破雪銷行自有在遂與玄為婚晏等尋為晉宣帝所誅植後為南安太守植從兄預為秦州刺史被誣徴還憲與預書戒之曰諺云忍辱至三公卿今可謂辱矣能忍之公是卿坐預後果為儀同三司憲年六十六卒晉羊耽妻辛氏字憲英隴西人魏侍中毗之女也聰明有才鑒魏鍾會為鎮西將軍憲英謂耽從子祜曰鍾會何故西出祜曰將為滅蜀也憲英曰會在事縱恣非久處下之道吾畏其有他志也及會將行請其子琇為參軍憲英憂曰他日為吾國憂今日難至我家矣琇固請於文帝帝不聽憲英謂琇曰行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不遺父母憂慮而已軍旅之間可以濟者其唯仁恕乎會至蜀果反琇竟以全歸初魏文帝得立為太子抱毗頸謂之曰辛君知我喜否毗以告憲英憲英嘆曰太子代君主宗廟社稷者也代君不可以不威主國不可以不懼宜懼而喜何以能久魏其不昌乎弟敞為大將軍曹爽參軍宣帝將誅爽因其從魏帝出而閉城門爽司馬魯芝率府軍斬關赴爽呼敞同去敞懼問憲英曰天子在外太傅閉城門人云將不利國家於事可得爾乎憲英曰事有不可知然以吾度之太傅殆不得不爾明皇帝臨崩把太子臂屬以後事此言猶在朝士之耳且曹爽與太傅俱受寄託之任而獨専權勢於王室不忠於人道不直此舉不過以誅爽耳敞曰然則敞無出乎憲英曰安可以不出職守人之大義也凡人在難猶或恤之為人執鞭而棄其事不祥也且為人任為人死親眤之職也汝從衆而已敞出宣帝果誅爽事定後敞嘆曰吾不謀於姊幾不獲於義泰始五年卒年七十九謹按賢母之教其子未有不出於大道者魯母師之教以信晉嚴氏之教以禮辛氏之教以孝義仁恕是皆聖賢所垂訓也且母師教子而及其婦嚴氏教子而及其女與從子辛氏教子而及其弟豈非大道既明則良訓彌廣乎若夫著太子代君主國之義辨屬吏死難從衆之職辛氏尤稱篤論而料何鄧之敗察司馬之情其卓見則一也雖賢人哲士何多讓焉齊田稷子之母田稷子相齊受下吏之貨金百鎰以遺其母母曰子為相三年矣祿未嘗多若此也安所得之對曰誠受之於下其母曰吾聞士修身潔行不為茍得竭情盡實不行詐偽非義之事不計於心非理之利不入於家言行若一情貌相副今君設官以待子厚祿以奉子夫為人臣而事其君猶為人子而事其父也盡力竭能忠信不欺務在效忠必死奉命亷潔公正今子反是夫為人臣不忠是為人子不孝也不義之財非吾有也不孝之子非吾子也田稷子慙而出反其金自歸罪於宣王請就誅焉宣王聞之大賞其母之義遂舍稷子之罪復其相位而以公金賜母晉陶侃母湛氏豫章新淦人也初侃父丹聘為妾生侃而陶氏貧賤湛氏每績紡資給之使交結勝已侃少為潯陽縣吏嘗監魚梁以一坩鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非唯不能益吾乃以增我憂矣鄱陽孝亷范逵寓宿於侃時大雪湛氏乃徹所卧薪薦自銼給其馬又密截髮賣與鄰人供肴饌逵聞之嘆息曰非此母不生此子侃竟以功名顯唐李畬母者失其氏有淵識畬為監察御史得廪米量之三斛而贏問於畬曰御史米不概也又問車庸有幾曰御史不償也母怒敕歸餘米償其庸因切責畬畬乃劾倉官自言狀諸御史聞之有慙色謹按君子之事其親也以道義養不以貨利養田稷子之母所却至百鎰之金陶母李母所絶至一坩之鮓數升之米蓋亷以事君雖可欲至多而不顧潔以持己雖所爭至細而必嚴立教如此豈復有敗檢之子哉嗟夫不義之物以之養親且不可世之服官者乃有棄名節溺財賄如孟子所謂為宫室之美妻妾之奉而為之者是誠何心恐不可以對君并不可以對親矣抑又論之三母之誨髙風相等若陶母之截髮雖見清困之素然殘親之遺體以成子之令名非道之正者其子卒以功名顯而不以道德顯殆亦教之未純乎周密康公之母姓魏氏周共王遊於涇上康公從有三女奔之其母曰必致之王夫獸三為羣人三為衆女三為粲王田不取羣公行下衆王御不參一族夫粲美之物歸汝而何德以堪之王猶不堪况爾小醜乎康公不獻王滅密晉叔姬羊舌子之妻叔向之母也叔向欲娶於申公巫臣氏夏姬之女美而有色叔姬欲娶其族叔向曰吾母之族貴而無庶吾懲舅氏矣叔姬曰子靈之妻殺三夫一君一子而亡一國兩卿矣爾不懲此而反懲吾族何也且吾聞之有竒福者必有竒禍有甚美者必有甚惡今是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是將必以是大有敗也昔有仍氏生女鬒黑而甚美光可鑑人名曰元妻樂正夔娶之生伯封實有豕心忿戾母期貪婪無饜謂之封豕有窮后羿滅之夔是用不祀且三代之亡恭太子之廢皆是物也汝何以為哉夫有美物足以移人茍非德義則必有禍也叔向懼而不敢娶晉平公強使娶之生揚食我侍者謁之叔姬曰長姒産男叔姬往視之及堂聞其號也而還曰豺狼之聲也狼子野心今將滅羊舌氏者必是子也遂不肯見及長與祁勝為亂晉人殺食我羊舌氏由是遂滅魯敬薑子文伯卒敬薑戒諸妾曰吾聞之好內女死之今吾子夭死吾惡其以好內聞也二三婦之辱共先祀者諧母瘠色母揮涕母陷膺母憂容有降服母加服從禮而靜是昭吾子仲尼聞之曰女知莫如婦男知莫如夫公父氏之婦知矣欲明其子之令德謹按諸侯公卿大夫之好內者既求其美又樂其多以為姑縱吾欲奚遽召禍而不知覆國破家恆必由之觀密康公之母謂女三為粲王猶不堪况其下焉者敢多擁姝麗乎叔向之母論女禍尤詳夫以后夔之賢與稷契臯陶伯益同佐聖主乃契殷殷祚稷開周厯臯陶之後傳為英六伯益之後封於秦而夔竟絶祀禍福何啻天淵也使凡為母者皆如二母之訓其子為子者皆遵二母之格言豈後有耽色而致禍者哉至敬薑戒諸妾以明其子之令德是則士大夫身沒之後猶不可蒙好內之名况生存之日可以縱欲彰聞耶輕則昭惡名重則受大禍有母儀之責者於好內之子毋姑息可也趙將馬服君趙奢之妻趙括之母也秦攻趙趙孝成王使括代亷頗為將將行括母上書於王曰括不可使將王曰何也曰始妾事其父父時為將身所奉飯者以十數所友者以百數大王及宗室所賜盡以與軍吏士大夫受命之曰不問家事今括一旦為將東向而朝軍吏吏無敢仰視者所賜金帛歸盡藏之乃日視便利田宅可買者王以為若其父乎父子不同執心各異願勿遣王曰母置之吾計也決矣括母曰王終遣之即有不稱妾得無隨坐乎王曰否也括既代亷頗三十餘日趙兵果敗括死軍覆王以括母為仁智漢河南太守嚴延年母東海人也生五男皆有吏材至二千石東海號曰萬石嚴嫗延年為河南太守傳屬縣囚論府下流血數里河南號曰屠伯其母嘗從東海來欲就延年臘到洛陽適見報囚母大驚使止都亭不肯入府延年出至都亭謁母母閉閣不見延年免冠頓首閣下母乃見之因責數延年曰幸備郡守専治千里不聞仁義教化全安愚民顧乘刑罰多殺人欲以致威豈為民父母之意哉延年服罪頓首謝因御歸府舍母畢正席已謂延年曰天道神明人不可獨殺我不自意老見壯子被刑戮也行矣去汝歸東海掃除墓地耳遂去歸郡見昆弟宗族復為言之後嵗餘為府丞所章訐延年罪名十事下御史案驗遂棄延年於市東海莫不稱母賢智漢御史大夫張湯之母湯以文法事漢武帝為御史大夫好勝陵人母數責怒湯不能悛改後果為丞相嚴青翟及三長史共致其罪遂自殺昆弟諸子欲厚葬之母曰湯為天子大臣被惡言而死亦何厚葬乎載以牛車有棺無槨武帝聞之曰非此母不生此子乃盡案誅三長史丞相嚴青翟自殺謹按大學引諺曰人莫知其子之惡父有義方之責者且不能知况母乎乃趙括之敗死嚴延年之被戮張湯之自殺其母皆蚤知之特無如誨之諄諄聽之藐藐也若趙母論將法嚴母論天道張母論大臣之體所見尤逺乃趙孝成王以趙母為仁智是悟括之不肖矣而漢武帝於張母則曰非此母不生此子豈猶以湯為賢乎其見反不及東海人之於嚴母矣或曰張母薄葬殆以激帝怒而報子仇也是亦人情然觀湯生時母數責怒殆非任術而修怨者御定內則衍義卷四
