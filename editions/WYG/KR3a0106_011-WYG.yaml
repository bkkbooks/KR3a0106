body:
  text: 欽定四庫全書御定内則衍義卷十一大學士傅以漸恭纂禮之道殉節三元李氏南豐人曾闓妻夫死守節至元壬午葫蘆峒寇猝至甘言誘之大罵賊而死狄恒妻徐氏天台人恒早沒徐氏守節不再醮至正二十年鄉民為亂徐避難於牛囮山為賊所執驅迫以前徐紿之曰吾渇甚欲求水一杯賊令自汲即投井而死時年十八明蕭氏髙安張榮一妻年二十七孀居誓不他適正徳間為華林賊所執蕭怒且罵曰我誓不為賊狗辱乃斬之數斷張氏樂平人董瑱妻年二十六夫歿以節自勵正徳三年姚盜猖獗母懼其為盜所汚隂遣其子諷之改嫁以圖自全張泣曰從一而終婦人之義麾去之一夕忽自經林氏政和縣民范灼妻十八嵗歸灼未幾夫故守節十二年嘉靖間倭䧟城被執罵拒甚堅延頸就死謹按婦人失其所天而貞潔自守斯巳難矣乃元至元間則有李氏至正間則有徐氏明正徳間則有蕭氏張氏嘉靖間則有林氏皆守貞於前死難於後平日則堅若金石臨時則烈同氷霜不尤難乎嗟夫士有砥礪一生名著當世而患難之際縮蓄改節者視諸婦何如也唐羅文姬字叔善南昌人年十六適鄭氏夫病篤執文姬手曰汝盛年當别適人姬誓不嫁夫亡投繯而死元趙美妻王氏内黄人至治元年美溺水死王氏守志舅姑念其年少無子欲使更適人王氏曰婦義無再醮且舅姑在妾可棄而去耶舅姑欲以族姪與繼婚王氏拒不從舅姑迫之力王氏知不免即自經死惠士元妻王氏大都人至正十四年士元病革王氏曰吾聞病者糞苦則愈乃嘗其糞頗甘王氏愈憂士元囑王氏曰我病必不起前妾所生子汝善保䕶之待此子稍長即從汝自嫁矣王氏泣曰君何為出此言耶設有不諱妾義當死尚復有他説乎君幸有兄嫂此兒必不失所居數日士元卒比葬王氏遂居墓側蓬首垢面哀毁逾禮常以妾子置左右飲食寒煖惟恐不至嵗餘妾子亦殁乃哭曰無復望矣屢引刀自殺家人驚救得免至終喪親舊皆携酒禮祭士元於墓祭畢衆欲行酒王氏已經死於樹矣明舒貞紹興諸士俊妻年十八歸仕俊數月俊死於商其姑念貞年㓜謀嫁之貞以死自誓慕貞者乃重賂其父母私盟之貞知不免紿父母治齋薦夫齋畢沐浴衣蔴自經死張友妻洪氏歙人友死豫治塋誓必同穴姑憐其早寡無子令嫁之不聴乃陰納富人聘至期逼之洪曰嫁不辭當與夫别乃造夫墓慟哭而歸拜姑告别入室閉門自縊岳氏深州岳興女適傅嘉嘉病急呼岳曰爾年少善事後人岳涕泣曰吾豈忍事他人寧俱死及嘉卒遂自經死洪武中表其門曰貞烈趙氏汶上人張鳯翥妻夫疾語趙曰汝年少雖有女不可恃以終身慎圖之趙未答夫方迷亂趙即縊死夫復蘇家人語故夫遂瞑目謹按世俗失耦之婦或年少無所依倚或家貧不能自存往往忍耻再適不必舅姑奪之良人囑之也乃諸婦聞舅姑良人之命非但不從且就死若不能待豈非慮貞烈之志未見亮於尊長不蚤信於亡人乎古之烈士有自殺以明心者諸婦之心可謂明於皎日矣漢南陽陰瑜妻潁川荀爽之女也名采字女荀聰敏有才藝年十七適陰氏十九産一女而瑜卒采時尚豐少嘗慮為家所逼自防禦甚固後同郡郭奕喪妻爽以采許之因詐稱病篤召采既不得已而歸懐刄自誓爽令傅婢執奪其刄扶抱載之女既到郭氏乃偽為歡悦之色謂左右曰我本立志與陰氏同穴而不免逼迫遂至於此素情不遂奈何乃命使建四燈盛裝餙請奕入相見共談言辭不輟奕敬憚之遂不敢逼至曙而出采因令左右辦浴既入室掩户令侍人避之以粉書扉上曰尸還隂隂字未及成懼有來者遂以衣帶自縊時人傷焉北魏滎陽史映周妻耿氏年十七適映周太和二十三年映周卒耿氏恐父母奪其志因葬映周哀哭而殞見者莫不悲嘆屬大使以狀具上詔標門閭宋黄氏名桃娘徳化士族女有美色年十六適同里陳徳環期年夫以殺死於外母憐其少無子毎迫之嫁黄知不免一日假以澣衣於門前溪側遂投水死朱氏開封民婦也家貧賣巾履簪珥以給其夫夫日與俠少飲博犯法徙武昌父母欲奪而嫁之朱曰何迫我如是也其夫將行一夕自經死且曰及吾夫未去使知我不為不義屈也金康住住鄜州人夫早亡服闋父取之歸家許嚴沂為妻康氏誓死弗聴欲還夫家不可得乃投崖而死詔有司致祭其墓元薛鷇妻馬氏名瑞香湯陰人㓜讀孝經列女傳通大義父母鍾愛擇壻得鷇贅之生一女鷇拙於家事婦翁怒責鷇遂離去踰三年父母憐其㓜諭令再嫁俛首不答乃書女無再醮之義以告父母不從乃投井留片紙於懐中書謝别之辭聞者傷之傅氏紹興諸暨人年十八適同里章瑜瑜為苛吏脅軍興期會迫死道上傅氏蒲伏抱屍歸號泣三日夜不忍入棺屍有腐氣猶依屍呵含日冀復甦既入棺至嚙其棺成穴及葬投其身壙中母强挽以出制未百日母欲奪志遂大慟連日不食囑侍婢謹視之閲數日紿婢吾當浴若軰理浴具俟予既而失所在明日婢汲井見二足倒值井中乃傅氏也楊氏東平須城人夫郭三從軍襄陽楊氏留事舅姑以孝聞至元六年夫死戍所母欲奪嫁之楊氏號痛自誓乃已久之夫骨還舅曰新婦年少終必他適可令吾子鰥處地下耶將求里人亡女骨合葬之楊氏聞益悲不食五日自縊死遂與夫共葬焉隂有光妻張氏句容人年十五歸陰氏六年而有光卒誓不改節父母迎歸許嫁尹氏子氏知乃自刎明日姑至復甦曰不幸至此毋以新婦為念言既而絶明陳永娘蒲田縣民許有容妻年十八歸有容不二十日夫故即自經賴姑救免守節二十三年父母勸更適遂縊死馬徳真山隂朱偉妻家病疫舅與夫偕亡姑張氏亦病篤徳真艱難萬狀侍姑疾少愈而母家欲奪其志徳真㫁指為誓姑歿徳真遂死之童敦妻李氏名榮夀昌人年二十四敦卒營敦葬所結壙於旁喪終父欲奪其志李知勢不可遏又慮自死遺禍舅姑家乃囑舅姑以後事泣拜而歸自經死舅姑為送衣衾及棺至遂葬於敦之旁謹按女無再醮之義然父母或憐其少穉或憫其孤貧以慈愛之心為從權之舉非若强暴相凌勢豪强聘也使借口父母之命擇耦而適亦可解嘲於當世釋憾於重泉乃漢魏宋金元明諸婦寧死勿二考其行事持論然後知孝親者當以正愛女者亦當以正耳元貴格䝉古氏同知宣政院事羅五十三妻也天厯初五十三得罪貶海南籍其家詔以貴格賜近侍茂罕茂罕親率車騎至其家迎之貴格度不能免令婢僕以飲食延茂罕於㕔事如廐自經死宋北辰烈婦楚州淮安人有美色夫為小商載之同行至北辰夫病死貧無以殮同舟富商假貨為喪費恃有恩顧其妻以為己物烈婦既葬之三日復墓以歸見勢且迫遂號哭赴淮水死明石門烈婦湖州人正徳初湖州饑婦與其夫及姑走崇徳石門市乞食婦有殊色市人欲挑之與之食不顧與之財亦不顧寓東髙橋上伺夫與姑不至及三日聚觀者益衆乃從橋躍入水中死王氏吳忠妻吉安人家甚貧正徳初夫疫死婦無依有欲収之者婦不應乃為麥飯瘞夫塜前痛哭良久以草簀裹身自沉溪而死謹按人雖至剛臨以之法則必畏性雖至正感之以情則必移貴哥以夫得罪籍沒詔賜近侍此法也登車再適當亦不失富貴而貴哥寧死不顧至假喪費救饑餓是亦近情之事而諸婦終不為動此其剛正之操豈非大過人者哉古之聖主罪人不孥古之賢人救困窮而不望其報葢深有見於行法用情之道爾元衣氏汴梁孟志剛妻夫卒貧而無子有司給以棺衣氏紿匠者曰可寛大其棺吾夫有遺衣服欲盡置其中匠者如其言是夕衣氏具雞黍祭其夫家之所有悉散之鄰里及同居王媪曰吾聞一馬不被兩鞍吾夫既死與之同棺共穴可也遂自經死同棺而殮李青妻張春兒葉縣人年二十青疾急顧春兒曰吾殆矣汝善事後人春兒斷髪示信誓不再醮尋青卒春兒號慟幾絶囑匠大其棺以納夫服御弓劍既殮乃自經鄰里即用此棺同葬之明張氏太康人晉嵩妻生女甫一嵗嵩病急曰我死後寡守何如張痛哭不言私命匠人造大棺殮畢自縊同棺而葬謹按𫝊稱夫婦同穴之義不過共歸黄壤而已死或異時殮每異處乃諸婦皆囑匠氏製巨棺自經同殮其蹟不更竒乎夫人之相與情與義而已情之昵者有時而間義之篤者無時而離諸婦之相隨不捨豈徒伉儷之愛哉義之所至而情至焉是可嘉爾唐殷保晦妻封敖孫也名絢字景文能文章保晦厯校書郎黄巢入長安共匿蘭陵里明日保晦逃賊悦封色欲取之封固拒賊誘説萬詞不答賊怒勃然曰從則生不然正膏我劍封罵曰我公卿子守正而死猶生也終不辱逆賊手遂遇害保晦歸左右曰夫人死矣保晦號慟而絶宋師氏二女彭州永豐人父驥政和二年省試第一宣和中為右正言十餘日凡七八疏論權倖及廉訪使者之害而去長女適范世雍子孝純建炎初還蜀至唐州方城縣㑹賊朱顯忠掠方城孝純先被害賊執師氏欲强之許以不死師罵曰我中朝言官女豈可受賊辱吾夫已死宜速殺我賊知不可屈遂害之其妹抱其姊亦助而罵賊并遇害土人収葬號曰正女金聶孝女字舜英尚書員外郎天驥之長女也年二十三適進士張伯豪伯豪卒歸父母家及哀宗遷歸徳天驥留汴崔立刼殺宰相天驥被創甚日夜悲泣恨不即死舜英醫療百方而天驥竟死時京城圍久食盡重以崔立之變舜英頗讀書知義理自以年尚少艾夫既亡父又死非命為兵所汙何若從吾父於地下乎葬其父之明日絶脰而死一時士女賢之有為泣下者其家以舜英合葬張伯豪之墓元趙洙妻許氏集賢大學士有壬之姪女也至正十九年紅巾賊䧟遼陽洙時為儒學提舉夫婦避亂匿資善寺洙以叱賊見害許氏不知也賊甘言誘許氏令指示金銀之處許氏大言曰吾詩書冠冕故家不幸遇難但知守節而死他皆不知也賊以刃脅之許氏色不變已而知其夫死因慟哭仆地罵聲不絶口且曰吾母居武昌死於賊吾女兄弟亦死賊今吾夫又死焉使吾得報汝當醢汝矣遂遇害僧見許氏狀哀其貞烈賊退與洙合葬焉謹按士大夫長自名家出於貴族者多矣患難之際神志撓阻不暇顧其名節况能顧其家聲乎乃唐之封氏則以身為公卿衣冠之女宋之兩師氏則以身為中朝言官之女皆不受汙辱毅然就死金之聶氏其父死難元之許氏其從父為名臣亦皆捐軀赴義可稱無忝向使諸女怖死失身豈不為家門大玷哉然則名家貴族非惟當誨子以義方亦當教女以貞烈也晉尹虞二女長沙人也虞前仕始興太守起兵討杜弢戰敗二女為弢所獲並有國色弢將妻之女曰我父二千石終不能為賊婦有死而已弢並害之宋李氏大將顯忠族妹顯忠南奔家屬悉遇害李氏國色也金人欲私之不從乃縳樹下命左右射其臍罵賊不已而死晏氏丞相殊之曾孫女建炎間兵至揚父孝廣為縣尉死難女年十五有美色兵得欲妻之女即延頸求死兵殺之趙氏貝州人王則反聞趙氏有殊色使人刼致之欲納為妻趙日哭罵求死賊愛其色不殺多使人守之趙知不得脱乃紿曰必欲妻我宜擇日以禮聘賊信之使歸其家家人懼其自殞得禍於賊益使人守視賊具聘帛盛輿從來迎趙與家人訣曰吾不復歸此矣問其故答曰豈有為賊汚辱至此尚有生理乎家人曰汝忍不為家族計趙曰第無患遂涕泣登輿而去至州廨舉簾視之已自縊輿中死矣元周氏紹興新昌典史如砥女也年十九未適人至正二十年鄉民作亂如砥與女避於邑西之客僧嶺女為賊所執賊曰吾未娶當以汝為妻女曰我周典史女也即死豈能從汝耶賊遂殺之明劉氏濰縣人靈山衛指揮劉竒之女正徳六年為賊所執大罵觸石而死謹按此皆文武職官之女及妹未嫁遇兵而死節者尹氏父為太守周氏晏氏父為縣尉典史李氏兄為大將劉氏父為指揮其秩之崇卑不齊乃考諸女行蹟至於㫁頸射臍裂屍曾不少懼於父兄可謂有光若自裁以免辱而决家族之無虞又何明也嗟夫士大夫身致高位或冺没無稱乃諸女之父兄附貞媛而名不朽然則光前耀後何獨烈丈夫哉唐何氏女餘干人年十六為黄巢所執罵賊不受汚遂死之宋程淑清女歙人時方臘冦亂女年十七遇賊賊善誘之女奮罵不屈㫁其鬢女罵不已遂遇害董氏女滕縣人許適劉氏子未婚為盜李昱所執悦其色欲亂之不屈遂㫁其首陳氏女婺州人年十九美姿容有盜執之植白刃於女旁曰從我為婦否則頸血染此鋒女厲聲請受刃盜因殺之頭墮地轉動血逆流面如生怒目不瞑於是浮雲晝晦白日無光狂風震林木林老女永春人及笄未婚紹定三年夏冦犯邑入山避之猝遇冦欲汚之不從度不能脱紿曰有金帛埋於家盍同取之甫入門大呼曰吾寧死於家决不辱吾身賊怒殺之越三日面如生明髙烈女寧縣人年十七有美色盜起匿巖穴中盜詰其弟得之髙曰我在室女未受父母命豈可擅事人盜甘言誘之再三髙曰吾寧死不屈盜强之髙大罵不服提刀欲殺髙忻然受刃遂遇害雷毛姑桂陽人雷廷惠女天順中猺獞破城人民奔竄父母疾不能行毛姑獨侍父側哀哭被執欲汚之罵賊不屈而死劉氏名美玉父俊為博平生員正徳間賊殺俊女以身蔽之賊脅女以行女罵曰恨不殺汝豈同汝行遂殺之謹按此皆未嫁之女遇兵亂而被害者夫女未適人猶士未服官也當兵戈搶攘之時縉紳執節殉難纍纍不乏士之死者雖間有之然或訝為苦節矣乃唐何女宋程女董女陳女林女明髙女雷女劉女皆就刃如飴之死靡悔甘言不能誘威武不能屈豈不與古之烈士齊芳千載乎五代何氏女江陰人為江賊所掠欲汚之何曰當修容以見須臾盛餙立於舡首罵賊赴水而死後人為之立祠宋杜氏女金華人二十未擇配宣和間里有悍賊謁杜門大言曰以女遺我否即族滅矣舉家驚泣因宻詢其女女即應曰舍一女寛一家曷為不可須我浴更衣以出遂趨浴具賊相歡笑以俟女浴畢盛餙登几而立繫帛於梁縊死母惶遽號呌屋瓦皆鳴賊驚駭舍去鄭氏女名貞福寧人少端莊不妄言動許里人林淼未嫁徳祐元年貞年十八元兵南下兇徒四起俘掠鄉邑貞獨居一室懼其汚己取剃刀自刎而死元王氏女名安哥偃師人天厯間從父避兵山洞兵搜得之見安哥色美驅使出欲汚之安哥不從遂投澗死有司言狀表其廬王妙璘海康王谷榮女至元間為猺蠻所掠將犯之乗間投水死有司嘉其貞烈立石志之張氏女髙郵人元末兵亂賊知女有姿艷叩其家索之女聞賊將害父母乃出拜賊賊即伏地拜其父母而以女行女欣然從過河橋投水死李順兒許州儒士李讓之女也性聰慧頗涉經𫝊年十八未嫁至正十五年賊䧟鈞州宻邇許昌父謂其母曰吾家以詩禮相傳此女必累我女聞之泣曰父母可避難勿以我為憂須臾於後園自經死趙恭女官奴晉州人年十七恭與父宏毅俱死國難方大泣適隣嫗數軰來相率出避官奴曰我未適人避將安往嫗力挽之官奴曰人生世間即百嵗亦須一死乃潛入中堂解衣帶自縊死明張禄女永城人正徳中賊䧟城女投井死賊怒出其屍碟於市旌曰貞烈謹按貞女遇害而外又有自裁以明節者安哥妙璘則被執不屈而死何氏趙氏則紿賊全節而死鄭氏順兒官奴則賊未至而懼辱先死杜氏張氏則免舉家全父母而身自就死夫在室之女如璞玊之未剖花蕚之待舒何遽自甘摧隕耶然諸女見之審矣偷生者雖皓首非夀死義者雖青鬢非夭善乎官奴之言曰人生世間即百嵗亦須死奈何戀有盡之軀而遺無窮之臭乎北魏涇州貞女兒氏許嫁彭老生為妻聘幣既畢未及成禮兒氏素行貞淑居貧常自舂汲以養父母老生輒往逼之女曰與君聘命雖畢二門多故未及相見何由不禀父母擅見陵辱若茍行非禮止可身死耳遂不肯從老生怒而刺殺之取其衣服女尚能言臨死謂老生曰生身何辠與君相遇我所以執節自固者寧更有所邀正欲奉君耳今反為君所殺若魂靈有知自當相報言終而絶老生持女衣服珠纓至其叔宅以告叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾以死辠詔曰老生不仁侵陵貞淑原其强暴便可戮之而女守禮履節沒身不改雖處草莽行合古跡宜賜美名以顯風操其標墓旌善號曰貞女元林娥古田儒家女也時邑有建冦之警民皆避亂山間娥為强暴所迫露刃臨之欲加汚辱娥毅然不屈遂遇害朱四女平湖朱柄少女年十六許姚氏父卒無子女依寡母盡孝養惡少邱鍾乃其姊夫謀欲私之强附同居數挑以言女即大驚詈罵痛哭於庭自嘆無父之女為所凌如此至夜縊死父柩之傍謹按烈婦之死於强暴者既􅍯著之矣乃末嫁之女遇强暴而不屈北魏則有兒氏元則有林氏朱氏明則有竇氏或死於威迫或死於强娶或死於惡少皆大節皎然至於拒已聘之夫而不從野合其見義尤明而執節更異矣嗚呼士之讀書知禮義者慎毋懐茍且之心安卑汚之習而反出女子下也唐奉天竇氏二女生長草野㓜有志操永泰中羣盜數千人剽掠其村落二女皆有容色長者年十九㓜者年十八匿岩穴間曳出之驅迫以前臨壑谷深數百尺其姊先曰吾寧就死義不受辱即投崖下而死盜方驚駭其妹繼之自投折足破面流血羣盜乃舍之而去京兆尹第五琦嘉其貞烈奏之詔旌表其門閭永蠲其家丁役宋葉氏二女泰寧人紹定己丑冦犯邑二女與嫂義不受辱迺以衣裙相結投溪而死邑人鄒應博為立祠額曰葉氏三潔元錢氏二女嘉興人錢子順之妹至正中紅巾賊至相與結裙投河死其後子順妻俞氏亦守節得旌人稱其家二貞一節湯婍龍泉人有姿容賊殺其父母以刃脅之婍不勝悲咽乞早死因以頭觸刃賊怒斫殺之其妹亦不受辱而死龍興劉氏二女長曰貞年十九次曰孫年十七皆未許嫁陳友諒冦龍興其母泣謂二女曰城或破置汝何所二女曰寧死不辱父母也城䧟二女登樓相繼自縊明雙貞女不知其姓盱眙何雄育為己女正徳辛未嵗饑雄欲鬻於娼以賈厚利二女知之一夕以巾聮兩臂投淮河而死嘉靖十年詔立廟祀之賜額雙貞謹按易之睽曰二女同居其志不同行葢言他時所適不同則平日所志各異也乃唐宋元明未適之女姊妹殉節者凡若干人立志則同其堅貞行事則同其勇决雖雙珠不足喻其珍合璧不足方其潔矣自昔士君子同氣之美或文章相等或爵禄並崇求其以雙節著者不可多得乃得之女子不亦難乎向使一潔一汚非特幸生者䝉惡名即獨死者有遺憾矣故僃著之使為女者知所取法焉宋玊粉兒汝州人許嫁同里張得山未行而得山死粉兒即詣柩旁慟哭幾絶既葬復於墓所奠哭遂自縊青楊樹下元劉貞女字懿文新淦人及笄父許婚趙國子未嫁夫卒父將他適懿文曰曩許趙氏義不可再乃投井死明黄氏女名千金潛山人許嫁張生大中未婚而大中卒父欲改議千金曰天有二日乎父卒事母孝邑中有求聘者母許之千金再拜而起伏父木主前號泣以簪刺目逾三月而卒時年十九聶氏名妙真樂安人年十五納同邑王所聘未嫁而所亡涕泣欲往吊父母不可聶曰兒雖未入王門然既以身許之不可再醮遂闔戸自經死以其喪歸王氏合葬蕭山孫氏許聘葉氏未幾聞夫病篤孫即濳製歛具囑父母令納葉棺尋忽自盡葉貞女名兆姺南昌人聘新建李光庭光庭卒女年十三先期夢光庭騎白馬衣素入其室越數日訃聞傷悼誓不改節父母憐其㓜强為轉聘女聞之即於密室自縊而死易妹貞聘儀賔子楊鐶未婚鐶卒妹貞聞訃墜樓幾死誓不再夫奔吊楊氏舟至河索夫神主成親迎禮用小竹轎抱主入柩前行合卺禮朝夕哭奠及朞年夜焚香畢自縊於夫柩前事聞旌表謹按女子既嫁從夫夫亡與亡亦不易矣况聘而未嫁乎審之於禮既與配耦不侔揆之以情亦且綢繆無素乃宋元明諸女以死殉者凡若干人皆謂身既許人義不可再是何律身之嚴而守義之重乎至於製夫之歛具發竒夢於生前行婚禮於歿後尤足昭盡禮而徴致誠矣或曰諸女雖不死誰或議之嗟夫恃不議而自恕終為庸人而已安得有竒節髙行哉齊杞梁殖之妻莊公襲莒殖戰而死莊公歸遇其妻使使者弔之於路杞梁妻曰今殖有罪君何辱命焉若殖免於罪有先人之敝廬在下妾不得與郊弔於是莊公乃還車詣其室成禮然後去杞梁之妻乃枕其夫之屍於城下而哭道路過者莫不為之揮涕十日而城為之崩既葬曰吾何歸矣夫婦人必有所倚者也父在則倚父夫在則倚夫子在則倚子今吾上則無父中則無夫下則無子内無所倚以見吾誠外無所倚以立吾節吾豈能更二哉亦死而已遂赴淄水而死魏勃海封卓妻劉氏彭城人成婚一夕卓官於京師後以事伏法劉氏在家忽然夢想知卓已死哀泣嫂喻之不止經旬凶問果至遂憤慟而死漢吳人許升妻吕榮被本州辟命行至夀春道為盜所害刺史尹耀捕盜得之榮迎喪於路聞而詣州請甘心讐人耀聴之榮乃手㫁其頭以祭升靈後遭羣冦欲犯之榮踰垣走賊㧞刀追之曰從我則生不從我則死榮曰義不以身受辱冦賊也遂殺之是日疾風暴雨雷電晦冥賊惶懼叩頭謝罪乃殯葬之宋向氏長陽人建炎中保山寨以避冦賊皮仲破寨向義不辱被殺人見其白乳自吭流踵向之子後誘賊醉而殺之以復母􅄷南劍州小常村婦人建炎四年楊勍叛卒由建安冦延平道出小常村掠婦逼脅欲犯之婦毅然誓死不受汚遂遇害横屍道傍賊退人為収瘞之屍所枕藉處迹隠然不滅每雨則其迹乾晴則濕宛如人影往來莫不嗟異鄉人或削去之隨即復見覆以他土而其迹愈明元柯節婦陳氏長樂人至正二十一年海賊刼石梁其夫適在縣郭陳氏出避賊道與賊遇被執以行陳氏且行且罵賊亂捶之挾以登舟罵不已忽振厲自投江中其父方卧病見其女至呼之不應駭曰吾豈夢耶既而有自賊中歸者言陳氏死狀明日屍逆流而上止石梁岸傍時盛暑屍已變其夫驗其背有黒子乃慟哭曰是吾妻也舁歸殮之明祝氏鉛山人傅岡妻傅歿祝年二十六姑議改嫁祝泣辭甚確姑竟欲奪之聘至祝佯為閉門檢餙狀竟赴河邊抱石而死是秋大旱知縣張昺禱不應乃集耆老問故有以祝氏節義告者昺即具牲醴為文親詣死所奠之是夕大雨祝之死處水深莫測後湧洲俗呼為婦洲吳氏封邱人庠生彭儀妻儀卒守志不三載而姑亡子死其母欲改適吳即更衣沐體濳行至夫墓以手剜墓側土崩尺餘欲進不得痛哭淚竭繼之以血自縊於棠樹而死時仲冬棠復生花盛寒不隕人謂貞烈所致成化中受旌高氏婦高郵人携其女從夫避亂見道傍空舍入其中賊將迫脱金纒臂與女且語夫令疾行夫挈女稍遠乃解足纒自經賊至焚其舎夫抵儀真夜夢婦告曰我已縊死彼舎齊氏曹旺七之妻餘干人正徳間盜猝至曹氏室齊走匿草莾中賊搜得曳之去齊哭且罵沿途援竹木不行抱樹大罵求死賊刺殺之夫収其屍創痕不漬血怒氣勃勃如生謹按人之精誠既至未有不可以動天地格鬼神者如杞梁妻及祝氏有崩城湧洲之異吕氏有風雷晦㝠之異吳氏有棠樹冬花之異豈非烈氣之所感哉向氏白乳流吭齊氏創痕不漬血小常村婦屍迹雨則乾晴則濕是皆英靈特異至劉氏夢想而知夫死陳氏形見其父高婦夢告其夫孰謂死者無知耶故彚其神異之蹟著之宋王貞婦臨海人也徳祐二年冬元兵入浙東舅姑與夫皆遇害主將見婦晢美欲納之婦號慟欲自殺為奪挽不得死夜令俘婦雜守之婦乃佯謂主將曰若以吾為妻者欲令終身善事君也吾舅姑與夫皆死而我不為之哀是不天也不天之人將焉用之願請為期服即惟命茍不聴我我終死耳不能為若妻也主將恐其誠死許之然防守益嚴明年春師還挈行至嵊青楓嶺下臨絶壑婦待守者少懈嚙挴指出血書詩於崖石上曰君王厄運妾當災棄女抛男逐馬來夫面不知何日見此身料得幾時囘兩行珠淚偷頻滴一片愁眉鎻未開囘首故山㸔漸逺存亡兩字實哀哉寫畢即投崖下以死血滲入石間將陰即墳起如始書時不為風雨剥蝕嵊丞徐君端樹石刻碑於死所浙東元帥泰野不華守越日為立廟像鄉之人表曰貞婦易嶺名曰清風韓氏女字希孟巴陵人丞相琦之裔也少明慧知讀書開慶元年元兵至岳陽女年十八為卒所掠將挾以獻其主將女知必不免竟赴水死越三日得其屍於練裙帯有詩曰我質本瑚璉宗廟供蘋蘩一朝嬰禍難失身戎馬間寧當血刃死不作袵席完漢上有王猛江南無謝安長號赴洪流激烈摧心肝岳州徐君寳妻被掠來杭居韓蘄王府自岳至杭相從數千里主者數欲犯之而終以巧計脱葢妻有令姿主者不忍殺也一日主者怒甚將即强焉因告曰俟妾祭先夫然後乃為君婦不遲也奚用怒哉主者喜諾即焚香再拜黙祝南向飲泣題滿庭芳一詞於壁上題已投大池中死其詞曰漢上繁華江南人物尚遺宣政風流緑窻朱戸十里爛銀鈎一旦刀兵齊舉旌旗擁百萬􅆛貅長驅入歌樓舞榭風捲落花愁清平三百載典章文物掃地多休幸此身未北猶客南州破鑑徐即何在空惆悵相見無由從今後斷魂千里夜夜岳陽樓藺氏江西吉安人為鄺家婦陳友諒部遣鄧平章䧟其縣屬帥聞藺有殊色將納之藺曰帥貴人妾事之無恨然吾良人以禮幣聘妾為婦者若干年矣與生二子妾不忍即背恩軍中禮不􅍯請持一月喪乃為帥婦帥許之服未終移兵别縣帥曰吾如汝約今夕諧吾婚乎藺曰諾既而帥他適使二卒守之藺曰為取雞酒具香火今夕吾為帥婦敢告先良人靈卒俱出乃先殺嬰兒嚙指血書壁曰涇渭難分濁與清此身不幸厄紅巾孤兒未忍更他姓烈婦何曾嫁二人白刃自揮心似鐵黄泉欲到骨如銀荒村日落猿啼處過客聞之亦慘神書罷先刎二子即自刎帥返詢二卒卒指壁間題帥倩人讀其詩馳白鄧鄧聞之陳陳立廟旌表花山節婦髙淳人至元間為兵所逼至崇贒鄉碑亭橋嚙指濡血題詩亭上有云遥望花山何處是遂自縊死節婦劉氏大同人至正戊申年秋與姑華氏俱為河南軍帥所掠苦被驅迫姑因謂劉曰汝芳年奈何劉曰有死耳姑曰刎無刀縊無索奈何劉曰當激賊怒以就死耳遂相與大罵遇害時年二十二嘗賦庭栢以自况有既保嵗寒心不在遐年夀之句何氏衢州龍㳺縣儒家婦至正間為亂兵所掠裂帛題詩曰失身無補君王事死節難酬夫壻恩題畢投江而死李景文妻徐氏名彩鸞字淑和浦城徐嗣源之女畧通經史毎誦文天祥六歌必為之感泣至正十五年青田賊冦浦城徐氏從嗣源逃於旁近山谷賊持刀欲殺嗣源徐氏前曰此吾父也寧殺我賊舍父而止徐氏徐氏語父曰兒義不受辱今必死父可速去賊拘徐氏至桂林橋拾炭題詩壁間有云惟有桂林橋下水千年照見妾心清乃厲聲罵賊投於水賊競出之既而乗間復投水死陳淑真富州陳璧之女璧故儒者避亂移家隆興淑真七嵗能誦詩皷琴至正十八年陳及諒冦隆興淑真見隣婦倉皇來告乃取琴坐牗下彈之曲終泫然流涕曰吾絶絃於斯乎父母怪問之淑真曰城䧟必遭辱不如早死明日賊至其居臨東湖遂溺焉水淺不死賊抽矢脅之上岸淑真不從賊射殺之謹按此皆烈婦臨死而題詩詞以見志者或全篇具存或僅𫝊一二句其千古不磨則一也夫婦人女子習禮明詩固已希覯而又發為激烈之音表其堅貞之志即與孔子所定三百篇同垂天地間豈多愧乎至陳淑真七嵗能誦詩聞冦至彈琴終曲從容就義亦可謂因聲見志矣御定内則衍義巻十一
