body:
  text: 順治十三年八月壬寅上仰承皇太后慈訓製為内則衍義成書并為序文恭呈聖覽序曰臣聞致治之道有大經大法以儀型乎邦國必有内治内教以模楷乎宫闈故闗雎為王化之端乾坤居大易之首聖人垂訓未有不以門内為兢兢者也三代以前聖后賢妃肇修内治以致化行俗美具載典冊自非天佑至徳孰能集貞淑之大成振古今之懿化哉恭惟聖母皇太后佐我皇考興道致治徽音雍穆慈誨周詳有典有則興仁興讓允為萬世壼教之軌範臣敬遵慈㫖蒐輯古來嘉言美行統成一編上備披閲下示來兹謹按内則所載皆閨門之内起敬起孝興仁興讓之事而首曰后王命冢宰降徳於衆兆民謂此乃王后世子所躬行心得而可為民法者故不言布教而言降徳也夫聖人言欲治其國者先齊其家又言家正而天下定齊之正之其惟内則乎世傳后妃紀列女傳家範内訓諸書著作不少然未嘗原本内則而發明之夫豈所以尊經立教與今是書一本經㫖而推衍之微而聲氣容色顯而言動儀文精而樂心養志粗而中饋女工所以操其心而檢其身者施諸一家無不宜放乎四海無不準究其指歸有八要焉孝者順親之要其類有二事舅姑事父母是也敬者内助之要其類有五事夫勸學佐忠贊㢘重賢是也教者昌後之要其類有三教子勉學訓忠是也禮者恃己之要其類有九敬祭祀肅家政定變守貞殉節端好尚崇儉約謹言慎儀是也讓者睦戚之要其類有四崇謙退和妯娌睦宗族待外戚是也慈者推恩之要其類有五逮下慈幼敦仁愛民宥過是也勤者修業之要其類有二女工飲食是也學者取法之要其類有二好學著書是也每舉一類必證以聖賢經傳之言實以古今淑順之行所采事蹟貴賤不同而其道則同所引文辭深淺不一而其理則一闡明大指詮釋微文名曰内則衍義自禁壼達乎閭巷咸於斯取則焉必皆感發其性情漸摩乎理義廣教化而美風俗宫闈之嘉言懿行直與邦國之大經大法並垂不朽聖母皇太后休聲盛徳炳若日星永作則於萬世矣凡例一著書求其可法故博採正史加以斷論若流虹繞電等事雖稱祥瑞恐近荒唐皆不敢録一道莫先於孝而女以夫為家故事舅姑列事父母之前刲股割肝等事雖曰至情不可為例槩刪之一内則為聖賢相傳之正經故每項俱用内則冠首正經無可採始引他書以証之然嘉言善行俱出十三經二十一史及通鑑通考等書稗官野史近代雜刻者不録一同為此類中間情節不同俱分疏詳解以便參觀一守貞殉節二類其事甚繁其人至多故更加分晰守貞約二十項殉節約四十餘項一賢后事多可學不憚詳引如漢之馬鄧宋之曹髙向孟本傳所載分布各類庻文不重複而美無掛漏欽定四庫全書子部一御定内則衍義目録儒家類卷一孝之道事舅卷二孝之道事父母卷三敬之道事夫勸學佐忠贊㢘重賢卷四教之道教子卷五教之道勉學訓忠禮之道敬祭祀卷六禮之道肅家政定變卷七禮之道守貞一卷八禮之道守貞二卷九禮之道殉節一卷十禮之道殉節二卷十一禮之道殉節三卷十二禮之道端好尚崇儉約謹言慎儀卷十三讓之道崇謙退和妯娌睦宗族卷十四讓之道待外戚慈之道逮下慈㓜卷十五慈之道敦仁愛民宥過勤之道女工飲食卷十六學之道好學著書臣等謹案内則衍義十六卷順治十三年大學士傅以漸恭纂仰邀欽定冠以御製序文以禮記内則篇為本援引經史諸書以佐證推闡之分八綱三十二子目一曰孝之道分事舅姑事父母二子目二曰敬之道分事夫勸學佐忠贊㢘重賢五子目三曰教之道分教子勉學訓忠三子目四曰禮之道分敬祭祀肅家政定變守貞殉節端好尚崇儉約謹言慎儀九子目五曰讓之道分崇謙退和妯娌睦宗族待外戚四子目六曰慈之道分逮下慈幼敦仁愛民宥過五子目七曰勤之道分女工飲食二子目八曰學之道分好學著書二子目考古西周盛運化起宫闈周南始闗雎而桃夭漢廣丕變乎民風召南始鵲巢而采蘋采蘩具嫻乎禮教葢正其家而天下正天下各正其家而風俗淳美民物泰平故先王治世必以内政為本也此編出自聖裁併經慈鑒端人倫之始以握風化之源疏通經義使知所遵循引證史文使有所法戒用以修明閫教永著典型以視豐鎬開基之治有過之無不及矣班昭女誡以下區區爝火之明又何足仰擬日月歟乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
