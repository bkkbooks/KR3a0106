body:
  text: 欽定四庫全書御定内則衍義卷十三大學士傅以漸恭纂讓之道崇謙退内則曰子生男子設弧於門左女子設帨於門右能言男唯女俞男鞶革女鞶絲又曰七年男女不同席不共食八年出入門户及即席飲食必後長者始教之讓又曰凡女拜尚右手謹按設弧於門左左者天道所尊設帨於門右右者地道所尊必曰設者方男女之生其於弓矢絲帛有可用之道而未能有用之之實也古聖人重男女之生又重男女之别非特弧帨而已也其能言則唯與俞不同其小囊之盛帨巾者亦革與絲不同教之既嚴且按候而加謹焉男女之有别不於其情欲之將動也當七嵗時即教以不同席不同食出入門戸欲其行之讓即席欲其坐之讓飲食欲其食之讓女拜尚右亦取法隂之義漢時尚行此禮内則以此句為終見一拜之間不可茍且以亂男女之羣臣於是益信聖王之化天下必於其最早也教子嬰孩在謹其始若侮詈父母毆擊兄姊父母不加訶禁反笑而奬之彼既不辨好惡遂謂當然及其既長習已成性乃怒而禁之不可復制殘忍悖逆無所不至此蓋父母無深識逺慮不能防微杜萌溺於小慈養成其惡也易坤文言曰隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也謹按夫婦之造端可察乎天地是天地一大夫婦夫婦一小天地也易首乾即次之以坤乾主資始坤主資生天子文言暢發其理於六三之爻為之觧曰隂有美徳却不外露或從王事豈敢專擅地道如此妻道如此臣道亦如此試觀地道博厚承天之氣以為形因天之生而為養所以代上天之終而為臣為妻者所當法也論語邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人謹按名分者百物之防維也名分不正則無事不見其乖戾然而自謙乃守身之體故位愈隆而心愈下徳日邵而禮日恭邦君之妻其體與君敵是承父母之命而六禮以聘之者也猶夫日之不可無月車之不可無輔所以翼贊君徳保䕶君身惟夫人是頼君安得不稱之曰夫人哉特夫人之自稱則不可以夫人自居也稱曰小童無知而已邦人則固因君之尊以為尊稱之曰君夫人若夫人與他國通問候之禮其自謙之詞曰寡徳小君而已而異邦人稱之亦曰君夫人是又因本國之尊以為尊矣人尊之而己究自處於謙此其所以為婦道也歟儀禮士婚禮篇曰父送女命之曰戒之敬之夙夜無違命母施衿結帨曰勉之敬之夙夜無違宫事庶母及門内施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸衿鞶謹按柔順之道教之於未嫁之前名分之嚴教之於既嫁之後而出門之際尤所當謹父命以敬而且戒母命以勉而加敬庶母等又申之以敬而恭聴蓋今日之父母即今日舅姑之法則異日之舅姑未必知今日父母之可恃謙退之不敢不崇也勢也謙退之不忍不崇也情也諄諄數語父母之心百結父母之腸九逥矣嫁女之家三日不息燭古人信有為乎其言之哉見衿鞶如見父母欲其無忘施之結之之心耳真徳秀曰夫之道在敬身以帥其婦婦之道在敬身以承其夫故父之醮子曰往迎爾相承我宗事朂帥以敬親之送女曰徃之女家必敬必戒無違夫子而夫婦之道盡於此矣孔子曰婦人無專制之義有三從之道在家從父適人從夫夫死從子無所敢自遂也教令不出閨門事在饋食之間而已矣是故女及日乎閨門之内不百里而犇喪事無擅為行無獨成叅知而後動可騐而後言晝不逰庭夜行以火所以正婦徳也晏嬰曰夫和妻柔姑慈婦聴禮也夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也謹按婦道不敢倡專惟夫是從者終其身以從為主者也在家從父即講習從夫之禮夫死從子正以完從夫之局故上事舅姑下和媵妾而後有當於夫之心動則擁蔽其面言則保傅從而詔之又何至有擅為獨行之舉哉嚴之以五不取復戒之以七去凛凛乎逆亂不順是防也晏嬰論禮君令臣共父慈子孝兄愛弟敬之下即重夫和妻柔姑慈婦聴齊家之道居多且申之曰夫之於妻雖貴和樂必以義而帥其妻妻之於夫雖貴柔順必以正而事其夫是二徳貴於相濟也至姑於婦則一於慈而從婦於姑則一於聴而婉蓋姑婦皆秉謙退之性姑且必謙退自崇也婦可不謙退是兢兢哉曹世叔妻班氏名昭班彪女也愽學髙才帝數召入宫令皇后諸貴人師事焉號為大家永初中太后兄大將軍鄧隲上書乞身太后不欲許以問昭昭因疏奏畧曰謙讓之風徳莫大焉夷齊去國天下服其亷髙太伯違邠孔子稱為三讓所以光昭令徳揚名於後世論語曰能以禮讓為國乎何有又作女誡七篇以卑弱為苐一曰古者生女三日卧之床下弄之瓦磚而齊告焉卧之床下明其卑弱主下人也弄之瓦磚明其習勞主執勤也齊告先君明當主繼祭祀也三者蓋女人之常道禮法之典教矣謙讓恭敬先人後己有善莫名有惡莫辭忍辱含垢常若畏懼是謂卑弱下人也晩寢早作勿憚夙夜執務私事不辭劇易所作必成手跡整理是謂執勤也正色端操以事夫主清靜自守無好戲笑潔齊酒食以供祖宗是謂繼祭祀也三者茍備而患名稱之不聞黜辱之在身未之見也三者茍失又何名稱之可聞黜辱之可逺哉以敬慎為第三曰隂陽殊性男女異行陽以剛為徳隂以柔為用男以彊為貴女以弱為美修身莫若敬避彊莫若順故曰敬順之道女之大禮也夫敬非它持久之謂也夫順非它寛裕之謂也持久者知止足也寛裕者尚恭下也謹按女子之道必附丈夫以傳故古來不見專書即内則一篇所載亦往往非女子所行之事劉向所著列女傳且掛漏不倫則班昭女誡其要典矣觀其疏奏丈夫且當重謙讓何况女子夫女子之謙讓不自今始自初生而已然矣男子載寢之牀而女子載寢之地男子載弄之璋而女子載弄之瓦由是而種種謙遜不特非不當有即儀亦不敢恃為己有勤以將之法以束之㝠其善惡藏其辱垢畏懼而勿弛整理而弗辭端清而弗斁僅可免黜辱而全其名稱然敬慎之道尤加詳焉剛柔秉之隂陽彊弱定於男女女子既以柔弱為主故敬則必順自不開嫌隙於丈夫順則必敬豈其乖常道於守身女子之道如此其難也昭之言曰鄙䝉先君餘澤頼女師典訓執箕箒於曹氏四十餘載今男能自謀矣但傷諸女當適人而不漸於教不聞婦禮故臨終作此誡以授之可見凡事必有家學必有師訓乃無媿於為人焉爾顔氏家訓曰婦主中饋唯事酒食衣服之禮耳國不可使預政家不可使幹蠱如有聰明才智識達古今正當輔佐君子勸其不足必無牝鷄晨鳴以致禍也謹按内則所重止在敬順而後世多以聰哲為賢内則所識止在衣服飲食而後世多以詩文為貴母怪乎侵丈夫之權預國家之政悍然不知其非也顔之推家訓可取為今日閨門法東漢光烈隂皇后新野人世祖聞其美納焉及即位以其賦性寛仁欲立為后后以郭有子辭不肯當封貴人仁孝矜慈七嵗失父雖數十年言及未甞不流涕帝每嘆息焉謹按建立太子上承宗廟下衍宗祊乃國家第一大事况光武開剏方新所望後人之承繼者必切隂后窺得此意以郭后有子願立媵妾不敢當皇后之封其識見有足嘉者賦性寛仁其逮下有深恩矣至於父逝數十年言之輒流涕天懐中發情誼懇篤宜乎得光武之心蓋漢統方絶而獨力中興痛念祖緒尤先立乎其大隂后心光武之心所以終得册立為后柔順之有終如此哉和熹鄧皇后當隂后正位中宫時方為貴人衣有與皇后同色者立解易若竝見不敢正坐離坐行則僂身自卑帝有問常逡巡後對帝每嘆息曰修徳之勞乃如是乎立為皇后辭讓者三然後即位手書表謝深陳徳薄不足以充小君之選謹按謙之為卦自卑而尊人繫辭傳曰謙尊而光則能尊人者人尊之鄧后之承事隂后夙夜戰兢動有法度即一衣服之同色者且不敢冐混而必别嫌明微徳行摰矣意念深矣其大者在憂繼嗣之不廣恒垂涕嘆息帝服其修徳之勞后亦自嗟其竭誠盡心以事皇后也全傳所載鄧后美行多端大抵皆以柔道行之柔信婦人之盛事矣漢順烈梁皇后永建三年選入掖庭及以貴人立為皇后少既聰惠深覽前世得失雖以徳進不敢有驕耑之心每日月見適輒降服自求其愆謹按君之與后猶夫天之有日與月也故日變則君修其政治月變則后省其職事精誠所至上達於穹蒼梁皇后謙冲之徳本於天成即以徳進甞翼翼焉不敢驕而自髙循循也不敢專而自用也蓋知柔順之不可不求其篤實也即安常處順原無所為矜髙恣肆之地况上天之治亂靡常一身之休咎無定抑何必不朝乾而夕惕也哉一時如是終身如是柔順利貞君子攸行梁后有焉晉趙衰之妻文公之女也曰趙姬文公之為公子也避居狄趙衰從狄人入其女叔隗季隗於公子公子納季隗以叔隗妻衰生盾焉及反國以趙姬妻之生原同屛括姬請迎盾母於狄衰不敢姬曰不可夫得寵而棄舊非義安新而忘故無恩與人勤於危難富貴而不顧無禮失此三者其何以使人雖妾亦無以侍巾櫛矣詩曰采葑采菲無以下體徳音莫違及爾同死君其迎之衰許諾乃迎叔隗與盾來以叔隗為内子身親下之以盾賢請立以為後使三子下之謹按人之處世全本於識識所見者小則一物且分彼此况在親疎骨肉之間識所見者大則一生可以居人之後視人所生之子宛如己子而恬然義命自安矣趙姬因其子而念其母已難且迎叔隗而已下之復以盾為賢請立為後而使三子下之也總之天將興晉有重耳之主即有趙衰等之臣其家又有此賢内助言則卓碩心則謙退其閲歴世故有偉識以處此矣讓之道和妯娌内則曰適子庶子祗事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入又曰舅没則姑老冡婦所祭祀賔客每事必請於姑介婦請於冡婦舅姑使冡婦勿怠不友無禮於介婦舅姑若使介婦毋敢敵耦於冡婦不敢並行不敢並命不敢並坐謹按妯娌不序齒以夫之序為序冡婦承宗廟尤加重焉者家道之傳代必先於冡婦也適子冡婦既重宗子宗婦尤重徃來之禮無日不篤適子庶子祇事大宗車徒衆多亦必停止於外而以寡約相見也知宗子宗婦之重自知冡婦之為重姑雖年髙持家全恃冡婦然祭祀賔客之大事必請於姑而後行豈敢自專介婦則必請於冡婦猶之乎不敢自專也舅姑之使冡婦雖有勤勞不敢懈倦衆婦無禮則冡婦不友介婦又何得敵耦於冡婦哉雖有勤勞不敢恃此而與冡婦相抗非惟任事不敢抗即並行並命並坐槩乎不敢規制既嚴自不開乖盭之端而和妯娌之道得矣東漢明徳馬皇后年十四嵗選入太子宫承事光烈皇后旁接同列禮敬飭備上下安之和熹鄧皇后入掖庭為貴人時年十六恭肅小心動有法度承事隂后夙夜戰兢接撫同列常克己以下之雖宫人𨽻役皆加恩借帝深嘉焉謹按妯娌之禮多行於卿士庶人天子諸侯之家則接見希少而非禮無從以生然旁接同列即妯娌之類必敬以謹之於内禮以防之於外始能上下宴安明徳馬后和熹鄧后當初入宫闈之時上事太后即能與同列共相欽式豈非賢后之懿行乎晉王祥弟覽母朱氏遇祥無道覽年數嵗見祥被楚撻輒涕泣抱持至於成童毎諫其母朱又虐使祥妻覽妻亦趨而供之朱患之乃止崔孝芬兄弟孝義慈厚弟孝暐等奉孝芬盡恭順之禮坐食進退孝芬不命則不敢也鷄鳴而起且温顔色一錢尺帛不入私房吉凶有須聚對分給諸婦亦相親愛有無共之謹按五倫之中不及師弟師弟之道由朋友推而較朋友則加嚴九族之中不列妯娌妯娌之道由兄弟推而較兄弟則加辨嫂叔不親授受禮有明文嫂姑亟需篤好女誡不憚詳言之至於列女傳多不及妯娌惟晉史有王祥王覽崔孝芬崔孝暐二事一則代受勤渠一則互相親愛可謂和矣可以得處妯娌之道矣顧之推家訓曰夫有人民而後有夫婦有夫婦而後有父子有父子而後有兄弟一家之親此三者而已矣自兹以徃至於九族皆本於三親焉故於人倫為重也不可不篤兄弟者分形連氣之人也方其幼也父母左提右挈前襟後𥚑食則同案衣則傳服學則連業逰則共方雖有悖亂之人不能不相愛也及其壯也各妻其妻各子其子雖有篤厚之人不能不少衰也娣姒之比兄弟則疎薄矣今使疎薄之人而節量親厚之恩猶方底而圓蓋必不合矣唯友娣深致不為旁人之所移者免焉栁開曰顯考治家孝且嚴旦望弟婦等拜堂下畢即上手低面聴我顯考訓誡曰人皆兄弟無不義者盡因娶婦入門異姓相聚爭長競端漸漬日聞偏愛私藏以致背戾分門割户患若賊讐皆汝婦人所作男子剛賜者幾人能不為婦人言所惑吾見多矣若等寧有是耶退則惴惴不敢出一語為不孝事所以開軰賴此得全其家云謹按古人云家難而天下易治天下用法治家用情法過則流於刻用情過則流於揺惑夫婦各成其家故其言易聴妯娌各有其好故其釁易開初發於不及覺繼成於有偏信所許在曖昧則親友不能代剖其是非含怨在隠曲則日久更生其猜忌且或以難明之心跡觸境而生疑又或以偏重之情勢瞻顧而生畏疑則交好之心不堅畏則搆闘之手愈毒顔之推桞開所言何其痛而切直而婉然竊疑妯娌之美多不傳於經史妯娌之惡亦不傳於經史美尋常事惡無可指之事也是以其權全在丈夫張公藝九世同居唐髙宗幸其宅問所以能睦族之道公藝書忍字百餘以進忍則乖氣不生乖氣不生則妻言不動自相友相助而不相争矣隋牛宏有弟弼醉射殺宏駕車牛妻迎謂宏曰叔射殺牛宏無所怪直曰作脯妻又曰叔射殺牛大是異事宏曰已知此其齊家有道而妯娌自調然在女子則當以女誡家訓為兢兢也唐張孟仁妻鄭玅安其弟張仲義妻徐玅圓共處一室紡績寸絲不入私房有所饋俱納於姑臨用則請取之不問孰為己物徐富不驕鄭貧不謟鄭歸寧則徐乳其子徐歸亦然太平間表其門曰二難以為妯娌師法昌化章氏兄弟俱未有子其兄抱育族人一子未幾自舉一子弟曰兄既有子盍以所抱與我兄以告妻妻猶在蓐乃曰未得子而抱之方得子而棄之其謂義何且新生安可保也弟請不已兄妻曰必不得已寧以吾新生者與之弟不敢當兄妻竟與之後二子皆成立長曰翊次曰詡翊子樵槱詡子鑄鑑皆相繼登科睦婣之報如此謹按妯娌之難雍和者有二一則家資之厚薄一則子女之親疎若鄭氏徐氏之互乳其子而女工絶不分其為誰兄妻弟妻之互撫其姪寧舍其子而竟不以為異豈非天性之最良者乎遼耶律努妻蕭氏小字意辛國舅駙馬都尉陶蘇幹之女母呼圗公主意辛美姿容年二十始適努事親睦族以孝謹聞甞與娣姒會爭言魘魅以取夫寵意辛曰魘魅不若禮法衆問其故意辛曰修己以㓗奉長以敬事夫以柔撫下以寛母使君子見其輕易此之為禮法自然取重於夫以魘魅獲寵獨不愧於心乎娣姒服其言耶律术者妻蕭氏小字鄂爾本國舅貝勒之女性端慤有容色自㓜與他女異年十八歸术者待娣姒謹裕貞婉娣姒推尊之謹按此遼史中娣姒之賢者意辛以禮法自持不特足以破魘魅之術妬心忌心偏憎偏好之心無所不化能化娣姒乃能和娣姒訛里自㓜即與人迥别而娣姒之間又復謹而不溢裕而不迫貞而不撓婉而不戅和之曲盡其情娣姒安得不衆共推尊之也明顔荗猷迪吉録曰人家不和多因婦女以言激怒其夫而嫌隙遂開於同類蓋婦女所見不廣不逺故輕於割恩而易於修怨於是有親兄子姪至死不相徃來者有無子而不肯以猶子為後有多子而不肯與其兄弟者有為小姑則譖嫂於母為嫂妗則譖姑於夫者其事多端不可槩述不知我既入丈夫之家同榖同穴生子生孫長與此家傳世無極則丈夫之親皆我之親也和睦致祥乃我之吉事福慶也我之所以待舅姑即兒婦之所以待我我之所以待妯娌即我衆兒婦之所以相待終日親厚豈不快樂謹按此論最為痛切婦女所當諦聴故採為和妯娌之要道焉讓之道睦宗族女誡曰婦人之得於夫主由舅姑之愛己也舅姑之愛已由叔妹之譽己也由此言之我臧否毁譽一由叔妹皆知叔妹之心不可失而不能和之以求親其蔽也哉且夫妹者體敵而分尊恩疎而義親若叔媛謙順之人則能依義以篤好崇恩以結援使徽美顯章而瑕過隠塞舅姑矜善而夫主嘉美聲譽曜於邑隣休光延於父母若夫蠢愚之人於叔則托名以自髙於妹則因寵以驕盈驕盈既施何和之有恩義既乖何譽之臻是以美隠而過宣姑忿夫愠毁訾布於中外耻辱集於厥身進増父母之羞退益君子之累斯乃榮辱之本而顯否之基也可不慎哉然則求叔妹之心固莫尚於謙順矣謙則徳之柄順則婦之行凡斯二者足以和矣詩云在彼無惡在此無射斯之謂也謹按詩桃夭之篇曰之子于歸宜其家人言近而夫之弟妹逺而夫之親族無不咸宜也然必由近而及逺未有近先乖疎而逺能和洽者故女誡深言叔妹之心不可失而著其所以失之之故則曰驕盈示其所以得之之由則曰謙順驕盈則無徃而或宜謙順則無往而不宜凡敦睦宗族之道皆備於此矣晉公司馬昭王夫人曲盡孝道謙恭接下進嬪御以禮及晉代魏尊為皇太后能敦睦九族言必典禮浸潤之譖皆不得行金睿宗貞懿李皇后敦睦親族周給貧乏宗室甚敬之顯宗孝懿皇后圗克坦氏惇睦九族恩紀皆洽謹按九族由一本而分士大夫以下其族有親疎之殊而無上下之分至帝王之家則分懸而體嚴矣况正位宫壼養尊處優於九族不尤迥絶乎乃晉之王太后金之李后圗克坦后皆以敦睦親族著於史冊自古立國安邦未有不資懿親之夾輔者賢后妃以睦族贊其主裨益豈淺鮮哉若夫推恩有等得心有道是在審乎至當而已晉鄭袤妻曹氏魯國薛人也袤娶為繼室事舅姑甚孝躬紡績之勤以充奉養至於叔妹羣娣之間盡其禮節咸得歡心及袤為司空其子黙等又顯朝列時人稱其榮貴曹氏深懼盛滿每黙等升進輙憂形於色食無重味服浣濯之衣袤等所獲禄秩曹氏必班散親姻務令周給家無餘資宋陳堂前者漢州雒縣王氏女節操行義為鄉人所敬但呼曰堂前猶私家尊其母也堂前年十八歸同郡陳安節歳餘夫卒僅有一子舅姑無生事堂前歛泣告曰人之有子在奉親充家爾今已無可奈何婦願盡孝如子在日舅姑曰若然吾子不亡矣既塟其夫事親治家有法舅姑安之子日親年稍長延名儒訓導既冠入太學年三十卒二孫曰綱曰緩咸篤學有聞初堂前歸陳夫之妹尚幼堂前教育之及笄以厚禮嫁遣舅姑亡妺求分財産堂前盡遺室中所有無吝色不五年妹所得財為夫所罄乃歸悔堂前為買田置屋撫育諸甥無異己子親族有貧窶不能自存者收養婚嫁至三四十人里有故家甘氏貧而質其季女於酒家堂前出金贖之俾有歸子孫尊其遺訓五世同居並以孝友儒業著聞乾道九年詔旌表其門閭謹按睦宗族之道非特和恊無間而已蓋必加以恩惠周其窮乏而後敦睦有其實焉世之富且貴者多擁厚資自奉若起艱難而致饒裕益吝惜不好施矣晉曹氏夫子俱顯所得禄秩必班散親姻至家無餘資宋陳氏以嫠婦辛苦治家而能贍無饜之夫妹親族貧者收養婚嫁甚衆一則居易驕之勢不自養而以養人一則當至難之遇能自立而又能立人考其行事豈非可傳可法哉御定内則衍義卷十三
