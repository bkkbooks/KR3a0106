body:
  text: 欽定四庫全書御定內則衍義卷七大學士傅以漸恭纂禮之道守貞一易屯六二爻辭曰女子貞不字十年乃字恆六五象曰婦人貞吉從一而終也序封傳曰夫婦之道不可以不久也故受之以恆謹按天地既立惟人欲最險故屯卦下震上坎動乎險中乃大亨而猶必利貞六二柔順中正與九五剛柔相配而相隔之位逺當屯難之際茫無合期初九則最近且建侯而得百姓之心肫懇以求婚媾其情最難却而執定不嫁遲之又久妄求者去正應者合卒歸九五豈非天下至貞者哉恆卦震為長男巽為長女百年婚姻確乎不改序卦傳曰恆居咸後蓋咸以少男少女相配一日如是終身如是故受之以恆也易經稽實待虛存體應用原不定指夫婦而夫婦之理則當以此為正故引為守貞法詩周南曰南有喬木不可休息漢有游女不可求思漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣可可泳思江之永矣不可方思召南曰厭浥行露豈不夙夜謂行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從謹按文王之化自近而逺先及于江漢之間而有以變其淫亂之俗故出游之女端莊靜一非復前日之可求也喬木翹楚高而且潔漢廣江永凛不可犯秣馬秣駒悅之至不可泳不可方敬之深即南國之人遵召伯之教服文王之化女子能以禮自守而不為强暴所汙作行露之詩以絶人雖速之以獄速之以訟而究之不可移我心也女子之貞如此則上之所以感之者可知矣鄘柏舟曰泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只謹按弼鄘兩風俱以柏舟為首見閨門為萬化之原此詩則衛世子共伯蚤死其妻共姜守義父母欲奪而嫁之共姜作詩以自誓也柏舟與河有定在猶夫共伯有定配也有定配則豈可以死生二其心是心也恩之淺者或不能諒母之於我覆育之恩如天罔極何不諒我心而欲奪之乎蓋雖不見諒於母而天地鬼神鑒之共姜其賢矣哉禮郊特牲曰天地合而後萬物興焉夫昏禮萬世之始也取於異姓所以附逺厚别也幣必誠辭無不腆告之以直信信事人也信婦德也一與之齊終身不改故夫死不嫁又曰出乎大門而先男帥女女從男夫婦之義由此始也婦人從人者也幼從父兄嫁從夫夫死從子謹按夫婦之道等諸天地合兩姓為一體乃能上承宗祏下衍雲仍所關既大故同姓雖百世而婚姻不通娶異姓嚴之也附逺嫌之義而大明其有别之體六禮備而後成親金石之盟天日之矢以信人事則驕奢放惰之心杜以信為德則恭勤慈愛之法詳三從既昭五倫乃定周之前貞婦烈女無傳人夫人而皆能為貞婦烈女也後世患難相尋險僞日勝而不以時勢變其操寧苦毋甘可不謂不朽盛事歟周陶嬰魯門女少寡魯人將求焉嬰乃作黃鵠歌以自明終身不改其歌曰悲夫黃鵠之蚤寡兮七年不雙宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼哀哉兮死者不可忘飛鳥尚然兮况于貞良雖有賢雄兮終不同行蔡人妻宋人之女既嫁於蔡而夫有惡疾其母將改嫁之女曰夫之不幸即妾之不幸也奈何去之適人之道一與之醮終身不改夫芣苡之草雖甚臭惡猶始於捋采之終於懷擷之浸以益親况於夫婦之道乎彼無大故又不遣妾何以得去終不聽秦羅敷邯鄲女子為千乘王仁妻仁後為趙王家令羅敷出采桑陌上趙王登臺見而悅之置酒欲奪之羅敷善彈筝作陌上桑詞以自明不從楚貞姫楚白公勝之妻白公死其妻紡績不嫁吳王以重幣聘焉白妻辭之曰忠臣不借人以力貞女不嫁人以色豈獨事生若此於死者亦然妾不能從夫死今可更嫁乎卒拒不行南齊蔣雋妻黃氏宜興人夫早世矢志不踐二庭家人逼之欲自殺乃已建元二年表其閭梁王氏灞陵王整之妹冒母姓姚氏名姚玉京年十六歸衛敬瑜敬瑜溺水死玉京守志養舅姑嘗有雙燕巢梁間雄為鷙鳥所傷其雌悲鳴至秋集玉京臂如告别玉京以紅縷繫足曰新春復來為吾侣也明年果至如是者五六年玉京疾卒燕復來家人語曰玉京死矣墳在南郭燕遂至墳所亦死雍州刺史晉昌侯操題曰旌義衛氏之門北魏董景起妻張氏陳留人皇興間景起早亡張氏時年十六痛夫少喪且無子息遂哀傷過禮終其身不食葷血獨守貞操鄉曲高之終見標異張洪初妻劉氏滎陽京縣人年十七夫亡遺腹生一子三嵗又殁其舅姑年高朝夕奉養兄矜其少寡欲奪嫁之劉自誓不許以終其身刁思遵妻魯氏滎陽人始笄為思遵所聘未逾月而思遵亡其家憫其少寡許嫁已定魯聞之以死自誓父母不達其志遂赴郡訴稱刁氏吝護寡女不使歸寧魯乃與老姑徒步詣司徒府自陳狀普泰初有司聞奏詔本司依式標榜唐崔繪妻盧氏鸞臺侍郎獻之女繪喪盧年少家欲嫁之稱疾不許女兄適工部侍郎李思冲早亡思冲欲求為繼室歸幣三百輿盧不可曰吾豈再辱於人寧沒身為婢耳是夕出自竇糞穢衊面還崔舍斷髮自誓武后詔為浮屠尼以終樊㑹仁母敬氏河東人字象子笄而生㑹仁夫死事舅姑孝順舅姑以其少欲嫁之濳約婚於里人至期陽為母病使歸視敬至知見紿乃佯為不知者私謂會仁曰舅將奪吾志汝云何㑹仁泣敬曰兒母啼乃伺隙遁去追及半道以死自誓乃罷㑹仁未冠卒敬母亦死葬畢謂所親曰母死子亡何生為不食數日死聞者憐之楚王靈龜妃上官氏靈龜卒將葬議者欲不舉前妃妃曰逝者有知魂可無托乃備禮合葬服除兄弟諭以無子可不有行妃泣曰丈夫以義婦人以節我未能殉溝壑尚可御粉澤祭他祚乎將自劓衆救乃止李氏二女白之孫也已為編民陳雲劉勸妻宣歙觀察使范傳正與白有世誼訪得之勸之改適士族二女曰夫婦之匹命也在孤窮既失身下俚仗威力又援締他門死何面目見大父於地下傳正不奪其志且為復其徭役王韞如王忠嗣女忠嗣鎮北京以女歸元載元載少貧嵗久見輕韞如勸之逰學肅代兩朝載為宰相貴盛賓客候門韞如復為詩以諌之有公孫開館招佳客知道浮雲不久長之句元載不聽被誅上令王氏入宫嘆曰二十年太原節度使女十六年宰相妻誰能為長信昭陽之事遂斃於京兆杖下五代魏成妻周氏良鄉民成年五十乏嗣娶周氏生一子後成殁周氏年二十服闋親戚咸勸之再適周氏曰嘗聞烈女不更二夫妾雖愚婦豈肯更二姓乎於是服勤耕織事姑三十餘年事聞旌其門宋包繶妻崔氏繶早亡惟一幼兒姑意崔不能守使人試其心崔蓬垢涕泣曰生為包婦死為包鬼誓無他也後兒亦卒母吕誘崔嫁崔曰舅殁姑老將安之乎吕怒崔泣曰倘有不義見迫必絶於尺組之下母乃止卒於包氏事聞旌表繶拯之子也黃淑字致柔建寧進士王防妻防為泗州户曹卒黃挈柩歸未幾母又卒所親議政適盧陵令黃誓不改節詠竹詩以見志議遂寢後憂鬱死臨終囑其妾以所詠詩置墓中林氏龍溪人年十九嫁為謝氏婦踰年而寡父母以其無子欲奪而嫁之誓不許曰吾立一嗣亦無不可守志六十餘年嘉熙間縣令趙綘夫為立碑於墓郡守李韶著曰守節婦林氏墓王氏龍溪人蘇宋傑妻年二十一而寡方娠夫家貧父母欲奪其志誓不許父母怒絶其往來既生男父母意猶未解不得歸寧者七年及男既長則曰吾今不復强汝嫁矣愛如初侯氏南豐人謝泌妻家貧事姑孝盜起侍姑不去盜逼之不從及之仆溝中賊退漸蘇見一金珠篋族婦以為己物稍分之辭曰非我有不願也後夫與姑俱亡子幼父母欲改嫁侯曰寧餓死耳卒終其節張氏婺源人許某妻也年二十餘夫死遺腹生一子明年姑與子俱亡夫族盡據其家而有之乃還母家鬻簪珥自營一室奉許氏祀嫠居二十三年而殁楊氏知欽廉州友之女適蔡苦納喜讀書通大義夫卒時年二十有三守節不二書乞為寒水玉願作冷秋菰二句於壁以自勵胥氏金溪人嫁黃君隽未期而寡父問所志答曰生為忠孝家婦死為忠孝家鬼蓋以雋為忠孝黃彥逺之裔也陳節婦臨海人貢士朱伯履妻夫少亡有欲奪其志者陳氏撫膺慟絶既蘇嘆曰吾寧速死忍聞此言引刀欲自剄姑亟奪之乃免事父母舅姑至孝詔封安人旌其門元薛世榮妻韓氏河南人世榮殁時年二十一孀居守節年七十八而終至元五年旌表其門燕山項氏其夫江南人行賈燕薊間聘項與居未幾夫死項時年二十奉柩回江南勵志孑居以守夫祀孝節婦崑山人水得之妻年二十夫亡誓不嫁或勸之曰無子老將何依婦拒曰夫者天也天可二乎夫死無子命也欲自經其兄子覺之得不死後同籍繫獄婦當連坐任事者脅之曰若適人可全婦曰吾不忍以危難棄禮義雖死無悔事聞詔旌之明徐氏名瑩東陽趙為濳妻年二十七為濳殁撫遺孤晝夜哭者纍年有為言禮婦人不夜哭自是夜惟飲泣間誦孝經論語小學以節哀痛氣且絶猶誦割不正不食席不正不坐目不視邪色耳不聽邪聲諸語緝緝不絶口婦郭氏亦以孝聞有司兩上其事詔皆旌之孫氏陽武人陳子英妻英充飛虎衛小旗洪武初從北征謂孫曰吾生死未可知幸有二弱息汝肯撫育乎孫曰君但盡忠報國吾母子弗煩憂也英果死于戰父母欲奪其志孫泣曰吾不忍背夫而生即欲自盡父母懼乃止矢志終其身朱氏泉州衛指揮僉事張盛妻歸一年而盛卒甫十七遺腹六月生子昱奉事盛母及祖母俱紡績以供既卒躬治三喪撫夫之三弟乃家益窘抱子昱依外祖蔣氏以居外祖母欲奪其志朱竊入室自縊家入覺而解之良久方蘇自是人不敢言後昱襲官朱垂老雖親戚罕見其面事聞旌表謹按天下凡事皆可易獨志不可易故精合於神謂之心精合於氣謂之志宅平而無為者心也領鋭而有膽者志也婦人矢志所謂至柔而有至剛之用者也陶嬰作歌羅敷製詞黃淑楊氏詠詩蔡人妻之引芣苡姚玉京之感雌燕皆志之發於言者董妻不食葷血侯氏不願金珠或為晝夜之哭或為立嗣之舉張氏項氏孑居奉祀胥氏不墮忠孝之裔以至徒步陳狀遺子又逝終日不食窮且益堅薛世宗之妻與夫事姑三十年者老而不改又何疑楚貞妻崔繪妻之不適貴人上官氏之不御粉澤王韞如不得志於奸相李氏二女辭威力之援哉甚至不得歸寧者七年終感父母之心又豈以危難棄禮義乎則黃氏崔氏陳節婦孫氏朱氏之欲自殺敬氏之逃而卒死義也匹夫不可奪志洵哉其不誣也唐郭皇后汾陽王女孫父曖尚升平公主實生后選為廣陵王妃生穆宗帝即位為后妃羣臣三表請立后帝以后出元勳族復正位微賤不易防持不下穆宗立尊為皇太后穆宗崩宦官請太后臨朝稱制太后曰爾欲以天后待我耶我家世守忠義非武氏比太子雖少獨可選重德為輔佐爾輩母預政即國家尊安吾何為哉自古未聞有女子為天下主而能致理者也取制書手裂之謹按禮為天地之經民實則之則天明因地性六制從此得制焉人果能揆諸理而猶有越軼之舉者罕矣嚴拒稱制之請選重德為輔佐郭后所言尤千古之龜鑑也五代時虢州司户參軍王凝卒於官家貧獨一子尚幼妻李齊人也負遺骸歸過開封止旅舍主人見其窶格之不留宿李顧天已暮不肯去牽其臂出之李仰天長慟曰為婦人手為人所牽乎不可以一手故汚吾身即引斧斷其臂見者環聚觀皆為嗟泣開封尹聞之為笞其主人豫藥封瘡豫齎資歸焉元崔烈婦者周珠呼妻也從珠呼官平陽金拔城下令官屬妻子匿者死自首者出之時珠呼以使事在上黨崔即抱幼子禎自言將將使軍吏書其臂出之崔氏曰婦人臂使人執而書辱也豫吏金請書之紙吏曰軍令也不敢令崔自擅䄂懸筆書之焉既出將悔命追之伏土窖中三日乃得免未幾珠呼卒崔年二十九誓不更嫁斥麗飾服布素以資産遺親舊放遣僕婢躬紡績自食有權貴求娶自毁面絶之治家教子具有法後四十年乃卒謹按身也者父母之遺體也敢不敬乎况女子以身事人則身為丈夫之身為丈夫而守身如之何可以不慎故守身為女子第一義李氏之引斧崔氏之懸書可以傳矣遼耶律氏太師逹魯之妹小字常格幼爽秀有成人風及長自誓不嫁咸雍間作文述時政上稱善後隨兄魯格謫鎮州常蔬食布衣人問何自苦如此對曰皇儲無罪遭廢我輩豈可美食安寢及太子被害不勝哀痛年七十卒於家苫􅀈古麻里氏康里國王族婦也元太祖拔康里氏新寡有二子曰竒爾雅雅幼而國破無依欲歸朝念無以自達一夕有數駝重負突入營驅不去旦繫置營外候有求者歸之如是十餘日終無求者乃發視其裝皆重寶也驚曰殆天欲資我東耶遂載二子越數國馳至上都具以獻元主命有司治邸舍具廪餼居焉居二年謁帝欲歸國帝曰昔何來今去何也意豈有不足耶對曰昔以國亂無主歸陛下賴陛下威德國稍定欲歸守墳墓耳妾二子願留事陛下元主喜立召二子入宿衛禮遣之後十三年復來則二子從憲宗伐蜀矣至和寧聞憲宗崩諸將還而二子獨後以為憂過古廟禱焉若聞有神語好好者而不知其解問國人通漢語者知為吉祥語乃還舍則二子至矣遂留居焉竒爾無子雅雅後封康國王其母以福壽終孫阿實克布坦後為右丞相封寧王其繼室必克倫氏有至行王薨寡居三十年未嘗妄言笑身不服綵詔表門與元配並封順王夫人明胡貞女太學士胡廣女吉水人在妊時太祖命以大學士解縉子為壻越數月果生貞女名吉慶遂訂盟未幾解氏被誣舉家戍遼諸父欲改適貞女以刀截耳家人救之血被兩頰因曰薄命之婚皇上主之父面承之一與之盟終身不改今背主違父何以生為越數年解氏䝉宥胡歸解氏終以孝聞謹按協和始於惇睦卜世發於尊親豈不以宫庭之所繫者大哉而心之所見不大苐唯喏於牀第之間何足貴有能知憂知懼感恩圗報是亦女道之錚錚者矣耶律氏减衣食而慟及皇儲古麻里留二子以事君胡貞女援君父以安命其天性所秉果有以異於人歟抑教化有先焉者故求忠臣孝子之門則可而孝子不能皆為忠臣所見未必大也於女道亦然魯義姑齊攻魯郊見一婦人抱姪棄子以避軍齊將問其故婦曰棄子割私愛抱姪存公義齊將曰魯未可伐也遂將師而還魯君知之賜束帛百端旌為義姑秦嬴氏晉圉質於秦穆公以女懷嬴妻之六年圉將逃歸謂嬴氏曰吾去國數年子母之接怠而秦晉之交不加親也夫狐死首丘我其首晉而死子其與我行乎嬴氏對曰子晉太子也辱於秦子之欲去不亦冝乎雖然寡君使婢子侍執巾櫛以固子也今吾不足以結子是吾不肖也從子而歸是棄君也言子之謀是負妻之義也三者無一可雖然子行矣吾不敢泄言亦不敢從子圍遂逃歸楚越姬者越王勾踐之女也昭王與蔡姬越姬逰雲夢曰吾願與子生若此死亦若此蔡姬許之越姬不許曰妾聞婦人以死彰君之善不聞茍從其暗死為榮及昭王救陳病在軍中有赤雲夾日如飛鳥史謂可移於將相王不忍越姬曰大哉君王之德請先驅狐狸于地下卒死之而蔡姬不能死楚人立越姬之子齊姜齊桓公之宗女晉文公之夫人也文公初避驪姬難奔齊齊以姜妻之遇之甚善文公曰人生安樂而已誰知其他子犯知文公之安齊也欲行而患之與從者謀於桑下蠶妾在焉妾告姜氏姜殺之而言於公子曰從者將以子行聞者吾已除之矣公子必從不可以二天未亡晉有晉國者非子而誰公子不聼姜與舅犯謀醉公子而載之以行公子復國以姜為夫人東漢梁節婦者梁婦人也因失火兄子與其子在內欲取兄子輒得其子獨不得兄子火盛不得復入婦人將自趨火人止之曰爾本欲取兄之子皇恐卒誤得爾子中心謂何何至自赴火婦人曰梁國豈可戶告人曉也被不義之名何面目以見兄弟國人哉吾欲復投吾子為失母之恩吾勢不可以死遂赴火而死犍為盛道妻同郡趙氏女字媛姜建安五年益部亂道聚衆起兵事敗夫妻執繫當死媛姜夜中告道曰法有常刑必無生望君可速逃建立門戶妾自留獄代君塞咎子翔時五嵗使道㩦持而走度道亡逺乃以實告吏應時見殺父子㑹赦得免道感其義終身不娶京師節女者長安大昌里人妻也其夫有仇人報其夫而無道徑聞其妻之仁孝有義乃劫其妻之父使要其女為中詷父呼其女告之女念不聽之則殺父不孝聽之則殺夫不義不孝不義皆不可以行于世欲以身當之乃佯為許諾曰旦日在樓上新沐東首臥則是矣妾請開戶牖待之乃告其夫使臥他所因自沐居樓上東首開户牗而卧夜半仇家果至斷頭持去明而視之乃其妻之頭也仇人哀之以為有義遂不殺其夫元姜昱妻范氏杞縣人至正間昱奉親與兄弟避難母亡於道繼而父兄亦亡會丞相台哈布哈總戎昱從事左右奉命他所行且語范曰吾兄已亡惟餘一息茍不得已棄己子耳范許諾尋果兵變范如夫所云棄子存姪略無一毫不平意亂後得一子人以為義感所致因名其子曰義謹按秉大義而定天下者丈夫之事女子則何知焉古語曰婦人無才便是德今竊以為不然婦之輔天猶夫月之配日也月借日以為光然日究不自明於夜而月是賴安在婦人之不當秉義哉當兩軍相敵之際毅然棄子而抱姪至變而為取姪於火中姪不得而甘心赴火又變而為遵夫之命棄子存姪毫無不平可不謂難哉嬴氏不敢泄亦不敢從齊姜殺其告者謀醉而載之盛道妻之留獄而全夫命京師節女之斷頭而易夫命至楚越姬不茍從其主以暗死而乃以死塞天變也所全不尤大哉秦伯嬴秦穆公之女楚平王之夫人昭王之母也吳師入郢闔閭盡妻其後宫次至伯嬴持刀拒之曰妾聞生而辱不若死而榮吳王慙遂退舍伯嬴閉永巷之門三旬不釋兵秦救至昭王乃復國晉靳康女美姿容有志操劉曜誅靳氏將納女為妻靳曰陛下既滅其父母兄弟復何用妾為妾聞逆人之誅也尚汚宫伐樹而況其子女乎因號泣請死曜哀之免康一子盧惟清妻徐氏淄川人惟清仕校書郎以僚姻纍貶播州尉徐還鄉里糲食不御鉛膏采飾會大赦徐間關迎惟清至荆州聞惟清死二髯奴將劫徐歸下江徐知之數其罪奴不敢逼劫其資去徐倍道行至播州足繭流血得惟清尸以喪還閲嵗至洛陽葬之以無子終服還陳留汴州刺史徐浣髙其節頌而詩之南唐余洪妻鄭氏建州人查文徽平建州鄭氏為亂兵所獲文徽欲犯之鄭氏罵曰王師吊伐凡義夫節婦宜旌賞乃欲加非禮於一婦人文徽愧而歸之宋姚三五妻程小姑大邑人一日姚如外小姑煢然獨居夜漏半强奴持刃逼之號呼義不受辱身被重創者十四訖全大義縣上其事論奴如律大觀中封旌德縣君元黃氏名妙姝松溪人至正丙申青田寇侵縣治黃氏時方盛年與羣逃山谷間為盜所執義不受汚哀哭而伏地不行賊怒驅迫以前行數里經高崖數十丈遂投崖下盜意其必死舍而去至暮其夫蹤跡之得於崖下幸不死遂舁而歸鄉黨高之謹按從一之道處常則易處變則戞戞乎其難之視死生為不足動其心夫亦無足動其心者矣吳王劉曜勢且赫赫兵且翼翼而貞烈所至挺不可撓又何論逆僕之與強賊哉皭然不滓固性善之昭昭可徵者耳晉嚴憲京兆人杜有道妻年十八而寡誓不改節撫教孤子植及女韡後植果顯女亦有淑德宋周渭妻莫氏名荃恭城人劉鋹時政繁賦重民不安其生渭率鄉人六百踰嶺將避地㑹盜起道絶後還恭則廬舍燼矣乃脫身北走不暇與妻訣二子幼妻少父母欲嫁之荃不可親蠶績碓舂給朝夕二子長畢為婚聚不知渭聞問渭不知荃存亡者二十有六年雍熙中渭為廣南諸州轉運副使遣人求得之乃復完葉氏慈溪人歸鄞之史簡簡為縣尉杖死葉氏時年二十五日夜抱幼女悲泣夫死時方娠囑曰若女當嫁果男也幸謹視之葉氏泣受遺言後果得子於是毅然自守鄰保咸謂汝家若是褓中兒寧可恃耶葉氏誓死不聽元任建妻王氏尉氏人建仰弋林中墜矢中面死時年二十三一子尚在襁褓中父母憐其早寡欲嫁之王曰任氏有後豈忍背之誓不他適歷四十餘年而終至元間事聞詔旌其門樂壽孫妻劉淑靜鄞人歸壽孫三年壽孫溺死同載者多不得尸劉氏生男甫周嵗抱之沿流上下仰天哭而求尸尸忽自浮得斂葬焉時年二十九勤苦守志撫孤成業旌其門陳氏福寧州人林克威妻也元季亂兵屠戮克威家陳氏扶姑抱子走匿山谷中後潛歸母家時年方二十有四母憐其少欲使改適令人微諷之陳氏泣曰棄老稚而他適禽獸所不忍為也毅然勵操終養其姑撫成其子年八十三而終明平氏仁和人年十九歸同里何富五年而富沒越五月生男誓不再適事舅姑惟謹撫孤至成人四十年如一日洪武間旌表楊氏無錫人俞彥昭妻彥昭戍滇南卒楊年二十一子甫期家貧誓不他適養姑强以天年終既而子婦俱早世楊又撫其孤志愈勵詔旌之鄒氏莒州人王政妻政亡無子養姪惟子為嗣亦卒婦邊氏事鄒守節終身洪武十七年兩旌之梅氏安東人年十八適士人謝黑兒夫疾篤囑曰爾年少勿為我慮梅泣下欲自盡以隨姑覺而止之曰吾夫婦無他兄弟備養况汝娠未娩倘得一子以續吾祀豈不美乎梅悟後果生一子夙夜紡績奉舅姑課幼子舅姑卒脫簪珥以襄事其子俊亦成立孀居四十餘年有司以聞宣德間旌表其門倪氏江寧人十六適張豫豫卒倪年二十六撫二孤益晉稍長遣就學舅姑壽終力營喪事膏沐不御者五十年後益舉進士纍官學士宣德間旌表杜氏王善妻江陵人夫卒生子倫甫二嵗姑以年少家貧密勸之嫁杜曰夫以老母孤兒托我所不死者以此耳遂痛哭以死自誓姑年八十卒以禮斂葬教子成立孀居四十餘年正統中旌施氏定州衛百户何毅妻年二十一生子甫二齡毅死哀痛漿水不入口欲自殺殉葬姑知有孕勸阻之後果生子舅姑親戚憐其少欲嫁之施曰夫亡子幼况舅姑年老無依可適人乎遂奉舅姑以終撫二子至于成立年六十二嵗本衛事聞旌表徐氏藁城人教諭石麟之繼室隨夫之任廣東正統初麟卒于官時徐年二十四踰三月生子玉前妻子方五嵗徐㩦二幼扶櫬還鄉禮葬養舅姑甚謹舅姑相繼卒皆以禮葬之徐以紡績為生終無異志教二子繼承父志勉以修學後登甲申進士任御史成化二年旌表徐氏豐城吳都憲祺繼室又張氏李氏俱副室也俱芳齡徐氏事姑以孝聞嘗從祺北上抵河西忽祺墜舟徐躍出船下水頃抱以出徐逝奉櫬泝長沙風烈舟顛危甚哀哭籲天舟乃定李無出張嗣孩提或有以他意諷之者徐曰婦人夫死稱未亡人無再醮禮守適各惟所志張與李泣曰烈女無二肯憚一死辱大人于地下茹苦服縞共撫其孤事聞旌表匡氏雒陽人董雄妻生二子長成方四嵗次武甫半周雄病篤曰吾死若肯善撫二子乎不則任所適匡泣曰生則同室死則同穴矧有子可恃安敢有他雄沒匡守節二子亦克成立成化九年旌宋氏陜西咸寧人父翬知歸德州宋適歸德衛千户趙琳琳卒宋年十九撫其子遜教之甚嚴事姑謹姑病疽宋日䑛濯之竟愈成化初旌李氏項城人趙二妻二病曰吾死後汝不宜守李泣曰夫死謂之未亡人若有異志他日何以相見于地下未幾遺腹生子曰妾不幸不得事夫今得撫孤成立不墜趙氏幸矣後受旌張文娥新建人指揮使方印妻梧州知府張元春女正德庚午印督兵討桃源劇盜死之張聞訃號曰吾夫以死報國吾何難以死報夫一慟遂絶救之得蘇有娠默禱曰姑俟之生男吾與俱生生女吾與俱死踰月生子恩值家徒壁立惟紡績事姑以終天年嘉靖間旌表後以子貴封太淑人贈太夫人謹按孝莫要于昌後有後人以承先祀則吾一身之事始可脫然無憾是以教子一類詳哉乎其言之若時勢適當其窮夫已逝矣舅姑且老孑然女流或僅有六尺之孤或僅有孩提之孤至或僅有遺腹之孤成立難期香烟易斷而躬親㸑袵苦貞者數十年卒教其子以有成也是以母而兼嚴父之道者若并養姪亦卒守節不衰其志益屬可哀三少女同撫一孤誰得而强之哉故夫女子之守貞天性也寡婦之撫孤人紀也御定內則衍義卷七
