body:
  text: 欽定四庫全書御定內則衍義卷五大學士傅以漸恭纂教之道勉學宋真宗章獻明肅劉皇后益州華陽人也李宸妃生仁宗后以為己子與楊淑妃撫視甚至仁宗即位尊為皇太后太后諭輔臣曰皇帝聽斷之暇宜詔名儒講習經史以輔其德於是設幄崇政殿之西廡而日命近臣侍講讀謹按學莫盛於宋非獨儒臣輩出蓋代有令主開之當仁宗時已尊經學古矣然詔名儒講經史之諭則發自劉太后良以人主之德業尤重於即位之始始而崇儒嗜學則聲色遊觀諸事不足以奪其志而損其德否則不謹於始必荒於終且理學之儒臣疏則功利之小人進治亂之幾係焉此太后之所以汲汲也史稱仁宗於太后慈孝無間蓋實有以教之豈特撫視篤至而已哉鄒孟母者孟軻之母也其舍近墓孟子之少嬉遊為墓間之事踴躍築埋孟母曰此非吾所以居子也乃去舍市旁其嬉戲為賈人衒賣之事孟母又曰此非吾所以居子也復徙舍學宫之旁其嬉遊乃設俎豆揖讓進退孟母曰真可以居吾子矣遂居之孟子既學而歸孟母方績問曰學所至矣孟子曰自若也孟母以刀斷其織孟子懼而問其故孟母曰子之廢學若吾斷斯織也夫君子學以立名問則廣知是以居則安寧動則逺害今而廢之是不免於厮役而無以離於禍患也何以異於織績中道廢而不為者哉孟子懼旦夕勤學不息受業於子思之門人遂成天下名儒宋歐陽修母鄭氏廬陵人年二十九而寡親教其子家貧無紙以荻作筆畫地為書後修卒成大儒宋程皓程頥母向氏河南人明於經所親教其子嘗令學書署伯子皓曰殿撰叔子頥曰處士謹按聖賢之學至鄒孟子而道益明至宋歐陽子二程子而傳愈廣然皆有母訓焉以孟子之賢母未徙舍尚為陋習所染母未斷織猶以淺學自安則凡訓子者安可憚遷徙之勞縱姑息之愛哉歐陽氏之家甚貧其母不因困而弛教程氏之家粗足其母不耽安而失學蓋皆有孟母之遺風焉夫教其子應文詞之科登貴顯之位皆未足以不朽獨三母之教子使之追蹤聖賢究心理學道明於天下功被於後世豈非千古教子之極則與宋蘇軾母程氏眉山人嘗夜讀漢史至范滂傳喟然而嘆軾時幼侍側謂母曰某若為滂夫人許之乎母曰汝能為滂吾獨不能為滂母哉軾後為名臣文章著於天下元虞集母楊氏國子祭酒文仲女也文仲世以春秋名家而族弟參知政事棟明於性理之學楊氏在室即盡通其説集與弟槃隨父汲於嶺外干戈中無書籍可携楊氏口授論語孟子左氏傳歐蘇文輒成誦比還長沙就外傅始得刻本則已盡讀諸經通其大義矣集後以文章為元名家謹按理學而下其次莫如文章然非有益於國家可傳於後代則不是貴宋之蘇軾元之虞集所著章疏之類多關切政務通達治體其他文辭並有法度後學皆誦述之然史稱蘇母讀史虞母通經所得於慈幃之訓者豈淺鮮哉至蘇母勵其子以學先賢如范滂之蒙難而勿顧虞母當干戈擾攘不誨其子以茍且之學而必以聖經賢傳授之是皆卓然有丈夫之識若二子立朝終稱名臣亦可謂能顯親揚名者矣北魏房景伯母崔氏清河人崔元孫之女也性嚴明有髙節厯覽書傳多所聞知親授子景伯景光九經義學行修明並為當世名士宋蒲卣母任氏南宫人知書里中號任五經自教其子卣中元豐間進士纍官大夫遼邢簡妻陳氏營州人父陘五代時纍官司徒陳氏甫笄涉通經義凡覽詩賦輒能誦尤好吟咏時以女秀才目之年二十歸於簡孝舅姑閨門雍睦有六子陳氏親教以經後二子抱朴抱質皆以賢位宰相贈陳氏魯國夫人元周氏灤平石城人年十六適李伯通生一子名易金末伯通監豐潤縣元兵攻之城破不知所終周氏謂偕行者曰人茍愛其生萬一受辱不如死即自投於塹主者怒拔佩刀三刃其體而去得不死遂携易而逃間關至汴績絍以自給教易讀書有成謹按諸母所遇不同而訓子以成立則同夫名位之大小時勢之安危是有數焉士君子所可自恃者學耳房母蒲母邢母皆淹通經史出所素習以導其子周氏史不稱其知書然觀其臨難致命非明於理道者不能然則為母者欲淑其子固當先習於正學為子者欲光其母尤當自勉於大成也魯公父文伯出學而還其母季敬薑側目而盻之見其友上堂從後階降而却行奉劍而正履若事父兄文伯自以為成人矣敬薑召而數之曰昔者武王罷朝而結絲練絶左右顧無可使結之者俯而自申之故能成王道桓公坐友三人諫臣五人日舉過者三十人故能成霸業周公一食而三吐哺一沐而三握髮所執贄而見於窮閭隘巷者七十餘人故能興周室彼二聖一賢者皆霸王之君也而下人如此其所與遊者皆過巳者也是以日益而不自知今以子年之少而位之卑所與遊者皆為服役子之不益明矣文伯謝罪於是乃擇嚴師賢友而事之所與遊者皆黃髮兒齒也文伯引袵攘捲而親饋之敬薑曰子成人矣北魏巨鹿魏緝母房氏訓導其子有母儀法度緝所交遊有名勝者則身具酒饌有不及己者輒屏臥不飱須其悔謝乃食善誘嚴訓類皆如是謹按勉學之道著於傳記甚多然舉其要則曰毋友不如己者蓋友之德業出我上必日思企而及之學不期進而進矣友之德業出我下則無以益我而易於自滿學不期退而自退矣敬薑之論得聖賢心法魏母亦有見於大道為人子者觀二母之深心思兩子之悔謝不如己者且不可交而況於損己者乎訓忠漢丞相安國侯王陵之母陵始為縣邑豪漢髙祖微時兄事陵及髙祖起沛陵亦聚黨數千以兵屬髙祖項羽與漢為敵國得陵母置軍中陵使至則東嚮坐陵母欲以招陵陵母私送使者泣曰為老妾語陵善事漢王漢王長者無以老妾故懷二心乃伏劒而死以固勉陵項羽怒烹之陵志益感奮終與髙祖定天下位至丞相封侯專爵五世晉何無忌母劉氏將軍建之女也少有志節弟牢之為桓元所害劉氏每銜之常思報復及無忌與劉裕謀劉氏察其舉措有異喜而不言會無忌夜於屏風裏制檄文劉氏潛以器覆燭徐登梯於屏風上窺之既知泣而撫之曰汝能如此吾讎恥雪矣因問其同謀知事在裕彌喜乃説桓元必敗義師必成之理以勸勉之後果如其言唐董昌齡母楊氏世居蔡昌齡事吳少陽至元濟時為吳房令母常密戒曰逆順成敗兒可圗之昌齡未決徙郾城令楊復曰逆賊欺天神所不福當速降無以我纍兒為忠臣吾死不恨會王師逼郾城昌齡乃降憲宗喜即拜郾城令兼監察御史昌齡謝曰母之訓也臣何能帝嗟嘆元濟囚楊欲殺者屢矣及蔡平而母在陳許節度使李遜表之封北平郡太君謹按傳稱始於事親終於事君士君子忠朝廷定邦國此孝之大者然親之愛子莫不喜其安常而憂其遇變自非秉忠義之性具明達之識孰能為子決順逆辨興廢哉漢楚之際項羽屢勝東晉之亂桓元甚強至唐吳元濟世擁節鉞犯順㺯兵王師屢討之不下當時智勇之士或未決所從乃王母知漢髙之必興何母知劉裕之必濟視羽若元直如摧枯拉朽董母辨論順逆卒不出所料何其慮事之明而見義之決也要之三母皆有死志或死或不死或幾死而不死是則有天焉為人子者但知以全身逺害為孝而不知以盡忠殉節為孝觀乎三母可以警省矣齊王孫氏母者大夫王孫賈之母也賈事齊閔王國亂閔王死國人不討賊王孫母謂賈曰汝朝出而晚來則吾倚門而望汝汝暮出而不還則吾倚閭而望汝今汝事王王出走汝不知其處汝尚何歸乎賈乃入市中而令百姓曰淖齒亂齊國害王欲與我誅之者袒右市人從者四百人與之討淖齒殺之晉虞潭母孫氏吳郡富春人孫權族孫女也初適潭父忠恭順貞和甚有婦德及忠亡遺孤藐爾孫氏雖少誓不改節躬自撫養劬勞備至性總敏識鑒過人潭始自幼童便訓以忠義故得聲望允洽為朝廷所稱永嘉未潭為南康太守值杜韜構逆率衆討之孫氏勉潭以必死之義傾其資産以餽戰士潭遂克捷及蘇峻作亂潭時守吳興又假節征峻孫氏戒之曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為纍也仍盡發其家僮今隨潭助戰貿其所服環珮以為軍資於時會稽內史王舒遣子允之為督護孫氏又謂潭曰王府君遣兒從征汝何為獨否潭即以子楚為督護與允之合勢其憂國之誠如此拜武昌侯太夫人加金章紫綬潭立養堂於家丞相王導以下皆就拜謁咸和末卒年九十五成帝遣使弔祭諡曰定夫人北魏任城國太妃孟氏巨鹿人尚書任城王澄之母也澄為揚州刺史率衆出討賊賊帥薑慶真隂結逆黨襲陷羅城長史韋纘倉卒無措孟乃勒兵登陴激厲文武喻之逆順於是咸有奮志賊不能克卒以全城朝廷敕有司樹碑旌美隋鍾士雄母蔣氏臨賀人也士雄仕陳為伏波將軍陳主以士雄嶺南酋帥慮其反覆留蔣氏於都下及晉王廣平江南以士雄在嶺表欲以恩義致之遣蔣氏歸臨賀既而同郡虞子茂鍾文華等作亂攻城遣召士雄士雄將應之蔣氏謂曰汝若背德忘義我當自殺於汝前士雄遂止蔣氏復為書諭子茂等曉以禍福子茂不從尋為官軍所敗上聞蔣氏甚異之封安樂縣君宋李母蔣氏江隂僉判李易之母也建炎三年金兵至守臣胡紡謂易曰吾曹義當死公母宜少避易歸具白其母令避母曰我去則汝決不能守矣願與汝同死聞者義之謹按忠之道不一處變亂紛紜之際蓋尤難焉王孫賈之報君仇虞潭之定賊亂皆其母成之任城太妃則代子以禦寇鍾士雄母則決子以報德李易母則勵子以固守慈訓之益大矣夫人具良心未有不欲盡忠於君者特禍患迫於外死生亂於中耳觀乎諸母則忠義之性處閨閫中者猶感奮不能已必欲其子之蹈大節成完人為人子者顧可計利害而昧順逆哉若夫有官守而盡其職有言責而盡其言皆忠之屬也教者與守教者帷視其分所當然而已譙國夫人洗氏屢建大功嶺南悉定隋文帝俾幕府署長史以下官屬給印章聽發部落六州兵馬若有機急便宜行事降敕書褒美賜物五千假皇后以首飾及宴服一襲賜之夫人並盛於金篋并梁陳賜物各藏於一庫每嵗時大會皆陳於庭以示子孫曰汝等宜盡赤心向天子我事三代主唯用一好心今賜物具存此忠孝之報後諡為誠敬夫人謹按厯代之亂中土兵爭未息邊陲之傑往往割據自雄或討而不服或服而旋叛卒亦破滅無遺種當梁陳隋之時南北搆兵諸邉擾攘洗夫人以智略起嶺表即抗衡上國稱霸一方誰得而禁之乃厯事三代執節惟謹中朝之寵錫頻至嶺表之生靈舉安其功德一何盛也且粱亡歸陳陳亡歸隋行迹明正又非反覆事人趨利昧義者舉忠孝以教子孫即士君子佩聖賢之訓者不過如是禮之道敬祭祀內則曰觀子祭祀納酒漿籩豆菹醢禮相助奠又曰若富則具二牲獻其賢者於宗子夫婦皆齊而宗敬焉終事而後敢私祭飯黍稷稻粱白黍黃粱稰穛膳膷臐燒醢牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醬魚膾雉兔鶉鷃飲重醴稻醴清糟黍醴清糟粱醴清糟或以酏為醴黍酏漿水醷濫酒清白羞糗餌粉酏食蝸醢而苽食雉羮麥食脯羮雞羮析稌犬羮兔羮和糝不蓼濡豚包苦實蓼濡雞醢醬實蓼濡魚卵醬實蓼濡鱉醢醬實蓼腵修蚳醢脯羮兔醢麋膚魚醢魚膾芥醬麋腥醢醬桃諸梅諸卵鹽又曰有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭元衣而養老謹按萬物本乎天人本乎祖女子則以夫之祖為祖者也既以夫之祖為祖當婚姻之始必齊戒以告鬼神所以附逺厚别者甚摯即所以睦族敬宗者甚詳然此道則自在家巳習熟者久之觀父母之祭祀祖先若酒若漿若籩若豆若菹若醢皆自廟外進而納之於神座助其供奠及其為婦祗事宗子宗婦不敢以富貴相加茍宗子貧而我富當其祭祀也宗子宗婦名為大宗庶子庶婦名為小宗具二牲而獻其善者於宗子次者私用以自祭且敬事大宗之祭齊戒而行之祭畢然後私祭乎祖禰恭順既存乎心即飯膳飲酒羞食有無之不加敬謹者飯有六種為黃黍為稷為稻為白粱為白黍為黃粱或熟而穫之或生而穫之膳有二十豆牛膷牛臐豕膮牛炙四物共為一行居最北從西為始牛醢牛胾牛胾而醢者及牛膾四物為第二行陳之從東為始羊炙羊胾羊醢豕炙四物為第三行陳之從西為始豕醢豕胾芥醬魚膾四物為第四行陳之從東為始以上十六豆是下大夫之禮加之以雉與兔鶉與鷃四物為第五行陳之從西為始則上大夫之禮矣飲之類有三曰稻醴曰黍醴曰粱醴清涕醇糟並而設之故曰重醴其名有六釀粥為醴一也黍釀之粥二也漿三也水四也梅漿五也諸所和之水涼者六也酒則有清者焉其事酒昔酒其色皆白焉羞則合蒸者為餌餅之者曰餈皆粉稻米黍米而為之焉食之數有二十六蝸為醢苽米為飯雉為羹麥為飯析脯與雞為羹細析稻米為飯犬與兔為羹俱三味相宜者此等之羹宜以五味調和米屑為糝不須加蓼以實其中也濡豚肉用苦菜包裹以殺其惡氣又實之以蓼縫而合之濡雞則用醢及醬濡魚則以魚子為醬而烹其魚濡鱉亦加醢及醬皆實之以蓼縫而合之以上十三皆和調濡漬之有法也自此以下則醢及醬各自為物請得而詳數之捶脯而施薑桂者蚍蜉子為醢其十四十五也上所云之脯羮兔為醢十六也麋之胖者魚為醢十七十八也魚之鱠者芥醬之十九二十也麋腥則兼醢與醬二十一二十二二十三也乾桃乾梅之類用卵鹽二十四二十五二十六也此二十六皆古人君燕食之禮而祭祀備之虞夏商周凡事皆由質而文冠雖異乎而祀祖考以致孝之心則同服雖異乎而尊髙年以長長之心則同飲食衣服掌之者婦人祀先敬長成夫之禮者亦婦人此敬祭祀之制所以不憚詳著於內則篇也詩召南采蘩章曰于以采蘩于沼于沚于以用之公侯之事于以采蘩于澗之中于以用之公侯之宫被之僮僮夙夜在公被之祁祁薄言還歸又召南采蘋章曰于以采蘋南澗之濱于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釡于以奠之宗室牖下誰其尸之有齊季女謹按家道莫備於文王南國其被化之近者諸侯夫人能盡誠敬以奉祭祀其家人敘其事以美之於是乎有采蘩之詩大夫之妻能奉祭祀其家人亦敘其事以美之于是乎有采蘋之詩婦道無專故用蘩者事則公侯之事耳宫則公侯之宫耳雖沼沚澗中不憚躬親之勞備內官而主東房要以相夫子而廣孝思當其薦蘩之初祭事方殷此夙夜在公之時也但見夫人被之戴於首者僮僮而竦敬及其徹蘩之際祀禮告成此薄言還歸之時也但見夫人被之加於首者祁祁而舒徐祭有終始心無間斷文王之化所從來逺矣蘋可以羞神明而采之南澗之濱藻可以薦宗廟而采之行潦之水是臭味未成誠敬已寓於躬採繼而盛之則方筐圓筥異其器烹之則有足無足異其釡是宗室未將牖下未奠誠敬詳著於分别古大夫家立大宗之廟牖下其室之西南隅奧鬱之地神靈所棲主婦薦豆實以葅醢其凛凛乎齊肅也以為必老於祭祀者也而年則其少少而能敬不特見其嫺於禮愈見其美於質此誰為為之哉又大雅生民首章曰厥初生民時維薑嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷謹按夫人一氣祖孫同體故祭祀之説以我之精誠接天之精誠天下萬事萬物皆由此出婦人之道敬祖宗所以衍孫子敬鬼神亦所以蕃本支也周之開國本於后稷后稷之生本於其母之誠敬可不推原於所自始哉薑嫄為髙辛氏之世妃當其祭天於郊配之以先禖禮用太牢天子親往后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢於髙禖之前蓋以明男子之所有事也詩人美之曰我周之所以初生實惟有邰之女名曰薑嫄從髙辛氏享先禖之神袚無子而求有子上帝監其精誠使之見大人迹而履其拇既震動而有孕及月辰而肅居側室乃后稷所為生育也后稷既受於天則禋祀之地即後世興王之地卜世卜年神而明之又何疑上祀以天子之禮而尊之以配天乎此尤敬祭祀之大者月令曰后妃齊戒親東鄉躬桑禁婦女母觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰又曰命婦官染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良毋敢詐偽以給郊廟祭祀之服謹按天子以耕藉勸天下之農所以為食之本后妃以親蠶帥天下之織所以為衣之本然當其初行蠶禮則祭先蠶黃帝之元妃西陵氏蠶事方成兢兢乎郊廟之服不敢不共也郊廟祭祀之服不敢不給也季春之月可以養蠶后妃乃齊肅戒謹親向東方採桑而食之禁飭婦女罔修容儀敦誠朴素為天下先並省婦使以勸蠶事夫后妃之所以致謹此蠶事者何哉誠見夫蠶事之所關者大也蠶事既登以獲絲之多寡定功勞之上下郊天祭祖之服皆賴此為共后妃督責衆婦是刻刻以天地祖宗為心也及其夏季可以染采后妃命婦官掌染采之事白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章必遵舊典而無或差忒黑以象北方之水黃以象中央之土蒼以象東方之木赤以象南方之火必簡純潔而莫敢詐偽郊廟祭祀之服從此取足焉后妃之勤如此大夫士庶之家蓋可不懋勉乎哉曽子問篇曰三月而廟見稱來婦也擇日而祭於禰成婦之義也禮器篇曰君在阼夫人在房大明生於東月生於西此隂陽之分夫婦之位也君西酌犧象夫人東酌罍尊禮交動乎上樂交應乎下和之至也又曰太廟之內敬矣君親牽牲大夫贊幣而從君親致祭夫人薦盎君親割牲夫人薦酒卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也祭義曰古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之及大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入蠶於蠶室奉種浴於川桑於公桑風戾以食之歲既單矣世婦卒蠶奉繭以示於君遂獻繭於夫人夫人曰此所以為君服與遂副褘而受之因少牢以禮之古之獻繭者其率用此與及良日夫人繅三盆手遂布於三宫夫人世婦之吉者使繅遂朱緑之元黃之以為黼黻文章服既成君服以祀先王先公敬之至也祭統曰夫祭也者必夫婦親之所以備外內之官也官備則具備水草之葅陸産之醢小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣凡天之所生地之所長茍可薦者莫不咸在示盡物也外則盡物內則盡志此祭之心也是故天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊亦以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也又曰是故先期旬有一日官宰宿夫人夫人亦散齊七日致齊三日君致齊於外夫人致齊於內然後會於太廟君純冕立於阼夫人副禕立於東房君執圭瓚裸尸太宗執璋瓚亞裸及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之又曰君卷冕立於阼夫人副褘立於東房夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也謹按祭祀之道主敬而夫婦之道主和和而不敬其和必流於褻敬而不和其敬必流於偽有能於嚴肅恪慎之際而恬焉為之盡物盡禮祖宗未有不來格者故三月廟見乃稱來婦不廟見則婦禮未備祭於父母之廟而必擇日者敬謹以明相代之義也廟之內有阼有房罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東禮器樂器如此之分明也君在阼夫人在房豈非以日生於東月生於西以隂陽而辨夫婦之位歟乃君在阼而西酌犧象夫人在西而東酌罍尊縣鼓倡於西而應鼓和於東是禮樂交治之情夫婦有往來之好和莫有甚於此者諸侯太廟之內君后各親其事又犂然絶不相涉也合內外貫始終純是一敬君親牽牲必先告神而後殺大夫贊幣而從用幣正所以告鬼神也其廟餞之禮則君割牲肝而夫人薦盎饋食之禮則君割牲體而夫人薦酒卿大夫從君命婦從夫人表裏無間其敬洞洞誠實無偽其忠屬屬勉勉不已其饗勿勿是夫人與君同其敬不同其事也至於養蠶之禮始於季春之朔君皮辨素積以重其事時既單而獻繭夫人禮服而受之既以少牢慰世婦之勤又繅三盆手朱緑元黃各成其色念君服之重先王先公無之弗敬我何敢弗敬此其道祭統篇嘗暢言之矣古國君之取夫人其辭曰請君之玉女與寡人共事宗廟社稷故祭必夫婦親之大夫命婦從之官備則凡物皆備有葅醢之小物有牲簋之美物又有昆蟲草木隂陽之物乃謂之盡物外盡物而內盡志祭祀之敬庶乎其全推而上之天子王后親耕親蠶與諸侯夫人之耕與蠶何異誠信無所不盡盡無所不敬敬盡然後可以事神明太廟之內執圭以裸尸執紖以迎牲鸞刀以修嚌皆夫親其事執盎以從夫涗齊以為酌羞豆以為薦皆婦親其事立阼立東房則位次有别執校執鐙執柄執足則授受有别酢必易爵則酬酢有别所以明夫婦之别也夫婦以情親而敬祭之心既摯則事事無所不敬敬乃能别别乃能和而夫婦之道乃可久唐韓會妻鄭夫人者愈之兄嫂也滎陽人愈未齔失怙恃從兄官秦州兄坐謗遷韶州以卒去故鄉萬里幼孤滿前不能歸鄭拮據誠至竟以喪返葬春秋霜露敬薦享韓氏祖考如夫存滎陽縣太君鄭氏比部郎元寬妻拾遺稹母也孝悌夙成習禮學歸元氏敬恭祀事雖隆沍服勤親饋無怠色元鄭皆大族合而姻表滋多中外吉凶之禮有疑義取衷焉以無違於禮宋韓國夫人鄭歐陽修之母也居恆泣告修曰吾始歸汝父免於喪踰年矣嵗時祭祀必出涕言祭而豐不如養之薄也間御酒肉又必出涕言昔吾嘗不足而今稍有餘何及於養也始吾一二見之以為新免於喪適然耳既其後常然至終身未嘗不然以是知汝父之能養也謹按祭祀之禮既備於經書則凡婦人女子自當敬共恪守春懷風木秋感霜露而史不盡著為其相習而為常道也況婦人無主祭之文夫死從子則主祭在子矣今所録之三人則有異乎尋常者在焉各天逺宦旅櫬無依孤幼伶仃艱難誰訴而拮據誠至祭拜無殊於夫存是韓氏祭祀之典以鄭夫人而傳也唐代禮法多所詳備世祿之家鮮克由之滎陽太君事事必凖於典章諸凡吉凶嘉會固有折衷而敬祭一道尤為篤慎溽暑必親饋則無日不肅可知是諸大族祭祀之典以滎陽縣君而振也至於歐陽修之母其致敬於祭祀者不自著而教子則引其父以為則畫荻教字自力於衣食以教亷憫獄案以教慈敦儉薄以教居患難何所不悉而必以重祭祀為大是歐陽修之綿延宗祊以韓國夫人而全也金白氏蘇嗣之之母許州人宋尚書右丞轍五世孫婦也蘇氏軾轍及過俱葬郟城之小峨嵋山故世居許昌白氏年二十餘即寡居服除外家迎歸兄嫂竊議改醮白氏微聞之牽車徑歸曰我為蘇學士家婦又有子乃欲使我失身乎自是外家非有大故不往也嘗於宅東北為祭室畫兩先生像圖黃州龍川故事壁間香火嚴潔躬自灑掃士大夫求瞻拜者往往過其家奠之天興元年許州被兵嗣之為汴京廂官白拜辭兩先生前曰兒子往京師老婦死無恨矣敢以告即自縊於室側家人并屋焚之年七十餘謹按祭祀之道近則情篤而逺或否居恆則典循而變或否子則念嗣續而婦或否孰若白氏之賢當嫠居矢志之日上不忍墮學士之聲名香火嚴潔躬親灑掃至於兵亂自縊室側可不謂誠敬終身者哉御定內則衍義卷五
