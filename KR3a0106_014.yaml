body:
  text: 欽定四庫全書御定內則衍義卷十四大學士傅以漸恭纂讓之道待外戚內則曰婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜藏以待乏婦若有私親兄弟將與之則復請其故賜而后與之謹按三代上賢后妃多自侯國其家未嘗藉援婚媾故寵外戚抑外戚者皆無傳焉所以待之之道亦不見於聖人之訓惟內則所稱婦於私親兄弟其節似小其道則大如飲食衣服布帛佩帨茞蘭皆物之微者必以獻舅姑受之則喜賜之則辭有不敢私之心焉辭而不得命則藏有不敢輕之心焉欲與私親兄弟則復請有不敢專之心焉推是心也凡家之所有舉不敢以畀其私親而況國之爵祿乎且夫爵之欲其貴也祿之欲其富也富貴以道則為福富貴不以道則為纍古賢后妃之處外戚與賢外戚之自處未有不求諸道者故采漢以後可法者為宫壼鑒焉漢明德馬皇后當明帝時言及政事多所裨補而未嘗以家私干故寵敬日隆始終無衰及為皇太后自撰顯宗起居注削去兄防參醫藥事帝請曰黃門舅旦夕供養且一年既無褒異又不録勤勞無乃過乎太后曰吾不欲令後世聞先帝數親后宫之家故不著也建初元年欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此上奏宜依舊典太后詔不許其略曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黃霧四塞不聞澍雨之應又田蚡竇嬰寵貴橫恣傾覆之禍為世所傳故先帝防慎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國嘗謂我子不當與先帝子等今有司奈何欲以馬氏比隂氏乎吾豈可上負先帝之㫖下虧先人之德重襲西京敗亡之禍哉固不許帝省詔悲歎重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙謙之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受高祖約無軍功非劉氏不侯今馬氏無功於國豈得與隂郭中興之后等邪常觀富貴之家祿位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求溫飽耳今祭祀則受四方之珍衣食則䝉御府餘資斯豈不足而必當得一縣乎吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異榖價數倍憂惶晝夜不安坐卧而欲先營外封違慈母之拳拳乎吾素剛急有胸中氣不可不順也若隂陽調和邊境清靜然後行子之志吾但當含飴㺯孫不能復關政矣初太夫人葬起墳微髙太后以為言兄廖等即時减削其外親有謙素義行者輒假借溫言賞以財位如有纎芥則先見嚴恪之色然後加譴其美車服不軌法度者便絶屬籍遣歸田里四年天下豐稔方垂無事帝遂封三舅廖防光為列侯並辭讓願就關內侯太后聞之曰聖人設教各有其方知情性莫能齊也吾少壯時但慕竹帛志不顧命今雖已老而復戒之在得故日夜惕厲思自降損居不求安食不念飽冀乘此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉萬年之日長恨矣廖等不得已受封爵而退位歸第焉宋宣仁聖烈髙皇后后弟殿內崇班士林供奉久帝欲遷其官后謝曰士林獲升朝籍分量已過豈宜援先后家比辭之及為皇太后居寶慈宫帝纍欲為高氏營大第后不許久之但斥望春門外隙地以賜凡營繕百役費悉出寶慈不調大農一錢從父遵裕出西征失律抵罪蔡確欲獻諛以固位乞復其官后曰遵裕靈武之役塗炭百萬先帝中夜得報環榻行徹旦不能寐聖情自是驚悸馴致大故禍由遵裕得免刑誅幸矣先帝肉未冷吾何敢顧私恩而違天下公議確悚栗而止上元燈宴后母當入觀太后止之曰夫人登樓上必加禮是由吾故而越典制於心殊不安但令賜之燈燭遂嵗以為常姪公繪公紀當轉觀察使力遏之帝請至再僅遷一秩終后之世不敢改又以官冗當汰詔損外氏恩四之一以為宫掖先謹按漢馬援宋髙瓊並顯功名當世其後援小女為明帝后瓊曽孫女為英宗后始以外戚著子孫多賢良非有驕恣暴橫也乃兩后所以裁抑者非一端官秩賜祿居第之類一於减損甚至削供養醫藥之勞暴奢靡敗衄之罪誦馬后兩詔及髙后諸論何其懇切而嚴肅也美哉持盈有道家享其休班爵無私國䝉其福矣兩后為千古宫闈之冠而待外戚事尤相類故並著之漢和帝和熹鄧皇后太傅禹之孫女也初入掖庭為貴人偶疾帝特令后母弟兄入視醫藥不限以日數后言於帝曰宫禁至重而使外舍久在內省上令陛下有幸私之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂深自抑損誠難及也帝每欲官爵鄧氏后輒哀請謙讓故兄隲終帝世不過虎賁中郎唐文德長孫皇后兄無忌於帝本布衣交以佐命為元功出入卧內帝將引以輔政后固謂不可乘閒曰妾託體紫宫尊貴已極不願私親更據權於朝漢之吕霍可以為誡帝不聽自用無忌為尚書僕射后密令固讓帝不獲已乃聽后喜見顔間劉宋髙祖武敬臧皇后諱愛親東莞人也祖汪尚書郎父俊郡公曹髙祖復晉室居上相之重而后器服粗素不為親屬請謁陳宣帝柳皇后諱敬言河東解縣人也性謙謹未嘗以宗族為請雖衣食亦無所分遺謹按此皆古之賢后不欲貴其外家者夫處中宫之尊而推恩宗黨亦情義之所必至乃鄧隲終和帝之世官不過中郎長孫無忌以佐命元功受太宗特簡而卒辭尚書僕射斯二人皆賢者而兩后猶深抑之豈非慮貴戚據髙位易以驕奢致敗乎宋陳二后不為親屬宗族請其所見亦同蓋抑之乃所以厚之也觀漢末諸外戚之事載在簡册益知諸賢后為不可及已晉明穆庾皇后諱文君潁川鄢陵人也后性仁惠美姿儀元帝聞之聘為太子妃以德行見重明帝即位立為皇后成帝立尊為皇太后咸和元年有司奉請追贈后父母及夫人邱氏后陳讓不許三請不從太后崩後帝孝思無極贈后父琛驃騎大將軍儀同三司母邱氏安陵縣君從母荀氏永寧縣君何氏建安縣君庾亮表陳先志讓而不受唐順宗莊憲王皇后琅邪人祖難得有功名於世代宗時后以良家選入宫時順宗在藩帝以才人幼故賜之生憲宗册為良娣后性仁順宫中化其德莫不柔雍順宗即位疾已綿頓后侍醫藥不少怠將立后㑹病棘而止憲宗內禪尊為太上皇后性謹畏深抑外家無毫絲假貸宋慈聖光獻曹太后舊制外家男子毋得入謁太后春秋髙弟佾亦老帝數言宜使入見輒不許他日佾侍帝帝復為請乃許之因詣后閣少焉帝先起若令佾得伸親親意后遽曰此非汝所當得留趣遣出宋欽聖憲肅向皇后哲宗立尊為皇太后帝將卜后及諸王納婦后敕向族勿以女置選中族黨有欲援例以恩求京秩者后曰吾族未省有此例何庸以私情撓公法一槩不與謹按椒房之戚人主固不敢私至於敬愛慈宫而寵及親屬是亦孝思所推也乃晉庾太后讓父母之贈三請不從唐王太后深抑外家無絲毫假貸宋曹太后則外親入閣一見立遣不少留向太后則族黨欲得京秩槩不之許是皆髙出常情之外與漢明德馬后先後一揆矣若庾亮之讓亦與馬廖等引退相類豈非外戚之傑出者乎三國魏文帝文德郭皇后安平廣宗人也祖世長吏后少而父永竒之曰此乃吾女中王也遂以女王為字文帝踐阼為貴嬪甄后沒立為皇后后外親劉斐與他國為婚后聞之敕曰諸親戚嫁娶自當與鄉里門戶匹敵者不得因勢彊與他方人婚也后妹子孟武還鄉里求小妻后止之遂敕諸家曰今世婦女少當配將士不得因緣取以為妾也宜各自慎無為罰首宋仁宗章穆郭皇后太原人宣徽南院使守文第二女謙約惠下性惡奢靡族屬入謁禁中服飾華侈必加戒勗有以家事求言於上者后終不許兄子出嫁以貧欲祈恩賚但出裝具給之上尤加禮焉孝宗成肅謝皇后性慈儉服浣濯之衣有數年不易者弟淵以后貴授武翼郎后嘗戒之曰主上化行恭儉吾亦躬服浣濯爾宜崇謙抑逺驕侈謹按保世之道非一而恭儉必昌覆家之道非一而驕奢必敗魏郭后論嫁娶之道申妾媵之禁豈復有攀援淫佚之失乎宋兩后戒華侈勉謙抑皆有深見逺慮凡為外戚者誠能服諸后之訓以之持身則行成而立名以之承家則善積而慶餘豈不有光於宫禁哉宋徽宗鄭皇后開封人后自入宫好觀書章奏能自製恩澤皆弗陳請時族子居中在樞府后奏外戚不當預國政必欲用之且令充他職帝為罷居中居中復用后歸寧還言居中與父紳相往還人皆言其招權市賄乞禁絶許御史奏劾後果敗金顯宗孝懿皇后圗克坦氏謙謹每畏其家世崇寵見父母流涕而言曰髙明之家古人所忌願善自保持其後家果以哈林事敗蓋其逺慮如此后御下公平雖至親無所阿狥嘗誡諸姪曰皇帝以我故乃推恩外家當盡忠圖報勿謂小善為無益而弗為小惡為無傷而弗去毋藉吾之貴輒肆非違以干國家常憲元裕宗徽仁裕聖皇后伯藍也怯赤一名庫庫出鴻吉哩氏生順宗成宗成宗即位尊為皇太后后之弟欲因后求官后語之曰若欲求官耶汝自為之勿以纍我也其後弟果被黜人皆服后之先見謹按髙明之家未有惡安而喜危者然貴不期驕而自驕甚或招權干憲自貽伊戚豈非恃榮盛之勢忘止足之戒乎宋鄭后請罷族子樞府復發其所為金圗克坦后流涕而諫父母極言以誨諸姪元鴻吉哩后深絶其弟之求官此三后者豈誠不近人情哉其心至公而其見至明也厥後或敗或黜一如所言向使諸外戚覺悟悛改則國無傷恩之事而家有永存之美矣慈之道逮下內則曰妾將生子及月辰夫使人日一問之子生三月之末潄浣夙齊見於內寢禮之如始入室君已食徹焉使之特餕遂入御謹按天道謂之曰大生地道謂之曰廣生大者無所不統廣者無所不及女道法地恩誼貴其公溥而偏頗之心勝則在下者有不均之嘆矣古聖人制禮夫有再娶之文婦無二適之義春秋載諸侯婚禮有配嫡必有媵妾皆所以廣生育之道故內則論妾亦獨於生子之事詳明而曲盡焉妾以子重重子則不得不重妾將生之日夫使人日一問之所以安其心思調其血氣子生三月見於內寢待之之禮如初入室正以明入室原為生子計也主君之食授之特餕見生子則與羣妾不同因而御之固三月之末可以御亦所以愜其生子之心妾之子以妻為母則妾之生子妻之惠也妾能生子而妻之逮下不從此愈加其雍和乎詩周南曰南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈之樂只君子福履成之謹按制禮莫詳於成周逮下莫過於太姒周南召南所載無一非仁德厚施所及而尤大著於樛木之章衆妾樂太姒之德隨所觸而稱願之曰觀之樛木形下曲也葛藟係於其上吾知福履之保定而孔固矣觀之樛木形下曲也葛藟遍覆其上吾知福履之隂扶而默助矣觀之樛木形下曲也葛藟繞旋而周迎吾又知福履之完聚而無缺缺矣一身所踐萬福集焉一身所倡羣情順焉葛藟之性雖柔而類則相引而愈衆初但能仰攀其前繼且蕃殖其上又繼且生生不已情以感而益固心以久而愈浹人情所至即屬天理人心所向即為天命茍非逮下出於至誠烏能當此福祿之攸同也哉太姒真王化之奧樞而卜世卜年之肇始矣周南曰螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖兮宜爾子孫蟄蟄兮謹按逮下之美莫大於生子故樛木三章方詠太姒之仁慈而螽斯三章即贊子孫之衆多蓋天下未有不和而能生者也天地之生萬物曰保合太和聖人之生萬民曰太和元氣夫有相害者則和不全螽斯和而不相害子孫有振振繩繩蟄蟄之盛后妃既無嫉妬而子孫衆多逮下豈非后妃所最先者歟召南曰嘒彼小星三五在東肅肅宵征夙夜在公實命不同嘒彼小星維參與昴肅肅宵征抱衾與禱實命不猶謹按逮下之道必使天下之婦人皆能逮下而逮下之心始遂南國夫人承后妃之化能不妬忌以惠及媵妾媵妾因所見以起興曰小星而三五在東天將曙矣豈可晏然而已乎由所賦之命不同是以進御于君已感夫人之惠豈復致怨於往來之勤也至于維參與昴則衆星愈隱止有參之體大而且明昴之體聚而易見宵征見此何其悚然亦歸諸命之不猶而已矣感恩安命合為一心乃太姒逮下之極致歟禮記月令曰后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前謹按祈嗣之禮古人不廢弓矢者男子所有事也天子所御后妃即帥九嬪御而禮之謂本精誠祭祀之心為謙恭逮下之心古聖王齊家有道在宫雍雍后妃固以德升姬嬙亦以序進情有覃被愛罔偏流夑理中和廣滋天派有獲妊兆恭肅明神是以所生賢良壽考其本有深焉者也後世所圖張仙挾彈而射天狗以為生子之祥想因此而為之歟東漢明德馬皇后既正位宫闈愈自謙肅以皇嗣未廣薦達淑媛汲汲如不及進見者輒加慰納若數所寵引愈益隆遇有關雎樛木之風謹按事之出於誠然者積久則愈摰出於勉然者未幾而旋更逮下為婦人之所難即循分薦逹已稱賢淑乃馬后憂皇嗣之不廣薦達淑媛且汲汲如不及也是專以生子為先務絶無燕寵之心乃又於進見者輒加慰納復於素所寵引者愈益隆遇是專以明帝之好為好以衆妃嬪所生之子為子三代而後未有也順烈梁皇后永建中為貴人常特被引御從容辭曰陽以博施為德隂以不專為義易序貫魚詩美螽斯此百福所由興也妾不敢蔽帝加敬焉謹按此貴人而能逮下者為貴人而特被引御亦偶逢不可常得之事乃不敢蔽同列之美而勸帝博施且援經典以自守也逮下之心本諸天性宜其上膺帝眷終得正位中宫爾三國時晉公司馬昭夫人王氏事太傅夫婦曲盡道謙恭接下進嬪御以序謹按治天下與治家之理無二總求其有序而巳有序則先之者無專蔽之嫌後之者無僣越之想王夫人整肅家道凡事必期有當於丈夫之心即進達嬪御亦必有一定之序逮下之恩何其周逮下之法又何其正也有逮下之定法始足完逮下之深恩王氏近之矣北齊神武明皇后婁氏諱昭君贈司徒內干之女也性寬厚不妬忌神武姬侍咸加恩待神武逼于茹茹欲娶其女而未決后曰國家大計願不疑也及茹茹公主至后避正室處之謹按婚姻之事關一身之寵辱者小關國家之安危者大區區與妃嬪爭能而不能推恩以廣惠固由于性情之偏亦足見識力之短婁皇后之待神武姬妾也凡有可加之恩必屈身以逮之寬而多恕厚而有情至於外逼勍鄰內乏備禦欲將明信止有結契婚姻之法蓋骨肉既出于天成子孫可倚為心膂夏商以來莘任子姒俱出神明之胄春秋之世秦晉齊魯代講好合之誼神武欲娶茹茹之女亦保國之極思也婁皇后既已握中閫之權則遜讓誠匪易事乃竟命國家大計反勸神武之毅然必行而避處側宫虛正宫以待茹茹公主可不謂賢哉夫逮下者我尊而彼卑此且自卑以尊人是又進逮下一籌矣宋司馬光妻張氏御婢妾寬而知其勞苦恤之嘗夜濯足婢誤以沸湯沃之足為爛病月餘方已僅一批其頰而止故其沒也自族姻至於厮養無親疏大小咸哭之極哀謹按僕𨽻無知可以情恕況女婢之愚暗尤天下一轍司馬光妻之待婢至沸湯爛足僅一批其頰而止可謂容人所不能容者矣夫有過且優容至此則平日之愛養可知服役之以情恕若此則等而上之又可知逮下之道正於難施之恩必推其恩以及之所以為厚德載物也歟金世宗昭德皇后烏凌噶氏性不妬忌為世宗擇後房廣繼嗣雖顯宗生後而此心不移后嘗有疾世宗為視醫藥數日不離去后曰大王視妾過厚其知者以為視疾不知者必有專妬之嫌又曰婦道以正家為大第恐德薄無補內治安能效嬪妾所為惟欲巳厚也後改諡明德皇后謹按不孝有三無後為大況帝王統一海內神器所托建立太子誠為要務烏凌噶皇后所難不在擇後房以廣繼嗣而在顯宗生後此心究竟不移是專以逮下為美德也觀其有疾而世宗視藥豈非慎重其賢德哉乃數日不離即引嫌而欲世宗均惠則平日順世宗之心更可知矣至于正家為大之語尤得皇后之體蓋天子理陽道以治天下惟求貴賤上下之各安其位皇后理隂道以肅宫庭亦惟求妃嬪侍妾之各獲所願以為明德誠哉乎其為明德也世宗得如此賢后為內助國勢所以日隆政治所以無闕爾元巴延呼圗克皇后鴻吉哩氏性節儉不妬忌動以禮法自持第三皇后竒氏素有寵居興聖西宫帝希幸東內后左右以為言后無幾微怨望意從帝時巡上京次中道帝遣內官傳㫖欲臨幸后辭曰暮夜非至尊往來之時內官往復者三竟拒不納帝益賢之謹按皇后雖與帝王敵體然以徽柔之質事英明大有為之主其逮下亦有不得自主之時夫逮下至不得自主非誠於逮下者矣鴻吉哩皇后寬厚既本於性成禮法又嫻於平日雖竒后之專寵於西宫亦付諸義命之當然耳逮追隨駕巡帝𫝊臨幸承恩日月此其時矣獨以暮夜為辭豈特無專欲希寵之心並有防患謹微之意至再至三何其念之深識之大也以順為正復以禮自嫻是真逮下之極凡為后者所當法爾慈之道慈幼內則曰其次為慈母其次為保母皆居子室他人無事不往又曰孺子蚤寢晏起食無時又曰㫖甘柔滑孺子餕詩蓼莪之三章曰父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我謹按齒之幼者藉養於所親分之幼者藉養于所尊養之之道慈而已矣觀內則君大夫子生之後為異室以處孺子於衆妾及傅御之屬擇其可者以為師慈保之三母而首重寬裕慈惠又不限孺子以寢興飲食之節凡父母所食之餘㫖甘柔滑者則令之餕皆所以慈之也昔詩人追思父母之恩纍言不盡大約無非慈者是故先王推此意以養幼少存諸孤著為月令而禮經又暢其說曰不獨子其子然則養己之子以慈而養人之子尤當以慈矣婦人於己子無不慈者必於前妻之子妾之子夫兄弟親族之子凡非己出者自幼至長無不盡心撫養而後足以為慈故采輯宫闈以逮庶婦能慈幼者著之為母道之式焉漢明德馬皇后明帝為太子時選入宫及即位后為貴人時后前母姊女賈氏亦以選入生肅宗帝以后無子命令養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫養勞瘁過於所生肅宗亦孝性惇篤母子慈愛始終無纎芥之間唐太宗文德長孫皇后有下嬪生豫章公主而死后視公主一如所生宋明德李皇后潞州上黨人淄州刺史處耘第二女開寶中太祖聘為太宗妃既納幣㑹太祖崩至太平興國三年始入宫年十九雍熙元年詔立為皇后后性恭謹莊肅撫育諸子及嬪御甚厚宋楊淑妃益州人始仁宗在乳褓章獻使妃護視凡起居飲食必與之俱所以擁佑扶持恩意勤備及帝即位嘗召其姪永德見禁中欲授以諸司副使妃辭曰小兒豈勝大恩小官可也更命為右侍禁章獻遺誥尊為皇太后仁宗未有嗣太后每勸帝擇宗子近屬而賢者養於宫中所選即英宗也宋慈聖光獻曹皇后神宗立尊為太皇太后名宫曰慶壽帝致極誠孝所以承迎娛恱無所不盡從行登玩每先後䇿掖后亦慈愛天至或退朝稍晚必自至屏扆候矚間親持膳飲以食帝金顯宗孝懿皇后圗克坦氏逮嬪御和平其有生子而母亡者視之如己所生慈訓無間唐和政公主下嫁柳潭潭兄澄之妻楊貴妃娣也勢幸傾朝公主未嘗干以私及死撫其子如所生宋徐國長公主仁宗幼女也妾媵得女拊視如己出謹按此皆后妃公主之慈幼者漢馬后之於肅宗撫育勞瘁過于所出宋楊太后之於仁宗擁佑扶持恩意勤偹曹太后之於神宗慈愛天至親授膳飲三帝亦皆極奉飬之誠無纎芥之間豈非慈孝相感哉唐長孫后金圗克坦后宋徐國長公主撫妾之子女如己所出不懷嫡庶之嫌宋李后撫育諸子甚厚初無前後之迹是皆人情所難唐和政公主於姒婦生不藉其勢死而撫其孤髙義又何可及也易曰至哉坤元萬物資生后妃而能慈得坤道矣佐天而昌後不亦休乎魏芒慈母者魏孟陽氏之女芒卯之後妻也有三子前妻之子五人皆不愛慈母遇之甚異猶不愛慈母乃命其三子不得與前妻子齊衣服飲食起居進退甚相逺前妻之子猶不愛於是前妻中子犯魏王令當死慈母憂戚悲哀帶圍減尺朝夕勤勞以救其罪人有謂慈母曰何為勤勞憂懼如此慈母曰如妾親子雖不愛妾猶救其禍而除其害獨於假子而不為何以異於凡母其父為其孤也而使妾為其繼母繼母如母為人母不能愛其子可謂慈乎親其親而偏其假可謂義乎不慈且無義何以立於世彼雖不愛妾安可以忘義乎魏安釐王聞之髙其義曰慈母如此可不赦其子乎乃赦其子復其家自此五子親拊慈母雍雍若一慈母率導八子咸為魏大夫卿士各成于禮義漢翟母者丞相方進後母也方進年十三失父辭後母欲西學長安母憐其幼不忍也隨與俱方進出從博士受經母織屨給其資用十餘年不怠後方進至丞相封侯母尚在供養勤備焉陳文矩妻李法之姊字穆姜生二男前妻有四子文矩為安衆令卒于官四子以母非所生憎毁日積而穆姜慈愛溫仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不别居以逺之對曰吾方以義相導使其自遷善也及前妻長子興有疾困篤惻隱自然親調藥膳恩情篤密興疾久乃瘳於是呼三弟謂曰繼母慈仁出自天授吾兄弟不識恩養禽獸其心雖母道益隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之德狀已之過乞就刑辟縣言之於郡郡守表異其母蠲除其徭遣四子許以修革自後訓導愈明並為良士穆姜年八十餘卒臨終敕諸子曰吾弟伯度智達士也所論薄葬其義至矣又臨亡遺命賢聖法也今汝曹遵承勿與俗同增吾之纍諸子奉行焉宋余楚妻建陽人姓陳氏生子翼三歲楚卒陳氏盡以其産遺前妻二子翼年十五使游學四方在外十五年以進士歸臨江軍判官王益妻吳氏撫州金溪人好學强記而恂恂自下於事未嘗有所專益生七子長二子元配徐出也吳愛之甚于子二子卒遇其嫠婦異諸婦處內外疏戚甚恩有讒訕置之未嘗或藏怒也自奉養未嘗擇衣食而人有以窮來歸者分衣食給之嫁三從孤女如己女待長子之母族如己族髙陽郡君齊氏祈州蒲隂人侍讀學士王洙妻也讀書有節行始自哀早孤誓不嫁養母者有年學士失元配諸子幼聞其賢從母兄求之曰是必能母吾子於是時服母喪闋矣歸王氏字諸子甚恩恭儉有禮闔門欣欣無異言元雅里氏兆邊千戶耶律留格妻也留格卒令善格襲其父爵雅里拜且泣曰薛闍者留格前妻所出嫡子也善格者妾所出若立之是私己而蔑天倫竊為不可太祖嘆其賢謹按此皆繼母之慈幼者凡母之愛子也甚於父至繼母而有間矣繼母自有子而更有間矣即子致其孝難必母盡其慈乃芒母陳母其前妻之子皆乖戾不順而抑己子以厚之直救其死亡疾病卒之諸子感化成立並為良士顯官余母王母其行事亦猶是也翟母之訓學耶律母之讓爵可謂明於道而篤於義至齊氏未嫁時其夫願得以撫諸孤豈非慈愛成性耶嗟夫是諸母者生則享諸子之奉歿則垂後世之名豈若閔子騫尹伯竒之母身辱而名惡哉凡為繼母者宜深長思己齊義繼母者齊二子之母也當宣王時有人鬬死於道吏訊之被一創二子兄弟立其傍吏問之兄曰我殺之弟曰非兄也乃我殺之期年吏不能决言之於相相不能决言之於王王曰今皆赦之是縱有罪也皆殺之是誅無辜也寡人度其母能知之善惡試問其母聼其所欲殺活相召其母問之曰母之子殺人兄弟相代死吏不能决言之於王王有仁惠故問母何所欲殺活其母泣而對曰殺其少者相受其言因而問之曰夫少子者人之所愛也今欲殺之何也其母對曰少者妾之子也長者前妻之子也其父疾且死之時屬之於妾曰善養視之妾曰諾今既受人之託許人以諾豈可以忘人之託而不信其諾耶且殺兄活弟是以私愛廢公議也背言忘信是欺死者也何以立於世哉子雖痛乎獨謂行何泣下沾襟相入言于王王美其義髙其行皆赦不殺而尊其母號曰義母漢二義者珠崖令之後妻及前妻之女也女名初年十三珠崖多珠繼母連大珠以為繫臂及令死當送喪法內珠入於關者死繼母棄其繫臂珠其子男年九嵗好而取之置之母鏡奩中皆莫之知遂奉喪歸至海關關侯士吏搜索得珠十枚于繼母鏡奩中吏曰嘻此值法無可奈何誰當坐者初恐罪其母乃曰初當坐之吏曰其狀何如對曰君不幸夫人解繫臂棄之初心惜之取而置夫人鏡奩中夫人不知也繼母聞之遽疾行問初初曰夫人所棄珠初復取之置夫人奩中初當坐之母意亦以初為實然憐之乃因謂吏曰願且待幸無劾兒兒誠不知也此珠妾之繫臂也君不幸妾解去之而置奩中迫奉喪道逺與弱小俱忽然忘之妾當坐之初固曰實初取之繼母又曰兒但讓耳實妾取之因涕泣不能自禁初曰夫人哀初之孤欲强活初身夫人實不知也又因哭泣泣下交頸送葬者盡哭哀感傍人莫不為酸鼻揮涕關吏執筆書劾不能就一字關侯垂泣終日不能忍決乃曰母子有義如此吾寧坐之不忍加文且又相讓安知孰是遂棄珠而遣之既去後乃知男獨取之也元秦閏夫妻柴氏晉寧人閏夫前妻遺一子尚幼柴氏鞠如己出未幾柴氏有子閏夫病且死囑柴氏曰我病不復起家貧惟二幼子汝能撫其成立我死無憾矣閏夫死家事日微柴氏辛勤績紡遣二子就學至正十八年賊犯晉寧其長子為賊驅迫在圍中既而得脫初在賊時有惡少與張福為仇往滅其家殳官軍至福訴其事事連柴氏長子法當誅柴氏引次子詣官泣訴曰往從惡者吾次子非吾長子也次子曰我之罪可加於兄乎鞫之至死不易其言官反疑次子非所出訊之他囚始得其情官義柴氏之行為之言曰婦執義不忘其夫之命子趨死而能成母之志此天理人情之至也遂釋其長子次子亦得不死時人皆以為難二十四年有司上其事旌其門而復其家唐王蘭英者獨孤師仁之姆師仁父武都謀歸唐王世充殺之師仁始三嵗免死禁錮蘭英請髠鉗得保養許之時喪亂餓死者籍籍游丐道路以食師仁身啖土飲水後詐為採薪竊師仁歸京師髙祖嘉其義詔封蘭英永壽鄉君謹按婦人之於前子撫如己出己足稱矣乃齊義繼母元秦母捐其子以活前子珠崖令妻舍其身以全前女豈非天下之至難者歟觀其對相國之言訴關吏及問官之語千載之下誦之令人隕涕且弟願代兄女願代母孝友萃於一門卒之母女兄弟皆全孰謂為善無報耶若唐王蘭英全三嵗孤至髠鉗游丐啖土飲水是亦舍生取義幸而不死耳隋陸讓母馮氏上黨人性仁愛有母儀讓其孽子也開皇末為播州刺史數有聚斂贓貨狼籍為司馬所奏案得實將就刑馮氏蓬頭垢面詣朝堂數讓罪於是流涕嗚咽親持杯粥勸讓食既而上表求哀情詞甚切上愍然為之改容獻皇后甚竒其意致請於上侍書御史柳彧進曰馮氏母德之至有感行路如或戮之何以為勸上於是集京城士庶於朱雀門遣舍人宣詔曰馮氏以嫡母之德足為世範慈愛之道義感人神特宜矜免用奬風俗讓可减死除名復下詔褒美之賜物五百假集命婦與馮相識以旌寵異謹按孟子稱孤臣孽子其操心也危其慮患也深夫孽子何患豈非以世之嫡母往往妬妾而及其子耶然則為孽子者不失歡幸矣乃馮氏哀痛迫切上表求哀何恩孽子之深也慈愛之德上動天子宜史冊稱述不衰矣若宣示士庶兩詔褒嘉人主厲世摩鈍當遵斯術耳魯義姑姊者魯野之婦人也齊攻魯至郊望見一婦人抱一兒携一兒行軍且及之棄其所抱抱其所携而走山兒隨而啼婦人遂行不顧齊將問兒曰走者爾母耶曰是也母所抱者誰也曰不知也齊將乃追之軍士引弓將射之曰止不止吾將射爾婦人乃還齊將問所抱者誰也所棄者誰也對曰所抱者妾兄之子也所棄者妾之子也見軍之至力不能兩護故棄妾之子齊將曰子之於母其親愛也痛甚於心今釋之而反抱兄之子何也婦人曰己之子私愛也兄之子公義也夫背公義而嚮私愛亡兄而存妾子幸而得全則魯君不吾畜大夫不吾飬庶民國人不吾與也夫如是則脅肩無所容而纍足無所履也子雖痛乎獨謂義何故忍棄子而行義不能無義而視魯國于是齊將按兵而止使人言于齊君曰魯未可伐也乃至于境山澤之婦人也猶知持節行義不以和害公而况于朝臣士大夫乎請還齊君許之魯君聞之賜婦人束帛百端號曰義姑姊晉鄭休妻石氏少有德操年十餘嵗鄉邑稱之既歸鄭氏為九族所重休前妻女既幼又休父布臨終有庶子沈方生命棄之石氏曰奈何使舅之嗣不存乎遂養沈及前妻女力不兼舉九年之中三不舉子唐鄭夫人者韓文公愈之嫂也滎陽人為昌黎韓㑹妻愈生甫朞失父母鞠于鄭韓會卒遭時艱避地江南零丁孤苦誨愈成立為世大儒元武用妻蘇氏真定人徙家京師生子德政四嵗而寡夫之兄利其資欲逼而嫁之不聽未幾夫兄舉家死惟餘三弱孫蘇氏取而育之德政長事蘇氏至孝蘇氏死時天大旱德政方掘地求水以供葬事忽二蛇躍出德政因默禱焉二蛇一東一北隨其地掘之果得泉有司上其事旌復其家謹按慈愛雖有天性然當患難之時孤苦之際安能必其不易心耶且親疏恩讐亦常情也魯義姑姊棄己子全兄子石氏不舉子以養舅子鄭氏嫠婦厄窮而教育從子蘇氏不念舊惡而育夫兄之孫皆遇愈窮而慈愈篤可為賢媛之極則矣或疑棄子不舉子者近于矯情嗟夫孱然婦人所為極難顧從而苛求之豈所以勸世耶且義姑姊之言蓋以示魯之有道而諷齊之相侵豈誠慮國不我畜而身無所容也御定內則衍義卷十四
