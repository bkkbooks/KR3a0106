body:
  text: 欽定四庫全書御定內則衍義卷三大學士傅以漸恭纂敬之道事夫內則曰禮始於謹夫婦又曰十有五年而笄二十而嫁有故二十三年而嫁聘則為妻奔則為妾孟子曰女子之嫁也母命之往送之門曰往之女家必敬必戒無違夫子內則又曰男女不同椸枷不敢縣於夫之楎椸不敢藏於夫之篋笥不敢共湢浴夫不在斂枕篋簟席襡器而藏之謹按五倫之道何處不當致謹而乃始於謹夫婦者何夫婦以人合者也結兩姓之歡而衍百世之緒嗜好既動始進以謹尚恐有流於非禮者况始進不以謹者乎語曰教子嬰孩教婦初來故十五則笄所以學為人婦也二十而嫁婦德婦容婦工婦言習之無所不備也母仍訓之以必敬必戒則凡上恭祭祀仰事舅姑所以備體夫子之心者無所敢弛即楎椸篋笥各有分具枕簟猶必襡而藏之翼翼乎弗之敢專也是女子事夫之正道也書堯典曰女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉謹按以天子之女下嫁於耕厯山之有鰥據師錫之言曰克諧以孝蒸蒸乂不格姦堯曰我其試哉則閨門之內真考證品行之大樞機即孝弟如舜恐猶有不可知者二女之所以承事瞽瞍當於此益勤舜之所以使二女各得其宜者於此益盡聖人所為人倫之至也詩大明二章曰摯仲氏任自彼殷商來嫁于周曰嬪于京又五章六章曰大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾燮伐大商謹按此詩言周家世有賢聖之君德合乎天天與以賢聖之配生聖子而成伐商之功也始則太任由摯國而來配王季繼則太姒由莘國而來配文王太姒之德可以配天卜而得吉則行聘禮以定之既聘矣則又親迎以成之舟梁之制于是乎始其禮盛其光顯有文王以興周室有莘女以繼太任天實命之非人所能為也篤生武王順天命而克有天下天實佑之又豈人所能為哉原周之成大功以其有聖子原周之生聖子以其有聖后而聖后之生因王季文王德格天一代之興豈偶然歟詩周南曰關關雎鳩在河之洲窈窕淑女君子好逑參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鐘鼓樂之謹按文王化行南國而肅雍始於宫中當其得聖女姒氏以為之配宫人見其幽間貞靜故作是詩彼關關然之雎鳩則相與和鳴于河洲之上此窈窕之淑女豈非君子之善匹乎其相與和樂而恭敬亦若雎鳩之情摯而有别者此人此德世不常有求之不得則無以配君子而成內治之美故憂思極於輾轉反側幸而得之則有以配君子而開王道之端故歡豫達於琴瑟鐘鼓孔子曰樂而不淫哀而不傷漢匡衡曰妃匹之際生民之始萬物之原婚姻之禮正然後品物遂而天命全情欲之感無介於容儀宴私之意不移於動靜乃可配至尊而為宗廟主此綱紀之首王道所以四達而不悖也詩召南曰何彼穠矣唐棣之華曷不肅雍王姬之車謹按此王姬下嫁於諸侯車服之盛如此不敢挾貴以驕其夫家故見其車者知其能敬且和以執婦道而作詩以美之也詩鄭風曰女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳬與鴈弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好又齊風曰雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲東方明矣朝既昌矣匪東方則明月出之光蟲飛薨薨甘與子同夢會且歸矣無庶豫子憎謹按婦人之事其夫也以持家為本以勤敏互相警惕為先鄭小國耳猶有賢夫婦之警戒弋鳬鴈而歸來和滋味而調琴瑟其敬而且和可以槩見齊國賢妃當夙興之時心恐其晚故聞其似者而以為真夫小民之妻尚能却逸欲况其上焉者乎諸侯之妃尚能警朝會况有天下者乎魏宣武靈皇后胡氏安定臨涇人司徒國珍女也母皇甫氏産后之日赤光四燻京兆山北縣有趙胡者善於卜相國珍問之胡曰賢女有大貴之表乃為天地母生天地主句過三人知也帝聞之召入掖庭為充華世婦而椒庭之中以國舊制相為祈祝皆願生諸王公主不願生太子惟后每謂夫人等言何緣畏一身之死而令皇家不育冡嫡也明帝在孕同列猶以故事相恐勸為諸計后固意確然幽夜獨誓但使所懷是男次第當長子子生身死不辭既誕明帝進為充華嬪謹按事夫莫大於生子生子莫要於建儲故太子者家之冡國之本名分既尊諭教復早則天下咸有所托而心不二魏制生太子者其母賜死或一時弊政或宫掖訛傳皆不可知胡后獨能毅然自主念冡儲之為重雖身隕而不辭豈非專以國家之事為事者哉事夫莫大於此矣漢司馬遷曰夏之興也以塗山而桀之放也以妹喜殷之興也以有娀紂之殺也嬖妲己周之興也以薑嫄及太任而幽王之擒也淫於褒姒故易基乾坤詩首關雎書美釐降春秋譏不親迎夫婦之際人道之大倫也禮之用惟婚姻為兢兢曹大家女誡曰夫婦之道參配陰陽通達神明信天地之宏義人倫之大節也是以禮貴男女之際詩著關雎之義由斯言之不可不重也夫不賢則無以御婦婦不賢則無以事夫今之君子徒知妻婦之不可不御威儀之不可不整故訓其男檢以書傳殊不知夫主之不可不事義禮之不可不存也禮八嵗始教男讀書十五而志於學矣女獨不可依此為則哉又曰女有四行一曰婦德二曰婦言三曰婦容四曰婦功婦德不必才明絶異也婦言不必辨口利辭也婦容不必顔色美麗也婦功不必工巧過人也清間貞靜守節整齊行已有耻動靜有法古人有言仁逺乎哉我欲仁而仁斯至矣此之謂也又曰夫有再娶之義婦無二適之文故曰夫者天也天固不可逃夫固不可離也行違神祗天則罰之禮義有愆夫則薄之故女憲曰得意一人是謂永畢失意一人是謂永訖由斯言之夫不可不求其心是故室人和則謗掩外內離則惡揚此必然之勢也謹按閨閫之內大之則天下治亂所關逺之則社稷興亡所係司馬遷所言何其凛冽而方嚴居室之倫慚辱生於褻狎恩愛全於敬慎曹大家所言何其周祥而慎重彼有所恃而驕其夫與無所坊而縱其欲嗚呼亂之所生也則婦人以為階可不戒乎哉隋蘭陵公主字阿五高祖第五女也美姿儀性婉順好讀書高祖於諸女中特所鍾愛適河東栁述述漸見寵遇初晉王廣欲以主配其妃弟蕭㻛高祖既許之後乃適述晉王因不悅及述用事彌惡之高祖既崩晉王稱帝即位述徙嶺表且欲主與述離絶主以死自誓不復朝謁上表請免主號與述同徙帝大怒曰天下豈無男子欲與之同徙耶王曰先帝以妾適於栁家今其有罪妾當從坐不願陛下屈法伸恩帝不從主憂憤而卒年三十二臨終上表曰昔共薑自誓著美前詩鄎媯不言傳芳往哲妾雖負罪竊慕古人生既不得從夫死乞葬於栁氏帝覽之愈怒竟不哭乃葬主於洪瀆川資送甚薄朝野傷之謹按古人制禮獨婚姻號之曰嘉美德相成勢分皆所不論故臣民淑女作配君王帝女王姬不辭下嫁蘭陵公主為文帝之女焬帝之妹生長富貴乃能天性專篤固不恃勢分以驕其夫家且矢志終身甘同患難從嶺表而不移乞葬骨於栁塜情切義摯實人所難而生死各天竟從薄葬是不幸而不得盡事夫之願者夫至不得事而事夫之心愈明誠哉以美德相成者矣東漢梁鴻妻孟光擇配不嫁年三十父母問其故曰欲得賢如梁伯鸞者鴻聞而聘之光市作布衣麻縷諸汲作織績之具以行始嫁以裝齎入七日而鴻不答光乃跪床下請曰竊聞夫子高義簡斥數婦今而見擇敢請鴻曰吾欲葛裘之人與俱隱今衣繡縞傅粉墨豈鴻所求哉光曰以觀夫子之志耳乃更為椎髻著布裙操作而前鴻喜曰真吾配也共入霸陵山中以耕織為業詠詩書彈琴以自娛每食妻必舉案齊眉謹按家人利女貞若孟光之布裙操作舉案齊眉飄然富貴功名之外可謂貞潔自好矣奢則不遜約則鮮失即居室細微之間皆無之敢忽是事夫者所當法也勸學內則曰有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊謹按此明係王制之文何以重見內則聖王在上天下無不學之人即無不勸丈夫學之婦故取為婦人勸學法漢樂羊子妻亡其氏羊子從師受學一嵗矣來歸妻跽問故羊子曰久行懷思無他也妻引刀趨機而言曰此絲出於蠶繭成於機杼纍絲而寸纍寸不已丈匹乃成今而斷斯織也捐成功而稽日月將焉用之夫子績學當日知所亡以就於懿德若中道而歸何異斷斯織乎羊子感其言還終業七年不返許升妻呂氏字曰榮吳人也升博徒不操行吕時勤養姑數流涕勸升修學升不改吕父忿疾之呼榮歸欲改嫁榮嘆曰命之所遭義無可離終不肯升感而自厲遂以學成名宋蘇洵妻程氏眉山人好讀書識大義洵少豪不悅學中嵗發憤思自力念無以為生程曰君茍務學我不以治生纍君也罄服御鬻之治饘飴而洵得篤意於學謹按家道以婦人為內助而內助莫大於學樂羊之妻激之以斷機許升之妻感之以不忍離蘇洵之妻且渠渠焉為之治生以資之也是皆深思逺見力却燕私之好者可不謂之賢乎佐忠書益稷篇禹曰豫創若時娶於塗山辛壬癸甲啓哌哌而泣豫弗子惟荒度土功謹按禹承帝命而平水土胼手胝足勞瘁極矣娶塗山氏之女方四日即出治水三過其門而不入聞其子之泣亦莫之遑子之也可謂臣道盡忠之大者然後世皆稱塗山氏之賢佐助之功豈可泯哉詩秦風小戎三章曰言念君子載寢載興厭厭良人秩秩德音謹按此襄公上承天子之命往征西戎從役之家人先誇其車甲之盛而後及其私情蓋以義興師雖婦人亦知當勇於赴敵而無所怨者周邱子妻蓋人有伐蓋而滅之者令於蓋之羣臣曰敢有自殺者妻子盡誅邱子自殺人救之不死既歸其妻謂之曰吾聞戰而無勇非孝也君亡不死非忠也今軍敗君死子獨何生忠孝亡於身何忍以歸邱子曰吾固自殺也以救故不得死妻曰曩日有救今又何也邱子曰吾非愛身自殺者誅及妻子是以不死死又無益於君妻曰主辱臣死君死而子不死可謂義乎多殺士民不能存國而自活可謂仁乎憂妻子而忘仁義背故君而事強暴可謂忠乎人無忠臣之道仁義之行又可謂賢乎周書曰先君而後臣先父母而後兄弟先兄弟而後交遊先交遊而後妻子妻子私愛也事君公義也子以妻子之故失人臣節無事君之禮偷生茍活妾等恥之吾不能與子蒙恥而生遂自殺伐者賢之祠以太牢葬以將禮賜其弟金百鎰以為卿而使别治蓋君子謂蓋將之妻潔而好義北魏梓潼太守茍金龍妻劉氏平原人宣武時金龍為郡帶關城戍主梁人攻圍會金龍病不堪部分劉遂率勵守城人修理戰具夜悉登城備戰百有餘日兵士死傷過半戍副高景隂圖叛逆劉與守城人斬之及其黨數十人自餘將士分衣減食勞逸必同莫不畏而懷之會益州刺史傅豎眼率救兵至梁人乃退豎眼歎異之具狀奏聞武功縣孫道溫妻趙氏者安平人也万俟醜奴之反圍岐周久之無援趙乃謂城中婦女曰今州城方陷務在同憂遂相率負土晝夜培城城竟免賊文皇帝大統六年贈道溫岐州刺史趙安平縣君唐高獻妻秦氏獻為趙州刺史默啜攻州城陷獻仰藥不死默啜欲降之獻視秦氏秦氏曰君受天子恩當以死報賊官安足榮自是皆瞑目不語默啜知不可屈乃殺之楊烈婦者李侃妻也建中末李希烈陷汴謀襲陳州侃為項城令希烈分兵略定諸縣侃以城小賊鋭欲逃去婦曰寇至當守力不足則死焉且縣不守則地賊地也倉廪府庫皆其積也百姓皆其戰士也於國家何賴謂宜重賞募死士尚可濟侃如其言而守中流矢還家婦責曰君不在人誰肯固守死於外猶勝死於牀也侃遂登城卒退賊詔遷太平令宋馬氏者下邽李好義妻也好義為興州正將吳曦反將攻之拜決於家廟囑馬氏曰日出無耗當自為計生死從此決矣馬氏叱之曰汝為朝廷誅賊何以家為我決不辱李氏門户馬氏之母亦曰行矣勉之汝兄弟生為壯夫死為英鬼好義喜曰婦人女子尚念朝廷不愛性命我輩當如何雍氏昌州人宋池州通判趙卯發之妻元兵渡江卯發攝州事知不可守與雍氏訣令先出走雍曰君為忠臣我獨不能為忠臣婦乎遂同縊從容堂事聞朝廷贈卯發官待詔諡文節雍贈順義夫人立廟有司嵗以三月望日致祭金金玉妻寧晉人玉署元帥府監軍時武仙叛遣人賫誥命誘玉妻妻拒曰妾豈可使夫懷二心於國家耶仙怒圍之數匝殺其子寧壽謹按朝廷以高爵厚祿養天下士固欲得忠義之報至婦人女子生自閨門則未之有責焉然真性所激每至死生之際較之丈夫更為凜凛豈非從一而終其矢諸幽獨者久耶乃守貞殉節另彚成帙此專以佐忠為準者佐忠尤婦人女子之所難也羽書旁牛孤城斗絶呼援兵而不應餉士卒而無資或其夫幸而脫歸或其夫出而告訣或心變於偏裨或身傷於流矢或與其夫同辱於縲絏或誘其身疑二於誥命忠貞稍轉未必即嬰國法而大義所激昻嚴責之以偷生勤督之以操作究之城全城破皆不可知之死之生并置不問而夫妻芳名耿耿百世內助而有功於國家孰有過於此者乎譙國夫人洗氏者高涼人也世為南越首領跨據山洞部落十餘萬家夫人幼賢明多籌略在父母家撫循部衆能行軍用師壓服諸越每勸宗族為善由是信義結於本鄉海南儋耳歸附者千餘洞梁大同初羅州刺史馮融聞夫人有志行為其子高涼太守寶聘以為妻融本北燕苗裔初馮宏之投高麗也遣融大父業以三百人浮海歸宋因留於新會自業及融三世為守牧他鄉羇旅號令不行至是夫人誡約本宗使從民禮每與夫寶參決辭訟首領有犯法者雖親族無所縱舍自此政令有序人莫敢違遇侯景反廣州都督蕭勃徵兵援臺高州刺史李遷仕據大皋口遣召寶寶欲往夫人止之曰刺史無故不合召太守必欲詐君共為反耳寶曰何以知之夫人曰刺史被召援臺乃稱有疾鑄兵聚衆而後喚君今者若往必留質追君兵衆此意可見願且無行以觀其勢數日遷仕果反遣主帥杜平魯率兵入贛石寶知之遽告夫人夫人曰平魯驍將也領兵入贛石即與官兵相拒勢未得還遷仕在州無能為也若君自往必有戰鬭宜遣使詐之卑辭厚幣云身未敢出欲遣婦往參彼聞之喜必無防慮我將千餘人步擔雜物唱言輸賧得至柵下賊必可圖寶從之遷仕果大喜不設備夫人擊之大捷遷仕遂走保於寧都夫人總兵與長城侯陳霸先會於贛石還謂寶曰陳都督大可畏極得衆心此人必能平賊君宜厚資之及寶卒嶺表大亂夫人懷集百越數州宴然後纍建奇功至隋追贈寶為廣州總管譙國公册夫人為譙國夫人金圖吉氏平章政事齊嘉努女護衛尼楚赫妹也自幼動有禮法及適內族薩哈連閨門肅如薩哈連為中京留守元兵圍之薩哈連疽發憊不能軍圖吉氏度城必破謂薩哈連曰公本無功能徒以宗室故嘗在禁近提點近侍局同判睦親府今又為留守外路第一等官受國恩最厚大兵臨城公不幸病不能戰禦設若城破公當率精鋭奪門而出攜一子走京師不能則獨赴京師又不能戰而死猶可報國幸無以我為慮薩哈連出巡城圖吉氏乃取平日衣服粧具玩好布之卧榻資貨悉散之家人艷粧盛服過於平日且戒女使曰我死則扶置榻上以衾覆面四圍舉火焚之無使兵見吾面言訖閉門自經而死家人如其言卧尸榻上以衾覆之薩哈連從外至家人告以夫人之死薩哈連拊榻曰夫人不辱我我肯辱朝廷乎因命焚之年三十六少頃城破薩哈連率死士欲奪門而出不果投壕水死謹按忠烈所至可以轉禍為福亦可以激弱為剛惟精誠之既至斯智勇之兼生洗氏馳驅戎馬厯年多建功績圖吉氏勸夫以義令其速於所往持危定傾可謂佐忠矣贊亷內則曰子婦無私貨無私畜無私器不敢私假不敢私與謹按家事當統於尊故資財牲養器用皆不可私即以物借人以物遺人必稟命而後行每見官吏之受財納賄皆起於私妻子之一念妻子之失孝失敬皆起於豐殖一己之心故閨閫儉約之家必無越禮犯分之舉丈夫之亷非婦人有以贊襄之不可叔姬者晉羊舌子之妻叔向叔魚之母也羊舌子好直不容於晉去而之三家之邑三家之邑人攘羊遺之肉羊舌子不受叔姬曰夫子居晉不容去而之三家之邑又不容是終無所容也姑受之無逆其善意羊舌子受之曰以食肸若鮒矣叔姬曰不可南方有鳥其名曰乾雀食其子不擇肉子常不遂今肸與鮒童子也隨大人而化不可食以不義之肉不如瘞之無何攘羊之事作都吏至羊舌子曰以吾求容於此不敢無受也受之然受而不敢食瘞之矣發視之肉存焉而免東漢樂羊子嘗於路得遺金以歸妻曰妾聞之志士不飲盜泉之水亷者不受嗟來之食奈何拾遺金汚行乎羊子捐於野而還宋徐氏者龍遊人亷靖先生劉愚妻也未笄有志操姑子富母欲以字之徐泣曰願得有志行者事之獨為富人妻不願也時愚通經學隱居教授請聘之乃許既歸愚結廬城南以居頺垣敗壁蓬蒿蕭然時著書以自適徐機抒佐之裕如也一日愚懷白金數銖以歸徐怒曰妾以君為賢願奉君今安所得金乎愚出書則諸生所具束修也乃受之後愚為安鄉令卒士友私諡曰亷靖君妻之助也謹按周官有亷善亷能亷敬亷正亷法亷辨之法至精且嚴固男子之賢婦人亦與有助焉然史多不著持家勤儉婦人恆事耳若羊舌子之妻則匪特能亷遂已者涉世之道備患之方教子之義至平公命叔向因子靈之妻且凛然懼尤物之足以移人而羊舌氏竟以豺狼之聲滅其識力有大過人者樂羊劉愚則安貧賤而裕如却富貴其若凂故其妻並垂不朽後漢太原王霸妻不知何氏之女也霸少立高節光武時連徴不仕妻亦美志行初霸與同郡令狐子伯為友後子伯為楚相而其子為郡功曹子伯乃令子奉書於霸車馬服從雍雍如也霸子時方耕於野聞賓至投耒而歸見令狐子沮怍不能仰也霸目之有愧容客去而久臥不起妻怪問其故始不肯告妻請罪而後言曰吾與子伯素不相若向見其子容服甚光舉措有適而我兒曹蓬髮厯齒未知禮則見客而有慙色父子恩深不覺自失耳妻曰君少修清節不顧榮祿今子伯之貴孰與君之高奈何忘夙志而慙兒女子乎霸屈起而笑曰有是哉遂至終身隱遁南宋宗炳妻羅氏南陽人也炳與鴈門周續之同志幽居高祖辟召以禮皆不起元嘉初又徴通直郎徴為太子中舍人庶子并不應妻性高蹈與炳協趨謹按亷之為道大之則有天下而不與小之則去富貴其若凂王霸獨立清節操心久定而偶見子之末嫺禮度輒生羞赧不有其妻之勸告何以全成其高乎宗炳之妻能與偕隱辟召屢次而不出即以東宫庶子官之而終不應又豈以紛華靡麗動其心哉老子曰不見可欲使心不亂二氏有焉重賢詩鄭風女曰雞鳴之三章曰知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之謹按此賢夫婦相警戒之言不惟治其門內之職又欲其君子親賢友善結其歡心而無所愛於服飾之玩也天下有五倫朋友居其終臣固當同寅協恭以報其主子固當親師取友以孝其父妻則専乎門內若以不言閫外為當然者不知成就夫德乃稱賢哲此事夫之道必以重賢為要歟宋衛國大長公主幼不好弄真宗時下嫁駙馬都尉李遵勗遵勗賓客皆一時賢士燕集主必親視饔饎遼太祖淳欽皇后舒嚕氏諱平小字伊埒多其先回鶻人也行兵御衆嘗與謀議名震諸邦幽州劉守光遣韓延徽求援不拜太祖怒留之使牧馬后曰守節不屈賢者也宜禮用之太祖乃召延徽與語大悅以為謀主景宗睿知皇后蕭氏諱綽小字燕燕宰相遜之女蚤慧遜嘗觀諸女掃地惟后潔除喜曰此女必能成家帝即位選為貴妃尋册為皇后生聖宗景宗崩尊為皇太后攝國政后泣曰母寡子弱族屬雄強邊防未靖奈何耶律色珍韓德讓進曰信任臣等何慮之有於是后與色珍德讓參決大政委裕悅休格以南邊事統和元年上尊號曰承天皇太后又加上尊號睿德神略應運啓化承天皇太后謹按賢之所際不同重賢之道亦與之為不同貴戚所交皆一時賢士其根器之淑慎可知矣韓延徽奉命求援而挺身不拜乃怒而驅之下役不太甚乎舒嚕后獨能識其賢而勸太祖以禮用其智略有足多者至睿智皇后以大政共之色珍德讓以邊事委之裕悅休格巍巍乎定天下之規模也重賢之所保全不亦大哉漢班偼妤平陵人越騎校尉况女也成帝遊後庭欲與偼妤同輦辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有嬖妾今欲同輦得無近之乎帝善其言而止唐文德長孫后公主出降太宗敕有司資送倍永嘉魏徴諫曰昔漢明帝封皇子曰我子豈可與先帝子等裁令半楚淮陽今奈何送公主齎資顧倍於長公主乎帝默然入以謂后后太息曰妾數聞陛下稱魏徴正直竊不知其由今觀其引禮義抑人主之私真社稷臣也妾與陛下結髮為夫婦曲承恩禮每言必先候顔色不敢輕犯威嚴况以人臣之疏逺乃抗言如是陛下不可不從也因請遣中使齎絹以賜徵且曰聞公正直乃今見之故以相賞公且嘗秉此心勿轉移也上嘗罷朝怒曰會須殺此田舍翁后問為誰上曰魏徵每廷辱我后退具朝服立於庭上驚問其故后曰妾聞主明臣直今魏徵直由陛下之明故也妾敢不賀上乃悅宋真宗劉皇后仁宗時有漕使劉綽自京西還以羡餘獻后曰卿識王曾張知白呂夷簡魯宗道否此數人者曷嘗因羡餘進也仁宗曹皇后神宗稱為太皇太后時蘇軾以詩謗訕下御史獄太皇太后聞之謂帝曰嘗憶仁宗時以制科得軾兄弟喜甚曰吾為子孫得兩宰相今聞軾以作詩繫獄其無乃讐嫉者中傷之耶捃托至於詩過微矣吾疾已篤不可以寃濫傷中和帝大感流涕軾由此獲免英宗高皇后太尉瓊曾孫女也神宗尊為皇太后召司馬光吕公著於洛屬以政又起文彥博於洛為太師三人至皆遣使迎勞訪政焉諸大臣忠邪貞佞辨如蒼素委任耆舊終始不疑放逐姦邪屏斥弊政頃刻立斷也又顧范純仁曰卿父仲淹可謂忠臣在明肅垂簾時勸明肅盡母道明肅上賓勸仁宗盡子道卿必法之謹按天下之治在用賢一身之修亦在用賢有賢而不用則必有不肖者起而搖惑於其間即古禮皇后不出深宫亦未嘗不知天下之賢長孫氏創起艱難久聞魏徴房玄齡之可信固道之至正者劉之引王曾等以却獻曹之申救蘇軾高之召司馬光等語范純仁等皆深知賢人之可用而用之至於班偼妤一嬪屬耳且惓惓進規曰名臣在側况卿大夫士庶之家可不重賢為兢兢哉齊命婦者晏平仲御士之妻也晏子出士為御妻闞觀見之歸請去夫問何也妻曰晏子長不滿六尺身相齊國名顯諸侯吾從門間窺之其志恂恂然自下也思念深矣今子以八尺之軀身為之御然且擁蓋策馬意洋洋其自足也其何後之有妾請行其夫慙謝深自責如不容晏子怪而問之以實對晏子以為能服義也升諸公以為大夫晉大夫伯宗妻晉女也伯宗退朝而色喜問之曰諸大夫皆以我為知於陽子也妻曰實榖不華至言不飾陽子華而不實既禍及之矣子又何喜焉已伯宗飲諸大夫酒而語無能難者畢飲妻泣曰信矣諸大夫之莫子若也然盜憎主人民惡其上必戒之且國家多難危可立待盍自結於賢大夫托州犂焉伯宗乃厚畢羊而結之已而有郤氏之禍畢羊以州犂免元大名王德政妻郭氏少孤事母張孝豪家納聘張不許而德政年四十餘貌古陋以學行教授里中張貧不能教二子欲納德政為贅壻使教之宗黨交諫郭氏順母志許焉既婚與德政相敬如賓教二弟有成立德政卒郭方二十餘矢無再醮以終謹按此官與民之妻能知重賢者一則激其夫賤而能貴其得力在謙一則全其子禍而能免其得力在誠一則教其弟貧而能學其得力在順深思逺慮能佐夫而不居其功必如是斯可完事夫之道耳御定內則衍義卷三
