body:
  text: 欽定四庫全書御定內則衍義卷十大學士傅以漸恭纂禮之道殉節二唐周迪妻不知姓迪善賈往來廣陵㑹畢師鐸亂人相掠賣以食迪饑將絶妻曰今欲歸不兩全君親在不可并死願見賣以濟君行迪不忍妻固與詣肆售得數千錢以奉迪至城門守者疑其紿與迪至肆問狀見妻首已在枅矣迪裹餘體歸葬之宋東安縣民丁國兵妻建炎四年盜祝友聚衆於滁州掠人為糧國兵及妻為友所掠妻泣曰丁氏族流亡已盡乞存夫以續其祀賊遂釋夫而害之王袤妻趙氏饒州樂平人建炎中袤監上髙酒稅金兵至袤棄官逃去趙從之行遇金人縳以去繫袤夫婦於劉氏門而入剽掠劉氏趙宛轉解縛並解袤謂袤曰君速去俄而金人出問袤安往趙他指以誤之金人追之不得怒趙欺已殺之袤方伏叢薄間望之悲痛歸刻趙像以葬袤後仕至孝順監鎮元李仲義妻劉氏名翠哥房山人至正二十年縣大饑平章劉哈喇布哈兵乏食執仲義欲烹之仲義弟馬兒走報劉氏劉氏遽往救之涕泣伏地告于兵曰所執者是吾夫也乞矜憐之貸其生吾家有醬一甕米一斗五升窖於地中可掘取之以代吾夫兵不從劉氏曰吾夫瘦小不可食吾聞婦人肥黑者味美吾肥且黑願就烹以代夫死兵遂釋其夫而烹劉氏謹按此皆婦人以死全夫者周迪妻濟夫之饑丁國兵妻存夫之祀王袤妻解夫之縛李仲義妻代夫之烹或以智紿或以勇决或以情祈其夫皆瀕死而獲免夫男子當患難之際往往不暇內顧乃諸婦視其夫重於泰山視其身輕於鴻毛豈非婦節之尤烈者哉漢趙萬妻宕渠人名娥避黃巾冦走萬足疾不能行娥扶之行萬為賊所殺賊欲汚娥以刃迫之娥聳身受刃貫心達背而死金相琪妻欒氏有姿色琪為萊州掖縣司吏貞祐三年紅襖賊陷掖縣琪與欒氏及子俱為所得賊見欒氏悅之殺琪及其子而誘欒欒奮起以頭觸賊而仆罵曰我豈為犬彘所汚也賊怒殺之追封西河縣君諡莊潔元章雍妻蕭氏沂州人元末兵亂雍被虜蕭呼雍曰今死君前義不受辱賊俱殺之詔贈蘭陵縣君陳氏光澤危萱妻至正末寇陷杉關驅掠鄉民男女陳氏與萱俱被執賊索金帛不愜其欲萱被害脅陳氏去陳氏罵不從亦被害李哥霸州娼女年十二三時母教之歌舞泣不肯學母告以業不可廢哥曰若此聽母母亦從我好否則有死已爾母陽許之因是不粉澤不茹葷所歌多仙曲道情有召者先詢主客姓名然後往往亦相戒毋戲狎哥凝立筵前酒行歌闋目不流盻與之酒弗飲州判官嘗忤哥徑還誓不與見孟津縣達嚕噶齊厚賂哥母夜抵舍哥懷利刃閉卧內罵之曰汝職在牧民而狗彘之不若可急去不汚吾刃矣慚怒而回明日知州聞之歎曰州有貞女而吾不知是一失也吾次子明經舉秀才真若配以禮聘娶之未幾紅巾入寇夫婦被執見哥妍麗將殺其夫哥走前抱夫項大呼曰吾斷不從賊求生寇并殺之明劉氏上饒汪芳妻芳病瘋痿謀更遣之劉泣曰夫貧且疾妾命也敢不以死從傭紡績以給朝夕正德庚午桃源賊至劉護芳不忍去賊欲辱之不從斬芳首以脅之劉罵聲益厲遂還害謹按此節婦之與夫俱死者當世擾攘其夫多無辜遇害蓋殺運使然而鋒刃所及往往戕男子而免婦人使稍惜軀命何難茍免乎乃諸婦或聳身受刃或以頭觸賊或願死夫前或罵賊不絶皆大節皎然其夫之名竟附烈婦以不朽至霸之李氏脫倡門之汚作宦室之耦拒暴令於前抗巨寇於後尤可異焉嗟夫明於禮義婦之卑賤者終以節烈稱昧於禮義士之尊顯者恆為威武屈人亦貴自立而已漢僰道張騏妻黃氏女名帛真因乘船過江覆沒帛真求尸不得於溺所仰天而嘆遂自沉積十四日乃抱夫尸出於灘下元史五妻徐氏定逺人五為義兵百夫長至正十年暴兵至五戰死徐氏求夫於積尸中莫能識以口吮血辨驗得之載歸治大棺以殮乃沐浴自經死明袁氏龍安人嚴庸妻舅姑疾侍湯藥盡孝永樂間庸補州學生因歸省墜興文棧道溺死袁氏亟趨夫溺處尋尸不見大哭亦投水死兩月不得尸後漁人於沙回頭得二尸同處人以為節義所感事聞旌為貞烈謹按長江棧道皆巨浸也以孱然女子既死之魄而求夫尸於渺茫之鄉豈可得哉乃黃氏積十四日抱夫尸以出袁氏閲兩月與夫尸同處一念激烈江河不足為廣至徐氏吮血辨驗而得夫尸尤事與理之最異者昔漢東海孝婦被寃三年不雨精誠所感天不以婦女而遺之則三婦之事固不足怪矣宋榮氏薿女弟也自幼如成人讀論語孝經能通大義事父母孝歸將作監主簿馬元穎建炎二年賊張遇寇儀真榮與其姑及二女走維揚姑素嬴榮扶掖不忍舍俄賊至欲汚之不從賊殺其女脅之榮厲聲詬罵遂遇害元假氏史宛妻餘干人紅巾亂其僮欲犯之殺一女罵不從又殺一男罵不從竟死焉明危氏貴溪聞一貫妻正德間桃源賊剽掠危度難免謂夫曰禍迫矣夫全老祖我負二子且逃後為賊所執出首飾祈免賊取之復逼以去危罵曰吾儒家婦豈為狗彘從也賊殺其幼子脅之奮罵愈厲遂遇害事聞旌表李氏廣昌人適於黃氏正德辛未流賊破縣李出走牛鼻嘴賊執欲汚之罵曰我儒家婦不幸被汝執欲殺即殺豈從汝耶賊復持其子以劫之李亦不顧仆地求死賊遂刃之謹按婦人之於子女其顧惜係戀有甚於丈夫者乃諸婦遇賊或殺其子女以脅之或持其子女以劫之皆毅然不顧此非忍於至情蓋明大義耳義之所激有不顧子女之婦人情之所誤有全軀保妻子之男子慕志節者亦於情與義之間致其辨可也隋趙元楷妻崔氏清河人甚有禮度宇文化及之反元楷隨至河北將歸長安至滏口遇盜僅以身免崔氏為賊所拘請以為妻崔氏曰我士大夫女為僕射子妻今日破亡自可即死終不為賊婦羣賊毁裂其衣縳於牀簀之上將陵之崔氏懼為所辱詐之曰今力已屈當受處分賊遂釋之崔因取賊刀倚樹而立曰欲殺我任加刀鋸若覔死可來相逼賊大怒亂射殺之元楷後得殺妻者支解以祭崔氏之柩唐符鳳妻字玉英姿貌殊美鳳以罪徙儋州至南海為獠賊所殺脅玉英私之對曰一婦人不足事衆男子請推一長者賊然之乃請更衣有頃盛服立於舟罵曰受賊辱不如死自沉於海宋龔自立妻張氏樂昌人嘉定中冦至夫妻襁負二稚子竄匿為賊所得脅以行張與夫訣曰妻死無憾所憐者二子幸善撫之中道紿賊曰吾渴欲飲可暫假我縛賊從之遂投江中邑人立祠祀之何氏吳人吳永年之妻也建炎四年春金兵道三吳永年與其姊及何氏奉母而逃母老待挾持而行卒為兵所得將縶其姊及何何紿謂賊曰諸君何不武耶婦人東西惟命爾賊信之乃次水濵謂其夫曰我不負君遂投於河其姊繼之元趙彬妻朱氏名錦哥洛陽人也天厯初西兵掠河南朱氏被執逼與亂朱氏拒曰我良家婦豈從汝賊耶兵怒提曵箠楚之朱氏度不能脫即紿謂之曰汝幸釋我舍後井傍有瘞金當發以遺汝兵信之乃隨其行朱氏得近井即抱三嵗女踴身赴井死潘氏名妙圓山隂人徐允讓妻元末兵變允讓與潘氏奉其父安避山谷間遇冦斫安傷頸允讓大呼曰汝寧殺我勿殺吾父寇舍安殺讓將辱潘氏潘紿曰吾從必矣若能焚吾夫則吾無憾焉寇為聚薪焚其夫火方烈赴火死安始獲免洪武中旌表謹按貞婦遇賊得死為幸然為所拘縶投死不得寡難敵衆弱不勝强茍心清而身辱九泉遺恨多矣乃諸婦紿賊術非一端皆得潔身而死蓋以智而成其節者詩曰哲夫成城哲婦傾城言男子而智足以立事婦人而智足以致敗也若諸婦之智亦何可少哉元李氏光澤人成一元妻至正末江西寇陷光澤邑民依烏君山之玉隆宫以居鄰賊乘機入山剽掠李氏被執驅迫以前行經龍牀石崖深壑李氏力曵所縛繩與賊俱投崖死佘氏順昌人年十六父從周許妻黃壽明年將樂土豪伍馬榮者欲强娶之余氏告父曰既受黃聘即黃婦也吾寧死不失節父以其辭辭之又明年歸黃黃迎之土豪遣百奴俟於道殺黃而奪余氏余氏紿其奴還乃扶黃柩歸白於官土豪坐誅遂卜地葬其夫自殺以從時致和已巳嵗也明鄧氏泰寧人適李祥正統中避冦為所執欲犯之紿曰吾從汝須就崖穴隱僻處及崖間奮投下與賊俱死謹按冦賊之輩豪强之徒戕貞女害潔婦未嘗無明死王章隂罹天譴者然烈魄先逝不得見其滅亡令人歎恨不已乃李氏鄧氏奮身投崖併賊俱死余氏白寃於官土豪坐誅然後就死豈非節烈中快事乎夫生為女子力之弱非能敵寇賊也勢之孤非能制强豪也而三婦得遂其志蓋烈性所激則弱者不弱而孤者不孤矣孔子曰見義不為無勇也惟勇足以赴義亦惟義足以生勇耳唐樊彥琛妻魏氏揚州人彥琛病魏曰公病且篤不忍公獨死彥琛曰死生常道也幸養諸孤使成立相從而死非吾取也彥琛卒值敬業難陷兵中聞其知音令鼓筝魏曰夫亡不死而逼我管絃禍由我發引刀斬其指軍伍欲强娶之拒不從乃刃擬頸曰從我者不死魏厲聲曰狗盜乃欲辱人速死吾志也乃見害聞者傷之宋廖氏沙縣人性慧解歌舞紹定三年為賊所掠命之歌舞廖罵曰我恨不磔汝寧肯悅汝耶賊怒殺之時賊欲窺城廖有娠賊刳其腹觀男女以卜進退得女遂引去元劉氏冀之衡水人通古文孝經小學適同郡曹泰時紅巾陷河朔因避兵聊城村賊奄至大掠見劉氏居羣人中特妍整持刀驅之行劉氏曰吾婦人惟知從夫而己不從賊也賊欲移其心乃盛陳金玉珠璣仍以錦繡衣服被其身劉氏裂碎之强擁上馬墮地者數回賊怒繩其項就馬上曵之劉氏以手據地以頭觸石流血罵不絶口遂遇害南宋涂端友妻陳氏撫州臨川人紹興九年盜起被驅入黃山寺賊逼之不從以刃加其頸陳叱曰汝輩鼠竊命若蜉蝣我良家子義豈爾辱縱殺我官兵即至爾其免乎賊知不可屈乃幽之屋壁居數日族黨有得釋者咸齎金帛以贖其拏賊引端友妻令歸曰吾聞貞女不出閨閣今吾被驅至此何面目登涂氏堂復罵賊不絶竟死之謹按管絃歌舞女子習之則易流金玉錦繡女子悅之則易惑乃魏氏斬指廖氏刳腹劉氏以手據地以頭觸石陳氏河歸而不歸未嘗漸於所習而動於所悅則女之污潔亦存乎立志而已宋王氏利州路提舉劉當可之母也紹定三年就養興元元兵破蜀提刑龎授檄當可詣行司議事當可捧檄白母王氏毅然勉之曰汝食君祿豈可離難當可行元軍屠興元王氏義不辱大罵投江而死其歸杜氏及婢僕五人咸及於難當可聞變奔赴江滸得母喪以歸詔贈和義郡太夫人王氏二婦汝州人建炎初金人至汝州二婦為所掠擁置舟中遂投漢江以死尸皆浮出不壞人為收葬城外江上為雙冢以表之元丁氏名月娥西域人歸蕪湖葛家已而南北兵起僦居郡中無何沔冦奄至城失守月娥慨然曰吾簮纓家女何忍見此即抱所生女赴水死婢媵凡九人皆爭入水無後者吕氏陵州人久嫠居寓弟彥能家至正十八年賊犯陵州彥能與家人謀所往吕氏先曰我喪夫二十年又無後不死何為茍辱身則辱吾弟矣赴井死彥能妻劉氏語彥能曰妾為君家婦二十八年茲不幸逄亂離必不負君君可自往妾入井矣二女及子婦王氏二孫女皆隨劉氏入井一門死者七人布延巴哈妻阿嚕章䝉古人明兵至山東巴哈死阿嚕章厯呼家人告之曰我夫受國恩我亦封夫人今事至此惟有死而已巴哈二弟之妻各抱幼子及婢妾溺舍南井死井已填塞阿嚕章遂抱子投舍北井女及妾孫女皆隨溺焉宋謙妻趙氏大都人兵破大都趙氏子婦溫氏髙氏孫婦髙氏徐氏皆有姿色合謀曰兵且至矣我等豈可辱身以茍全哉趙即自經死婦孫男女妾十三人皆赴井而死齊氏太原人適王履謙至正間賊陷太原齊氏與蕭吕二婦及二女避難趙莊賊至度不能免顧謂二女曰汝家五世同居號曰清白豈可辱身以茍生哉長女曰吾夫已死今得死為幸吕曰吾左丞孫也義不受辱及與二婦二女及二孫女俱投崖下死陶宗媛台州人儒士杜思絅妻也歸杜四載而夫亡矢志守節台州被兵宗媛方居姑喪忍死護柩為遊軍所執迫脅之媛曰吾若畏死豈留此耶任汝殺我以從姑於地下耳遂遇害其妹宗婉弟妻王淑亦皆赴水死朱氏黃仲起妻杭州人至正中張士誠寇杭州其女臨安奴先别母求死俄賊驅諸婦至其家具令朱氏母子看守朱氏懼受辱與女及妾馮氏俱縊死仲起嫂蔡氏抱幼子元童與乳母皆自縊李宏益妻申氏冀寧人至正二十年賊陷冀寧申語宏益曰君當速去勿以我婦人相纍若賊入吾室必以妾故害及君矣言訖投井死宏益既免於難再娶安氏居二歲而宏益以疾卒安氏時年二十泣謂諸親曰女子一適人終身不改不幸夫死雖生亦何益哉乃竊入寢室膏沐薰裳自縊於柩側固始五節婦髙希鳳妻劉氏希鳳在遼東與劉俱被掠希鳳死劉罵不絶口被殺仲弟葉師奴妻李氏早寡携子姪避亂高麗明初復挈家歸守夫墓誓不再適季弟巴延巴哈妻郭氏巴延為納呐克所殺郭自縊死從子逹實丁妻金氏實丁為父仇誣陷死金氏與姑邢氏義不受辱俱自縊事聞詔旌之周氏撫州陳忠妻正德七年盜起忠率族人與戰不勝潰走周被執自投於沼其伯母王氏楊氏嬸張氏饒氏王氏女金玉俱溺水後皆旌表謹按此皆死節婦女一家二三人至十餘人者夫安樂之事易共趨避之念難齊乃諸婦慷慨捐軀爭死恐後大率分之尊者倡之分之卑者隨之下至婢妾之類莫不觀感奮發何節義之聚於一門也考其所遇類多死冦死兵夫干戈之所加雖勇必屈而諸婦屹不為動不亦難乎惜其母氏或傳或不傳要之貞性正氣長存於天地間矣宋張氏鄂州江夏民婦里惡少謝師乞過其家持刀逼欲與亂曰從我則全不從則死張大罵曰庸奴可死不可他也至以刃斷其喉猶能走擒師乞以告鄰人既死朝廷聞之詔封旌德縣君表其墳曰烈女之墓賜酒帛令郡縣致奠金氏髙淳人少寡居貧其里有惡少欲汚之持刃逼脅金曰决無從汝之理可即殺我遂見害有司以事聞表其鄉曰節婦里明陳氏名真黃巖程有德妻洪武間以軍生至京鎮撫陸林見陳美欲污之不從百方脅之陳愈嚴厲遂被歐死夫訴於朝林以罪誅萬氏南海人王受祖妻洪武中蘇友經作亂萬為官軍所獲獻於衛指揮盧諸諸愛其才美欲納之萬號泣投衣於火諸怒以刃試之萬唾罵不輟就死於南門外程烈婦婺源人已適人歸寧里有强暴欲私其母女大罵强暴怒甚毆殺之復以危言懼其母令勿泄時郡㕔前夜有聞悲號如怨訴者太守孫遇疑之未幾御史行郡詢其略令遇鞫治强暴伏罪乃為文以祭之謹按召南行露之詩强暴之人欲强娶貞女然不過巧致之訟獄蓋猶知有王法也逮乎末世遂有恃威力挾鋒刃以凌守志之婦者堅拒不從輒加戕害豈非化衰俗敝使然與宋張氏金氏明陳氏萬氏程氏皆為强暴所殺或朝旌其烈或官雪其寃足為貞魂吐氣又或氷心鐡骨並存於紀傳然千古不朽則一也孱然女子扶已衰之化振久敝之俗是可以傳矣宋項氏吉州吉水人居永昌里適同里孫氏宣和七年為里胥所逮至中途欲侵凌之項引刀自刺而死郡以聞詔贈孺人旌表其廬金烏庫哩氏巴祥之妹臨洮總管圗們呼圗克們之妻也巴祥在朝貴中聲譽籍甚呼圗克們死王事元帥崔立之變烏庫哩氏謂家人曰吾夫不辱朝廷我敢辱吾兄及吾夫乎即縊死雷婦師氏夫亡孝養舅姑舅姑既歿兄師逵與夫姪窺其財産乃僞立媒證致之官欲必嫁之縣官不能辨曲直師氏畏逼乃投縣署井中死事聞詔祭其墓賜諡曰節元郭氏台州人千夫長李某部卒妻也李見郭氏有令姿心慕焉去縣七八十里有盜出沒李分兵往戍卒遂在行既而日至卒家調之郭毅然莫犯經半載夫歸具以告一日李過卒門邀入具茗轉身持刀出李幸脫走訴縣捕卒問擬死罪桎梏囹圄郭氏躬餽食於夫閉户紡績以資衣食人不敢一至其家久之一獄卒葉姓者尤有意於郭氏乃顧視卒日飲食之情若兄弟遂謀之於卒欲以為妻卒喜諾郭氏曰汝之死以我色我不能二適以求生既歸持幼子女二人痛泣遂携出市召人與之人有憐之者納其子女贈錢三十緍郭具酒饌擕至獄哽咽不能語既而曰君擾押獄多矣可用此答之又有錢若干可自收給我往一富家執作糊口恐旬日不及看君也垂淚而别走至仙人渡溪水中危坐而死見者報縣為具棺殮葬所死之側山下上司表其墓曰貞烈郭氏之墓至正六年朝廷遣使亷得其事原卒釋之陳九淵妻袁氏分宜人元季兵亂邑萬户王同者聞袁美姿容殺其夫欲娶之袁曰夫為我死我當以死報遂自刎明程氏衢州潘仲嶽妻永樂間仲嶽戍遼東解戍者見程色戲之程怒解戍者遂以軍政當僉妻起解挾與偕行法不能阻程恐在途遭辱即入室自經死金氏上海縣庠生金應登女也美姿色隆慶中嫁富人徐第為妻第性好博宦家悍奴因誘之家遂傾其産復誘其鬻妻因獻於主主遣數十人要迫之金氏義不受辱自縊死謹按此皆節婦遭强暴而自殺者師氏則因縣官不辨曲直而死郭氏則因縣官枉坐夫罪而死烏庫哩氏則為元帥所逼而死袁氏則為萬户强納而死項氏程氏則為胥役相凌而死金氏則為豪奴誘獻而死則當時膺民社之寄任將領之職者固皆匪人而文武大吏操官評握兵柄者何若聾瞶耶法紀衰而節義乃見是世道之不幸也節義見而風化長存是亦世道之幸也端風化者其於法紀加之意哉吳顧承妻張氏兄溫以承為孫權所囚奪張改嫁丁氏張飲藥死金李文妻史氏同州白水人夫亡誓死不嫁父强取之歸許邑人姚乙為妻史氏不聽姚訴之官被逮遂自經死事聞詔有司致祭其墓元齊關妻劉氏河南人關應募為千夫長戰死澤潞間劉氏貧無依守志不奪有來强議婚者劉氏紿曰吾三月三日有心願償畢當從汝所言是日徑往彰德天寧寺登浮圗絶頂祝天曰妾本河南名家劉氏女遭世亂適湖南齊關為妻今夫已死不敢失節遂投地而死王宏妻李氏安陽人至正間紅巾賊起宏亡於兵李收尸發喪晝夜哭泣李頗有姿部人爭求為妻李以死自誓人知其不可干乃白於帥帥許之李度不能支佯曰必待卒虞之後求者諾之逮期遂飯僧大作佛事散家資翼日清晨引一老婢登古寺浮圖絶頂自投而死衆皆驚愕瘞於西門外築土為臺髙數丈以旌節婦徐仁妻謝氏上猶人名十九娘夫死夫黨有徐祥者隂許為富家妾謝聞之悲慟自縊死大德間廉訪司至縣祭之表其墓曰貞婦李馬兒妻袁氏瑞州人有姿色至正二十二年夫歿年十九誓不再嫁以養舅姑有王成者挾勢欲娶之遂往夫墓痛哭縊死樹下劉氏燕山人幼失父贅壻松江人初不知為亡卒而自有妻久之㑹赦壻謂劉曰吾歸松江當即還後竟不返劉尋至松江壻不復認劉仰天痛哭剪髮自誦佛經行丐於市宿嫠姥家人憐之不乏施因搆一堂製棺夜卧其中五十餘年不易節鄰火劉入棺呼曰器物悉取去乞闔棺以畢吾事於是與室俱燬明吳江妻李氏餘姚人舅與夫俱疫死姑幸存有澄水黃姓者謀娶之李誓死不從黃乃通其父詐稱母暴病迎李歸省隂令肩輿者輿至黃氏及出輿則非母家姑亦徐至李度不可脫乃從容請湯沐湯具求如厠久之不出開厠户視之則已經死矣江氏周伏受妻孝感人夫卒楚藩人林寬令魏富聘為妾江詈富甚厲寬强遺帨巾江乃整衣拆籬走哭夫墓沉漳河死巡撫朱廷聲御史張祿嘉其節命知府劉本用取兩骸同棺葬之表曰江節婦墓林汝殷妻王氏黃巖人生二十歸林未幾汝殷卒里人欲娶之王斷髮以死自誓其父母防之且勸之力王佯許既而防者少懈乃隂囑侍婢分其嫁時服一歸其母一與其妹一以為殯殮之具遂自經死陳氏名小奴臨海人適王三狗其夫為虎所攫即攘奮悲號而往虎驚駭舍之去負夫以還夫死未幾有欲納為妾者陳不從乃致聘物促迫以歸陳度不免亟走姜巖自投而死謹按此皆烈婦夫亡因人欲娶而自殺者夫從一而終固婦人之道然以禮聘娶與强暴相凌者不同向使志節少萎者處此借聘娶之名必蹈失身之辱矣乃諸婦屹然不移毅然就死或奮志而立决或設計以潔身𫝊曰智者不惑勇者不懼諸婦有焉至燕山劉氏為夫所紿而又棄之乃五十餘年不改節斯更難矣宋羅李二氏保昌人宋末賊掠其村二婦義不受辱投水死金樊婦蒲氏行唐人嫁未幾夫卒誓不再適時有山寇逼求為妻蒲氏投崖下水中死鄉人號曰義姜稱其水為玉女塘元吳守正妻禹氏名淑靖字素清紹興人至元十六年徙家崇德之石門淑靖嘗從容謂守正曰方今羣盜蜂起萬一不測妾惟有死而己不使人汚此身也是年夏盜陷崇德淑靖携八嵗女登舟以避有盜數輩奔入其舟將犯淑靖淑靖乃抱女投河死蔡三玉龍溪陳端才妻也盜至父廣瑞與端才各竄去三玉偕夫妹出避鄰祠中盜入斫夫妹見三玉美不忍傷與里婦歐氏同驅納舟中行至栁營江迫妻之三玉佯許諾因起更衣自投江水死越三日尸流至廣瑞舟側廣瑞識為女收殮之歐氏脫歸言狀有司髙其操請表之乃命旌門復役仍給錢而葬明何氏廣昌人魏寵妻年二十五喪夫矢節正德辛未流賊猝至家人各竄去何携幼孩走依母家途遇賊掠之行奪其子刃之何投水死謹按水之止也鑑萬形而畢徹有不可淆之德焉水之流也經百折而必東有不可屈之性焉是以比君子之心者恆曰如水古之賢人亦多有指水以旌心者考宋元金明諸婦遇冦而死於水者潔身濁俗矢志重泉素心與水同清芳名與水俱永矣明髙氏真定深州人適清河李茂茂充吉安衛總旗墮馬病卧髙奉湯藥不離左右茂亡悲泣甚衰乃盡散家資為喪具復買一官棺置户側至夜深沐浴更衣自經死與茂合葬洪武中旌表其門曰貞烈熊氏名謇奴豐城余繼妻年二十一歸繼繼疾度不能起語以備後事熊出篋中衣對繼紉定每襲為二泣且謂曰即有不幸吾當服之以俱死不能獨生繼卒熊視殮畢聞家人議舉棺焚化即衣所紉衣期赴火家人察其意防之少懈即自縊與繼同日合葬于施家園白氏楊頀妻播州人永樂間頀回自北京卒於途田聞之哭泣不食柩至自經死旌曰貞烈謹按聖人之論曰無若匹夫匹婦之為諒自經於溝瀆而莫之知也豈非謂此身不可輕小信不足道乎然在丈夫為小在婦女則大矣諸婦或許夫以死而立踐其言或自誓以死而必遂其願慷慨激烈絶無遲回人之知與不知固非所計也至播州逺在徼外永樂時聲教未及乃婦女有以節著者故并録之元李智真建寧蒲城人父子明無子智真七嵗能讀書九嵗母病調護甚謹及卒哀慟欲絶不茹葷三年治女工供祭祀及奉父甘㫖不乏鄉里稱為孝女父嘗許為鄭全妻未嫁時從父客邵武邵武豪陳良悅其慧强納采求聘智真斷髮拒之且數求死良不能奪卒歸全事舅姑有道泰定間全病疫智貞悲泣不食數日而死朱虎妻茅氏崇明人大德間虎官都水監坐罪籍其家吏録送茅氏及二子赴京太醫提㸃師甲乞歸家欲妻之茅氏誓死不從母子三人以𥚑相連結晝夜倚抱號哭形貌銷毁師知不可奪釋之茅氏託居永明尼寺憂憤不食卒杜友聞妻吳氏江隂人友聞儒者貧教授吳辟纑助之天厯間歲歉友聞竟餓死吳昆弟欲挈吳以歸吳以義拆之遂相枕藉而死明朱恚妻賀氏生三女恚病篤賀即潜匿靜室自縊家人驚救之復吞水銀求死又救之遂閉口不食不言與恚同時卒事聞旌表劉氏名玉蘭彭澤人年十八適同邑民計偉越五載夫亡哀痛殊切圖與俱死既而翁舉夫喪劉泣告願少留乃移别室停之劉苫塊以居悲號傷心嘔血數升父母恐遷柩藁葬劉曰吾今得死期矣遂不解衰經七日不食而卒舉其尸袖中所遺巾帨皆夫遺物謹按傳曰飲食男女人之大欲存焉貞烈之婦其心純乎天理情欲之念固不足以亂之矣若夫飲食得之則生不得則死是豈易絶乎乃元之李智貞茅氏吳氏明之賀氏劉玊蘭皆絶食殉夫載在傳紀聞古之髙士有辟穀以求長生者乃諸婦則辟穀以求速死求長生者出塵之清心求速死者絶俗之大節大節在天地間千古不朽與長生何異哉吳王氏平度州人家貧從夫秦友築治邊城裹糧以從夫亡乞棺葬之剖心以殉時人哀之為起祠元陳道安妻林氏文昌人元末寇亂道安陷於中欲密圖賊謀泄被殺林氏瘞道安泣盡哀自啖土梗而死臺叔齡妻劉氏順寧人粗知書克修婦道一日地震屋壞壓叔齡不能起家復失火叔齡母前救不得欲就焚叔齡望見呼曰吾已不可得出當亟救吾母劉謂夫妹曰汝救汝母汝兄必死吾不用復生矣即自投火中死火滅家人得二尸燼中猶手相握不開官嘉其烈上于朝命録付史臣明孫氏恩縣人李資妻𢎞治元年夫卒孫觸墻而死賈氏生員潘耀卿妻沅陵人正德中耀卿挈賈氏省父於南京至湖口耀卿卒賈即赴水女奴持之既見舅姑入室自縊以救免減食凡四十餘日絶食者纍日竟自刎謹按烈婦以死殉夫者自經絶食之外其捐生之道非一如王氏之剖心林氏之啖土劉氏之投火孫氏之觸墻賈氏之刎頸凡可以死其身者踴躍就之惟恐或晚明隆慶後數婦其所以死不傳要之慷慨就義無以異也嗟夫人誰不死茍死于義與令終等耳隋河北孫神妻陳氏神當逺戍主吏配在夏州意難其逺有孤兄子欲以自代陳曰為國征戍道路遼遠何容身不肯行以孤姪自代天下物議誰其相許神感其言乃自行在戍未幾便喪柩至陳望而哀慟一哭而卒文帝詔表其閭元李君用妻王氏遼陽人大德八年君用病卒卜葬將發引親戚鄰里咸㑹王氏謂衆曰夫婦死同穴義也吾得從良人逝不亦可乎因撫棺大慟嘔血升許即仆地死衆為殮之與夫連柩出葬遂者數百人莫不灑泣李氏廣昌人何永孚妻嫁時年十四越一年孚卒李氏弛容釋妝每欲與俱柩前設一木凳坐而哭凳為之刓姑病朝夕祝告請以身代姑卒哭曰吾所以不死者為姑在也姑既逝吾何生為遂哀慟嘔血死明應氏建寧人歸邱伯春年二十夫卒號天願同死自投池中鄰婦援出之氣息奄奄自斷左手中指置夫懷中既葬旦夕慟哭而卒王氏素英吉水生員周必登妻年十九歸必登𢎞治七年必登以疾卒王氏誓與同死不食數日母死歸吊語弟曰我死尸還周氏弟方出忽以無疾終弟如其言還尸于周里人莫不悼之謹按烈婦捐生之道非一已備録之矣乃又有不必鋒刃水火而俄頃殞身如陳氏王氏一慟而絶李氏應氏痛哭而卒至周氏告語之頃無疾忽終此數婦者豈非至性所發棄形骸如脫蓰乎古之聖人有言生寄也死歸也世俗之人於其寄者戀而不能割於其歸者避而不肯就於是有非義以求生違道以免死者究之戀不能戀避不能避同歸於盡曷若諸婦烈烈一死其寄也非虛寄其歸也為全歸矣御定內則衍義卷十
