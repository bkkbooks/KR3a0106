body:
  text: 欽定四庫全書御定内則衍義卷八大學士傅以漸恭纂禮之道守貞二隋韓覬妻于氏河南人字茂徳氏年十四適顗年十八顗從軍歿氏哀毁骨立慟感行路父以其幼少無子欲更嫁之女誓無異志截髪自明養夫之孽子世隆為嗣愛同己生自孀居後雖時或歸寧至於親族之家絶不往來有尊屬就省謁者送迎皆不出户庭蔬食布衣不聴聲樂以終其身高祖聞而嘉歎下詔褒美表其門閭長安中號為節婦閭明張璩奴黄巖人適徐宗谷宗谷為仇人所害張負姑匿巖穴中間道達􅊚家既而遺娠生女幸妾生男張撫之若巳出明年仇以姑訴受顯戮張始還家招夫魂而塟之誓死不二年五十二卒劉文淑温州人滎陽教諭黄應發妻應發死無子鞠其婢之子通誓不再適舅垂老孝事甚謹舅卒撫通令就學得狂疾文淑慮黄氏絶祀急與婚配生子性通卒乃抱性育之就學成名後文淑臨終謂性曰我為汝家婦不幸三世短命今保汝成立吾可以下見汝祖矣温州樂清章文寳聘金氏未成婚納妾包氏有娠而文寳得疾且死金氏聞請往視父母不許金氏竟往為棺歛之即居其家撫妾生子綸親課讀書通四書大義後遣就外傅竟第正綂元年進士官禮部主事先欲疏請復儲恐貽母憂未果金氏聞之謂曰吾平日教爾何為汝能諫死職我雖為官婢無恨也綸遂以疏入忤㫖杖幾死禁錮詔獄金氏怡然天順二年綸復官終養金氏嘗自為詩見志詩曰誰云妾無夫妾猶及見夫方殂誰云妾無子側室生兒與夫似兒讀書妾辟纑空房夜夜聞啼烏兒能成名妾不嫁良人瞑目黄泉下後綸官至禮侍謹按子之出於庻孽者養之不異巳出固人道之正而每為婦女之所難至慮婢子之夭復撫其孤孫與迫之以忠諫者又為史冊所不可多得者矣晉皮京妻龍氏字憐狄道縣人年十三適京未逾年而京卒京二弟亦相次隕既無後嗣又無期功之親憐貨其嫁時資裝躬自紡績數年間三䘮俱舉葬殮既畢每時享祭無闕州里聞其賢屢有聘者憐誓不改醮守節窮居五十餘載而卒鄭袤妻曹氏魯國薛人也袤先娶孫氏早亡聘之為繼室事舅始盡孝叔妹羣姊咸得歡心及袤為司空子黙等又顯列而曹氏愈挹損分俸給宗姻家無餘貲孫氏瘞於黎陽及袤薨議者以久䘮難舉欲不合葬曹氏曰孫氏元配禮當合葬不可使孤魂無依於是備吉凶導從之儀迎之具衣衾凡筵親執雁行之禮人謂趙姫下叔隗不足稱也唐楊三安妻李氏髙陵人舅姑及夫相繼卒子孤窶李晝田夜紡三年間葬七䘮太宗賜帛二百免其徭役元張興祖妻周氏澤州人少年守節其祖母及母並以貞節著人或勸改適曰不孝不義吾不為也居嫠三十年舅姑與父及外祖皆盡葬祭禮詔旌其門謹按孝經十八篇以䘮終是養生不足當大事惟送死可以當大事也至於越都歴境孤孀困頓衣食不給遂多荒忽皮京妻等或舉三䘮或祔元配或七䘮而並舉於三年或諸䘮而盡禮於三十年誠合幽明心通死生是謂大貞三國趙昂妻王異昂為羌道令異獨留㑹同郡梁雙反攻西城破之殺異二子異恐為所侵引刀欲自裁顧女英歎曰身死汝當誰恃哉乃以溷湼麻而𬒳之尠食瘠形自為不清免於難事平昂遣吏迎之未至三十里止舍謂英曰向所為不死者為憐汝也吾遭亂不能死吾何以面諸姑乎今官舍近吾去汝死矣遂飲藥而絶昻聞急以觧之而蘇建安中昻轉叅軍事徙居冀㑹馬超反攻冀異躬著布韝與昂守又悉脱環珥賞戰士及超攻圍急刺史韋康欲以和昂諫不聴超赴約殺康而刼昻質其子月以為信超妻楊聞異節行請與讌異欲信昻於超以求濟以結納為忠及昻與楊阜等合謀討超歸謂異曰謀如是如月何異厲聲曰雪君父大耻䘮元不足為重况一子哉昂曰善遂閉門拒超超殺其子奔漢中從張魯得兵還攻昂昻保祁山圍三十日乃觧自冀城之難至於祁山九出竒制勝異輒參焉宋程超宗妻吴氏保寧人嫁再期而舅與夫皆殁以夫族子為後强族利其貲欲改立嗣訟之不得乃迫置一室困之使不能存吴不為動未幾所立一子亦卒一孫相依為命生八十有二而終曽氏婦宴者汀州寜化人夫死不嫁紹定間㓂破寧化縣令佐俱逃將樂令黄垺令土豪各為砦結約以拒賊宴首助兵給糧多殺獲賊結集來攻諸砦不能禦宴獨依黄牛山傍自為砦以居一日賊遣数十人來索婦女金帛宴召其田丁諭曰汝曹衣食我家賊求婦女意在我汝等必用命奮擊之不勝殺我降未晩也傾資齎犒之衆感奮宴自抱桴鼓使諸婢鳴金作其氣賊復退鄰鄉知其可依挈家依焉有不能自給者宴悉以家糧飯之於是聚日廣與其豪析黄牛山為五砦選少壯訓練之有急互犄角相援賊屢攻弗克所活老㓜數萬計知南劒州陳韡遺金帛名其砦曰萬安宴悉散給其下又分遺五砦事聞封恭人賜冠帔補其子承信郎元溧陽甘士人妻大徳丙午士人挈妻館寓句容潘家村值嵗荒紡績網給食一日夫㩗網出賣不復人有利其色為給食因欲私之婦正色曰我非如是人也其人謂我不汝給汝亦餓死矣婦曰我寧餓死誓不茍生閉户益嚴彌月人開視之則已死矣謹按不出户庭有難則决之以義其事雖烈於夫未必有濟是以貞為守不能以難為守迨不能以難為守是守貞竟有不可行之時徧稽古史得守難者數人其心則貞其局則難趙昻之妻初因救女而甘穢後且捨子而拒賊脱環珥以賞戰士出竒謀以保祁山直可號為烈丈夫矣吴氏困一室而依孤孫蔣氏願同子以殉城守茹苦知甘傾身完道以至饑餓瀕死不茍從欲難發俄頃守挺百年曾氏婦獨守山砦能使田丁用命訓練豪傑全活老㓜數萬閨閾之際且通乎兵法矣能戰而後能守知權乃謂知貞誰謂婦道無武畧哉宋王氏睢陽人適宗室趙子一一亡王氏誓不嫁靖康之變避地鎮江亂兵䧟城王氏用堊土自毁負其姑秀容縣君以逃且襁攜㓜子他子引其裾纍然轉徙亂兵間越四年始達温陵移居莆田終焉一時名人陳俊卿輩皆有詩哀之遼耶律努妻蕭氏小字意辛國舅駙馬都尉陶蘇幹之女美姿容年二十始事努睦族以孝謹聞努被伊遜誣流烏固部上以辛公主之女欲使絶婚辛辭曰陛下以妾葭莩之親使免流竄實天地之恩然夫婦之義生死以之妾自笄年適奴一旦臨難頓自乖離與禽獸何異幸陛下哀憐與奴俱行妾即死無恨帝感其言從之後舉家召還保大中命諸子避賊辛死之金翟節婦易州人年二十餘夫從軍死翟出入兵刃往復數百里晝伏夜行以其尸歸負土而葬之又自以無子遭時亂思以義自完乃自决於墓側鄰里救而復蘇始終一節年八十卒元劉節婦㤗州坟埨人至正丙申春隨父渡江居吴門適張士誠部將曹某方数月夫陣亡劉不避凶險躬至屍所求得其屍歸葬欲以身殉父不許既而權貴人聞劉美且賢爭欲强委禽焉劉誓死不二遂削髪為比丘尼李如忠繼妻馮淑安字静忠大名人如忠山東人初娶䝉古氏生子任而卒如忠後為山隂尹病篤謂馮曰奈汝何馮㫁髪自誓如忠没兩月遺腹子名伏王李氏及䝉古氏族相率來山隂盡取其貲及子任以去惟餘如忠及䝉古氏二柩馮朝夕哭臨權厝二柩蕺山下攜其子廬墓側時年始二十二父母来欲使更適人馮爪面流血不從居二十年始䕶䘮歸葬陳忠妻王氏江東人忠為都指揮守交趾王隨之㑹離賊叛忠陣亡王與二女同行筏出交趾東海城進海門濳賂賊徒收忠尸殮之扶柩浮海南歸以𦵏後毁容紡績度朝夕卒與忠歸土鄉人謂夫妻忠節兩不愧云明李氏臨汾張晟妻晟為乾州學正卒時闗中兵起道梗不能還子文瑗甫九嵗李紡績度日兵稍息遂與子負骸歸葬守志不易永樂初旌謹按守難已為女子之所難奔難尤有不可及者方隅多故生靈彫裂欲歸乎則家鄉萬里欲存乎則舉目無依轉徙奔竄数載始逹蠻瘴荷戈攜手同往負尸而歸葬權厝而結廬浮海濱以不驚勤紡績以勿倦豈不難乎其難哉東漢徐夫人者丹陽守孫翊妻也翊以吴宗姓守丹陽丹陽督媯覽丞戴員賊之欲逼妻徐徐陽紿之曰須晦日設祭除服乃聽矣時月垂竟覽聽許徐濳使翊所視養厚老𨽻岀結翊舊將孫髙傅嬰與圖覽比晦日徐設祭伏地哭盡哀畢乃除服薰香沐浴於他室張幃帳待事言笑晏晏無戚容覽覘知之不疑也徐濳呼高嬰置户内使人出報覽入徐出户拜方下忽大呌二君可起髙嬰俱出共殺覽餘人即户外殺員乃還衣縗絰奉覽員首以祭舉軍駭以為神吴主聞嘉歎尊異之擢高嬰以為牙門將晉張茂妻陸氏茂為吴國内史與三子俱為沈充所害陸傾家業率茂部曲討充充敗詣闕上書為荗謝不克之罪詔曰茂夫妻忠誠舉門義烈宜追尋大僕殷敬仲郎吏部時為酷吏所陥其妻顧率二女割耳為敬仲愬冤敬仲得减死淮隂義婦山陽大義鄉人李氏富商妻也有姿色邑人同商者悦之因道殺其夫厚為棺殮持其䘮以歸紿云溺死且盡歸其財伺其除䘮講為婚姻且自陳有義於其夫李氏亦感泣許嫁之生二子矣一日家有暴水水有浮漚夫輙顧而笑義婦問之未應固問之即以實告曰前夫之溺我所為也溺時有浮漚指謂可鳴吾寃今見之殊不爾故笑義婦黙然即日伺便奔告有司正其獄又自念以色累夫以身事仇二子仇人之子也即縳投之淮巳亦自投焉謹按立地之道曰柔與剛則剛原婦人秉性所固有者不知剛者不知貞不專以剛為守者不能守貞仇讐當前必力殺之而後快然復仇之志雖篤其謀又不得不詳濳呼舊將置户内媯覽已在掌中矣至於傾破家業割耳愬寃忠憤所激鬼神効力若夫淮隂義婦嫁数年而生二子情誼已摯舊仇易忘偶有所感即挺然奔告而不悔殺其子并殺其身夫仇既雪乃可見前夫於地下是不守而能守者矣漢桓嫠沛郡劉長卿之妻桓鸞之女也生一男五嵗而長卿卒妻逺嫌疑不肯歸寧兒年十五夭殁妻慮不免乃豫刑其耳以自誓沛相王吉上奏髙行題其門閭號曰行義桓嫠吴孫竒妻范氏名姬歸竒一年竒亡父母以其無子迎還其家姬不往迎者迫之姬乃截耳與鼻曰父母迎我者以我色能事人也今殘廢人矣行將何為迎者乃返陳楊氏㑹稽人張彪之妻陳文帝入㑹稽遣章昭達領兵購之并圗其妻兵殺彪并其弟首致於昭達文帝遣兵迎楊楊便破涕為笑紿昭達殯彪畢當從命殯事既畢還經彪宅謂昭達曰婦人本在容貌今辛苦日乆請暫過宅粧餙楊入屋遂割髮毁面哀哭大慟誓不更行文帝聞之歎息許為尼終不敢逼北魏衛敬瑜妻王氏霸城人明睿有志操年十六失夫父母舅姑憫其少欲嫁之截耳置盤中為誓拒焉于墓前手種樹数百株中有栢成連理所居有燕來巢後失雄雌孤飛不去王感之以采絲繫燕足為識後歳復來前繫如故賦詩志感雍州刺史為樹閭表焉唐房𤣥齡妻盧氏亡其世𤣥齡嘗疾病喟然嘆謂盧曰吾病脱不諱君年少寡居難當善事後人盧泣入帷中剔一目以矢曰所復有他志者視此矣相國為歎息泣下者乆之已疾瘳比隆貴禮敬偕老焉堅貞節婦者李姓年十七嫁為鄭廉妻未踰年廉死常布衣蔬食夜忽夢一男子求為妻後數數夢之李自疑容貎未衰醜所召也即截髪衣麻衣不薰餙垢面塵膚自是不復夢刺史白大威欽其操號堅貞節婦表旌其門名所居曰節婦里賈直言妻董者河朔舊族也直言父道冲以侍詔得罪詔使往鴆之直言紿其父曰藥死當謝四方神祗父起拜直言取鴆自飲曰願代父死使者眙愕走以聞代宗聞而憐之覘焉直言毒漬足而出復不死乃貸父死徙直言嶺南直言以妻少與訣曰吾生死不可期汝少可亟嫁無須也董不答退引繩束髪封以帛使直言署其上曰非君手不觧矣直言在嶺南二十年而反帛如故既見乃湯沐髪墮無餘直言後立竒節宋吴白妻徐氏餘干人年十九白將死喻之曰幸念爾子善事後人徐剜目以示白建中靖國間旌表門閭元叚氏隆興人霍榮妻榮卒叚氏年二十六止有養子而諸父貪其産逼叚再醮使養歸宗叚引針刺面墨漬之誓死不二大徳初旌其門范氏汝陽縣人莊十一妻也夫亡范年二十七舅姑老子幼家貧所親勸其他適截髪自誓縫績以養舅姑恪守婦道年八十事聞詔旌為貞節謹按孝子之道身體受之父母不敢毁傷然有時殺身以成仁况女子之身既歸丈夫則身屬丈夫之身丈夫既逝婦稱曰未亡人則身應與夫俱亡可知矣或刑其鼻或㫁其耳或針其面或封與剪其髪或剔其目情事不同同歸於貞棄一體而全大體守之所以獨摯也明倪氏歸安人許聘陳陳從征不返遙以死聞倪守志不嫁踰五十年而陳歸竟成婚姻之禮俱年六十嵗有竒世號白髪新婚姚貞女孝感縣庠生姚禎之女聘鄭一徳未幾而一徳卒即痛哭欲躬視衾殮其家不從潛取鼠藥自噎母覺濳灌以水得甦屡自縊皆以防䕶不遂然兩目霍然已血漬矣竟往㑹塟盤礡墓間悲號不休草土為濕自是歸翁姑槁容蓬首不出閫外十有五載如一日始鄰媪觧之曰汝未醮何苦執婦義女曰義自盟始即未醮將路人其夫耶如媪言何用盟為里以聞於當道核得實鍥其楣曰貞邑侯蔣以化為立傳謹按聘則為妻奔則為妾古禮昭然則聘之所及即為妻之始也方待嫁在室而其夫或逺遊不歸或夭夀而亡於此另字人亦不議其短長以其尚為女子也若倪氏之守志五十年竟成白髪新婚姚貞女躬視衾殮悲號邱壠其異甚矣雖不足為天下式亦貞女之道也春秋衛宣夫人齊侯之女嫁于衛至城門而衛君死保母曰可以還矣女不聼遂入持三年之䘮畢弟立請曰衛小國也不容二庖請願同庖終不聴衛君愬于齊使人告女女亦不聼乃賦我心匪石之詩以自誓宋張氏名妙靜慈谿人年十九歸本邑李綦甫入門夫已病革一顧而易簀或云伉儷未成盍返而從其父母張氏誓不許曰入李氏之門即李氏之婦義不再適守節終身年八十四卒元江文鑄妻范妙元奉化人年二十一歸於江及門未合卺夫忽以癎疾卒范氏曰我既入門即江氏婦也遂居江氏家守節撫諸子如己子劉應震妻范氏合卺之夕應震疾作不能成禮未幾卒服除母欲改嫁不許母曰未配非改節也對曰名在劉氏家廟且有姑在姑殁復有以為請誓死不易明肅府沿山王繼妃楊氏未配王薨楊願入府奉姑守節終身萬厯二十八年禮部題貞烈異常詔楊氏准封沿山王繼妃入府守節張針姑陳州人年十四許同郡孟七保未幾七保輸税於開封卒葬祥符之蘇村父母欲嫁之針姑曰既許孟氏今雖亡其母無所依願歸以養之父母重其義從之乃與姑詣祥符負其夫尸還塟誓養姑終身姑卒以禮塟之立志愈堅年幾六旬受旌謹按禮有三月廟見之文則初嫁而未成禮者尚有可歸之道乃衛宣夫人等獨持䘮而不歸沿山王妃且竟以奉姑為名張針姑又念其姑之無所依庇也天性純至動與貞合故守貞也者本天而守非因人而守也衛二順者衛宗子之夫人及其傅妾也秦滅衛衛宗死夫人無子而守寡傅妾有子傅妾事夫人八年不衰供養愈謹夫人謂𫝊妾曰孺子養吾甚謹子奉祀而妾事我我不堪也且吾聞主君之母不妾事人今我無子於禮斥絀之人也而得留以盡其節是吾幸也今又煩孺子不改故節吾甚内慚吾願出居外以時相見傅妾泣而對曰夫人欲使靈氏受不祥耶不幸早終是一不祥也夫人無子而婢妾有子是二不祥也夫人欲出居外而婢子居内是三不祥也妾聞忠臣事君無懈倦時孝子養親患無日也妾豈敢以少貴之故變妾之節哉供養固妾之職也夫人又何歉乎夫人曰無子之人而辱主君之母雖子欲爾衆人謂我不知禮也吾終願居外而已傅妾退而謂其子曰吾聞君子處順奉上下之儀修先古之禮此順道也今夫人難我將欲居外使吾居内此逆也處逆而生豈若守順而死哉遽欲自殺子泣而守之不聴夫人懼遂許傅妾留焉元平章庫庫徳之側室髙麗氏有賢行平章死誓弗二適正室子拜馬多爾齊悦其色欲妻之而不得乃以其父所有大答納環子獻於大師巴延巴延特為奏聞奉㫖命馬多爾齊收繼小母髙麗氏髙麗氏夜與母親踰垣而出削髪為尼呉興二妾趙公碧瀾宋宗室也老而益貧二妾方少艾慮無以安其心因遣之去咸弗肯嫁數獻酒肴致殷勤公於卒也覆諸水曰慎母再見昔吾割情忍愛以去爾爾弗我忘祗攪我心耳既而各與其父母俱至泣而曰妾家每嵗請給足可養瞻願執事終身為尼以報主恩公遂復留之他日公死果如所言公有寡女復資育之葉孔賔妻鄭氏青田人孔賔以父卒於官迎䘮覆舟死鄭年二十三遺子十月矢心自守妾何氏年猶少鄭謂之曰我守夫家汝無子宜自擇也妾曰主母既以節守妾當奉承以全其節何以出為相與同處年各八十餘時人謂之雙節謹按妾婦之道以順為正豈有不當終身守正者乎然夫妻敵體妾則降禮降之則必不過責之矣夫妻年嵗家世多相若妾必處其貧而少貧而少則又難乎其為守矣古今史傳義妾所以寥寥也二順之子成立而終以妾禮自居髙麗氏之不失節於其子呉興二妾之厚獻於其夫鄭氏之慨然與主母髙節雙峙此葢表表人寰足以愧朝秦暮楚者矣元唐斗輔妻文氏靜江人大徳中斗輔任賔州幕官卒時文氏年方二十餘哀慟㡬絶執義自誓孝養舅姑舅姑既没葬祭無遺憾其子明早世婦蔣氏慕姑之義亦自誓靡他至治中旌其門曰貞節郝氏永壽人田大妻胥氏田二妻周氏田三妻兄弟三人俱死於兵郝年二十一周年十八胥年十九俱堅心守節終身不嫁延祐二年旌表時邠州任氏亦一家三婦少寡不他適戮力蠶桑以養舅姑俱被旌奉化陳氏婦以貞節稱者五人初陳元娶竺氏生子侗而元卒竺氏年二十二義不再適侗娶􅟛氏生子瑞泰二人侗亦以疾夭􅟛氏年二十六後五十八年卒瑞娶王氏生子通甫而瑞復夭王氏年三十後五十五年卒通甫娶樓氏樓氏甫笄歸於陳至二十六而寡父母欲奪其志泣不從其姑王氏年老事之尤謹姑卒殮葬悉如禮子四人長養才娶樓氏生子孟雍孟熙而養才遇疾不愈方卒時樓氏年二十六亦守節不移孫氏三原張徳妻徳亡孫年二十四誓死靡他子世亨亦蚤卒妻王氏年二十九亦誓不嫁世亨子忠亦蚤卒妻劉氏年二十八亦能守義不渝操履清白先後相望事聞旌表其門焦氏涇陽人袁元祐妻天祐從征死甘州宗族欲改嫁焦氏哭曰袁氏不幸三世蚤寡皆守節義豈可至吾遂廢衆不復言事聞旌表劉應麟妻郝氏建康人初應麟卒子方孩時祖姑王氏孀居不出户者數十年姑郝氏亦自二十嵗守節應麟妻上事二姑惟謹而志操尤勵人謂三世貞節云隴西李茂徳聘同郡張氏女年十七歸李氏生子庸甫六十而寡舅姑憐其少欲嫁之使左右諷之即引刀截髪以見志乃止茂徳之弟仲徳亦早卒其妻張氏年二十有八生子慶方齔亦誓不再適從弟希賢妻陳氏年二十有四希賢卒時其子慶方孕四月守志益堅一門三婦以貞白聞龔氏三女晉江人長曰益適柯允中從戎而殁益年二十五次源能誦説古賢女言行年十八適張仁仁早卒源年二十二欲死相從時其孤尚㓜家人苦諭以宗祀無託而止季婉年十七適劉允正早世婉年十九擕二孤躬負土築墳三女俱早孀而舅姑皆先卒煢煢無依䘮終咸挈孤依父以居甘貧自力誓死不二明任仕中婦上海人姓俞氏二十一寡居有女始五嵗男始五月誓不二天撫教男女女既笄適俞邦用邦用亦早䘮親戚勸再適女曰再嫁則俞氏祭祀誰奉且辱吾母乃歸與母同居守志洪武中旌為雙節管氏二婦揚州人管賢妻闕氏管哲妻馬氏洪武中賢卒闕氏年二十六一子在襁褓且瞽誓死不嫁後哲繼卒馬氏年二十一姑以其無嗣諷之他適馬氏曰伯氏能守節我獨不能乎俱力事紡績以養姑瞽子稍長教之學星卜以資日給姑以天年終併力塟之後二婦俱年七十餘郡上其事旌為雙節陶氏四節婦桐城人陶鏞妻鍾氏鏞子繼娶方氏繼子亮領景泰癸酉鄉薦妻王氏妾吳氏鏞繼俱早喪鍾方各守節亮亦早卒妻妾共守一室抗節終身詔表門曰陶氏三世四節李氏桐鄉人年十八適高逾生子熊方朞而逾亡家貧舅姑相繼亡往依母居母諭之改適輒慟絶母止不復强熊既長娶曹無子為置妾陸氏甫得子熊又亡曹與陸皆勵操事姑以撫㓜兩世三節羅氏三節歐陽氏吉水人諱壽娘鵞由羅韞匵妻匵卒婦年二十五長子篤温方二嵗次篤良尚在姙越四月而生氏撫二孤無他志温長娶歐陽酉貞生子甫期而温亡良娶袁氏蘭秀生子五嵗而良卒酉貞蘭秀相告曰姑為節婦我屬獨改節乎恊力共守姑年六十卒蘭年五十五卒酉貞年幾九十卒馬氏陵縣人邢端妻端舉鄉試早卒馬守節子東亦舉鄉試任知縣而卒婦張氏訓子有姑風旌曰雙節于氏長葛人程黼妻黼任寧津知縣卒于官子顯在襁褓于年二十六堅志守節顯妻王氏生子玘不逾嵗顯亦卒王年二十四家又貧或諷其他適王曰吾姑守節若不能繼守無以見夫孀居數十年姑婦一節正統間旌為雙節謹按古人以守節為固有故三代而上無𫝊人後世以守節為美行故諸史所載雖不甚詳而貞烈之際不勝反復流連焉至元史而貞節乃益著或姑與婦同其操或姒與娣同其介或數世皆以矢志相傳于是有雙節三節四節五節者且皆芳齡乆要日星有變而氷霜不炎山河無定而松筠俱古故類而採之著為美談俾後人知所觀感云明陳氏永康人王和欽妻年二十九夫亡遺孤嵗餘苦志守節勤以自給孤名徳中性至孝一日東門失火徳中向火稽首遂西轉人謂節孝所感洪武中旌其門任氏吳景妻沔陽人景卒任年二十有五誓以死守躬自訓子欽十年不出户姑病痿痺抱持左右寤處必偕每夜焚香籲天願以身代姑歿竟絶葷蔬食比塟得二白兎人以為孝感𢎞治中旌謹按篤于守貞者不言所應而感應自至天人之際有精神之通焉故畧採一二為矢志之中閨知所歆也火烈而風轉葷絶而兎來孝也節也天人感應之際豈相逺哉宋陳公緒妻劉海州朐山人紹興末金掠山東朐山公緒捐其家南徙妻劉適歸寧不得偕獨留比緯蕭自給音問絶不通十餘年或勸之改適不可曰不二天公緒亦不他娶曰妻不吾負也子庚年稍長思念涕泣傾家結豪俠往來淮甸間求之以全王氏婦梁臨川人歸夫家纔數月元兵至與夫約曰吾遇兵必死若復娶當告我頃之夫妻被執有軍千户强使從己婦紿曰夫在此不忍乞歸之而後可千户以所得全帛遺其夫而歸之約行十餘里千户即逼之婦拒且罵被殺數年夫以無嗣謀再娶議輒不諧因告其故妻夜夢妻曰我死後生某氏家今十嵗矣後七年當復為君婦明日遣人聘之一言而合詢其生與婦死年月同云唐李徳武妻裴氏字淑英户部尚書矩女也婉順有容徳事父母孝適徳武經年而徳武以父罪從坐徙嶺表矩為黄門侍郎奏離婚煬帝聴之徳武與裴訣曰嬿婉甫爾遽此分離投之瘴癘殆不自還尊君奏留必且改嫁卿于此長訣矣裴泣對曰婦無再醮夫者天也天可二乎因操刀欲割耳自矢保奪刀不遂毁容貌不御膏澤日事佛誦佛經累年夫姑姊妹在都邑者嵗時命左右省焉乆之徳武音問㫁絶矩欲奪其志引刀㫁髪悲泣絶粒不可奪而止後十餘年徳武還為夫婦如初元程鵬舉在宋季被掠于興元張萬户家為奴張以宦家女妻之既婚之三日即竊謂其夫曰觀君才貌非乆在人後者何不為歸計而甘心于此乎夫疑其試己也訴于張命箠之越三日復告曰君若去必可成大器否則終為人奴耳夫愈疑之又訴于張張命出之遂鬻于市人家妻臨行以所穿綉鞋一易程一履泣而曰期執此相見矣程感悟奔歸宋時年十七八以廕補入官迨元統一海内程為陜西行省叅知政事自與妻别三十餘年義其為人未嘗再娶至是遣人攜向之鞋往興元訪求之市家云此婦到吾家執作甚勤夜寢未嘗解衣每紡績達旦毅然莫可犯吾妻異之視如己女將半載以所成布疋償元鬻鏹物乞身為尼吾妻施貲以成其志見居城南某庵中所遣人即往尋之見以曝衣為由故遺鞋在地尼見之詢所從來曰吾主翁程叅政使尋其偶耳尼出履示之合亟拜曰主母也尼曰鞋履復全吾願畢矣歸見程相公與夫人為道意竟不再出告以叅政未娶終不出旋報呈移文本省遣使檄興元路官為具禮委幙屬李克復防䕶車輿至陜重為夫婦謹按矢節秉心百年不易富貴貧賤總不足論所以敦夫婦之誼也若數十年音耗不可知數千里心事不能達而夫不再娶妻無二心離者復合重為夫婦豈非天下之至竒者乎御定内則衍義卷八
